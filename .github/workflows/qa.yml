name: QA Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run test suite
        run: python -m pytest tests/ --ignore=tests/test_benchmark_cases.py --tb=short -q

      - name: Run QA agent
        run: python qa/run_qa.py

      - name: Run value correctness probe
        run: python qa/value_correctness_probe.py
        continue-on-error: false

      - name: Upload QA results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-results-${{ matrix.python-version }}
          path: |
            benchmarks/real_documents/test_results.json
