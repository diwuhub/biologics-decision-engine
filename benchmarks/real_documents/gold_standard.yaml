  - "Fix OOS glossary false-positive extraction (tighten expected_oos_events_max from 2 to 1)"
  - "Add gold standard for Darzalex EPAR once characterization extractor stabilizes"
  - "Add G0F/G1F/G2F qualitative glycan detection (distinct from quantitative afucosylation %)"
