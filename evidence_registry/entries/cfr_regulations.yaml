- id: 21CFR-211.80
  type: guideline_clause
  source: 21 CFR 211.80
  title: Contractual Arrangements for Manufacturing Components
  content: 'Each manufacturer shall ensure that any manufacturing operations performed by a contractor are conducted under
    appropriate written agreements that specify the work to be performed, the quality standards required, and the responsibility
    for compliance with cGMP regulations. The manufacturer shall audit and approve all contractors performing manufacturing
    operations. Records of contractor activities, quality audits, and compliance shall be maintained. The manufacturer retains
    ultimate responsibility for the quality of the finished product regardless of contractors used.

    '
  applicable_categories:
  - quality
  - manufacturing
  - oversight
