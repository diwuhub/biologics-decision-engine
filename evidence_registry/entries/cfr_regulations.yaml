- id: 21CFR-211.192
  type: guideline_clause
  source: 21 CFR 211.192
  title: Production and Process Controls — Specification Review
  content: 'Each manufacturer shall establish written specifications and test procedures for all components and in-process
    materials. Specifications shall include identity, strength, quality, and purity requirements. Each batch of components
    shall be tested and approved before use in manufacturing. In-process materials shall be controlled by written procedures
    and tested at appropriate stages. The manufacturer shall establish acceptance criteria and document all testing results.
    Changes to specifications or test procedures require documentation, investigation, and appropriate approval.

    '
  applicable_categories:
  - specifications
  - process-controls
  - quality
  confidence: 1.0
