- id: 21CFR-314.81
  type: guideline_clause
  source: 21 CFR 314.81
  title: Other Post-Approval Reports
  content: 'An applicant holding an approved NDA/BLA shall submit periodic reports to the FDA including: annual reports describing
    manufacturing changes, process improvements, new analytical methods, and revalidation of test methods; periodic safety
    update reports summarizing adverse experience data; and reports of any other significant changes or new information. Changes
    to the approved manufacturing process or specifications that are not reported as supplements shall be reported in the
    annual report. The annual report provides an opportunity to document gradual improvements in manufacturing and quality
    control processes.

    '
  applicable_categories:
