- id: 21CFR-600.3-purity
  type: guideline_clause
  source: 21 CFR 600.3 — Purity
  title: Purity Definition and Requirements
  content: 'Purity is defined as the degree to which a substance is free from extraneous matter. For biological products,
    purity encompasses freedom from chemical impurities, residual process-related impurities, host cell proteins, host cell
    DNA, endotoxins, and microbiological contamination. Each biological product shall be manufactured under controls designed
    to ensure consistent purity. Specifications for purity shall be established during product development based on manufacturing
    process capability and safety/efficacy data. All batches shall be tested to ensure they meet the established purity specifications
    prior to release for distribution.

    '
  applicable_categories:
