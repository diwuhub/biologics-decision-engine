- id: 21CFR-211.50
  type: guideline_clause
  source: 21 CFR 211.50
  title: Equipment Design and Installation
  content: 'Equipment and components used in manufacturing shall be designed and constructed to facilitate maintenance, cleaning,
    and operation to prevent product contamination. All equipment shall be calibrated, inspected, and maintained periodically.
    Maintenance procedures shall be documented. Equipment that may contact the product shall not present any chemical or physical
    compatibility issues. Records of equipment maintenance and calibration shall be maintained. Any equipment failures or
    malfunctions shall be documented and investigated for impact on product quality.

    '
  applicable_categories:
  - equipment
  - maintenance
  - manufacturing
  confidence: 1.0
