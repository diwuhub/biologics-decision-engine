- id: 21CFR-211.25
  type: guideline_clause
  source: 21 CFR 211.25
  title: Personnel — Training
  content: 'Each manufacturer shall establish a training program for all individuals who participate in the manufacture, processing,
    packing, or holding of a biological product. Training shall include instruction on the importance of their particular
    function in assuring product quality. Training records shall be established and maintained for all personnel. Continuing
    training shall be provided to keep personnel informed of new procedures, equipment, or regulatory changes. Supervisory
    personnel shall receive instruction on quality and cGMP principles.

    '
  applicable_categories:
