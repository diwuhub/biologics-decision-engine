- id: 21CFR-601.2
  type: guideline_clause
  source: 21 CFR 601.2
  title: Applications for Biologics Licenses
  content: 'A person may apply for a license to manufacture a biological product by submitting a biologics license application
    (BLA) that includes: established name of the product; proprietary name; description of the source material; manufacturing
    process; controls and specifications; stability data; analytical methods and validation; preclinical and clinical data;
    and proposed labeling. The applicant shall provide sufficient information to establish that the product is safe, pure,
    potent, and effective for its intended use. The BLA shall be submitted in the format specified by FDA and include a complete
    CMC section.

    '
  applicable_categories:
  - regulatory-submission
  - cmc
  - product-approval
