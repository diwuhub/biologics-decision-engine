- id: 21CFR-601.12
  type: guideline_clause
  source: 21 CFR 601.12
  title: Changes to an Approved Application for Biologics
  content: 'A holder of a biologics license shall notify FDA of changes to the approved biological product, its manufacturing
    process, or its controls. Changes shall be classified and reported as: Prior Approval Supplement (PAS) requiring FDA written
    approval before implementation; Supplement—Expedited (requiring FDA acknowledgment within 30 days); Supplement—Standard
    (requiring written FDA approval); or Annual Report. Changes that could affect safety, purity, potency, or identity of
    the product require PAS or Supplement—Standard. Data shall be provided demonstrating that the change does not adversely
    affect the biological product.

    '
  applicable_categories:
  - post-approval
