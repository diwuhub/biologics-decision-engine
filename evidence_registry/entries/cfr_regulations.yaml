- id: 21CFR-600.3-potency
  type: guideline_clause
  source: 21 CFR 600.3 — Potency
  title: Potency Definition and Requirements
  content: 'Potency is the specific ability or capacity of the product, as indicated by appropriate laboratory tests or by
    adequately controlled clinical data (including human experience), to effect a given result. Each biological product shall
    have an established potency that is determined using scientifically valid, appropriate methods. The potency test shall
    be capable of reflecting the clinical activity of the product and shall be performed on each batch prior to release. Potency
    standards shall be established during product development and shall be based on clinical efficacy data or, where appropriate,
    appropriate laboratory assays.

    '
  applicable_categories:
  - potency
