- id: 21CFR-314.70
  type: guideline_clause
  source: 21 CFR 314.70
  title: Supplements and Other Changes to Approved NDA/BLA
  content: 'An NDA/BLA holder shall notify the FDA of changes to the approved application. Changes are classified as Prior
    Approval Supplement (PAS, requiring FDA approval before implementation), Supplement—Expedited (requiring FDA review within
    30 days), or Annual Report. CMC changes that could affect product quality, safety, purity, or potency shall be reported
    as PAS. Changes to manufacturing processes, suppliers, test methods, or specifications that affect the approved product
    require documentation of equivalence or superiority. The applicant shall provide data demonstrating that the change does
    not adversely affect product quality.

    '
  applicable_categories:
