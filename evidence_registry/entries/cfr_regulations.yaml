- id: 21CFR-211.192-stability
  type: guideline_clause
  source: 21 CFR 211.192
  title: Stability Testing and Shelf Life Determination
  content: 'Manufacturers shall establish and maintain a stability program to ensure the identity, strength, quality, purity,
    and potency of the biological product throughout its stated shelf life. Stability testing shall be performed under appropriate
    conditions (temperature, humidity, light) and at appropriate time intervals. Data shall be provided to support the proposed
    expiration date or beyond-use dating. Stability protocols shall include testing of the product in its final container
    and closure system. Results shall be reviewed and approved by qualified personnel before the shelf life is established
    or extended.

    '
  applicable_categories:
  - stability
