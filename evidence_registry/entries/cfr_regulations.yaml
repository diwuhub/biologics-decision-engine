- id: 21CFR-601.20
  type: guideline_clause
  source: 21 CFR 601.20
  title: Approval of Biologics License Application
  content: 'FDA shall approve a BLA if the data submitted establish that the biological product is safe, pure, potent, and
    effective, and the product meets all applicable standards. Prior to approval, the applicant shall demonstrate that: the
    manufacturing process is capable of producing a consistent, uniform product; all manufacturing facilities are suitable;
    CMC controls are adequate; and all requirements for manufacturing, testing, and release are met. FDA approval shall be
    issued in writing and shall contain conditions of approval, including post-approval commitments such as additional clinical
    studies or manufacturing improvements if needed.

    '
  applicable_categories:
