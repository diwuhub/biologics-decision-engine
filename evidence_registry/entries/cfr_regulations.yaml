- id: 21CFR-211.72
  type: guideline_clause
  source: 21 CFR 211.72
  title: Cleaning and Maintenance of Equipment
  content: 'Any equipment or container used for manufacturing shall be cleaned and maintained to prevent contamination. Cleaning
    procedures shall be written and validated. The frequency of cleaning shall be appropriate to prevent accumulation of residue
    or contamination. Equipment shall be inspected visually for cleanliness before use. Records of cleaning and maintenance
    shall be maintained. Cleaning agents and sanitizers shall be selected to avoid product contamination. For equipment used
    to manufacture different products, validated cleaning procedures shall ensure no cross-contamination between batches or
    products.

    '
  applicable_categories:
