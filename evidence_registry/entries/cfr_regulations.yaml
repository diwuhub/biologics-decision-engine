- id: 21CFR-211.63
  type: guideline_clause
  source: 21 CFR 211.63
  title: Equipment Location and Layout
  content: 'Equipment shall be positioned and located to minimize the possibility of contamination. The layout of equipment
    shall facilitate cleaning and prevent cross-contamination between different products or processes. Equipment used for
    manufacturing different products shall be either dedicated or cleaned between products with validated cleaning procedures.
    Raw materials, components, and products shall be physically separated during storage and manufacturing. Environmental
    monitoring shall be performed to ensure that the equipment location and layout result in appropriate environmental conditions.

    '
  applicable_categories:
