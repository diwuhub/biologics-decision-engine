entries:
- id: 21CFR-600.3
  type: guideline_clause
  source: 21 CFR 600.3
  title: Definitions
  content: 'Biological product means a virus, therapeutic serum, toxin, antitoxin, vaccine, blood, blood component or derivative,
    allergenic product, protein (except any chemically synthesized polypeptide), or analogous product, or arsphenamine or
    any derivative of arsphenamine (or any other trivalent organic arsenic compound), applicable to the prevention, treatment,
    or cure of a disease or condition of human beings. Potency is the specific ability or capacity of the product, as indicated
    by appropriate laboratory tests or by adequately controlled clinical data (including human experience), to effect a given
    result. Purity means the degree to which the substance is free from extraneous matter. Safety means the relative freedom
    from harmful effect to persons affected, directly or indirectly, by a product when prudently administered, taking into
    consideration the character of the product in relation to the condition of the recipient at the time of administration.

    '
  applicable_categories:
  - safety
  - purity
  - potency
  - identity
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-600
  year: 2024
  tags:
  - definitions
  - regulatory-framework
  - cmc-fundamentals
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-600.10
  type: guideline_clause
  source: 21 CFR 600.10
  title: Personnel Requirements
  content: 'The manufacturer of a biological product shall employ sufficient personnel qualified by scientific training and
    experience in the manufacture, processing, assay, and control of biological products to ensure that all requirements of
    this part will be fulfilled. Each manufacturer shall designate one or more qualified individuals responsible for signing
    and dating the approval of written procedures, deviations, batch production and control records, and release of each batch
    of biological product for distribution.

    '
  applicable_categories:
  - quality
  - personnel
  - management
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-600
  year: 2024
  tags:
  - personnel
  - quality-control
  - regulatory-requirements
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-600.11
  type: guideline_clause
  source: 21 CFR 600.11
  title: Physical Establishment — Facilities and Controls
  content: 'The manufacturer of a biological product shall provide adequate facilities that are suitable for the production
    of safe, pure, and potent biological products and for the handling of source and in-process materials. Buildings and facilities
    shall be of suitable construction and equipped with adequate environmental controls, including temperature, humidity,
    and air filtration, as appropriate for the specific biological product being manufactured. All facilities used in the
    production of a biological product shall comply with the current good manufacturing practice requirements.

    '
  applicable_categories:
  - facility
  - quality
  - manufacturing
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-600
  year: 2024
  tags:
  - facility-requirements
  - cGMP
  - environmental-controls
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-600.12
  type: guideline_clause
  source: 21 CFR 600.12
  title: Changes to an Approved Application
  content: 'A manufacturer of a biological product shall notify the FDA of changes to the approved biological product or its
    manufacturing process. Changes are classified as Prior Approval (requiring written FDA approval before implementation),
    Supplement—Expedited (CBE-30, requiring FDA review within 30 days), Supplement—Standard (requiring FDA approval), or Annual
    Report (reported in the next biologics license application annual report). The manufacturer shall provide data supporting
    the safety, potency, purity, and identity of the biological product after the change.

    '
  applicable_categories:
  - regulatory-compliance
  - change-management
  - post-approval
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-600
  year: 2024
  tags:
  - post-approval
  - cbe
  - prior-approval
  - supplements
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-600.13
  type: guideline_clause
  source: 21 CFR 600.13
  title: Labeling Requirements
  content: 'Each container of a biological product shall be plainly and conspicuously labeled to show: the name of the biological
    product; the statement ''potency'', ''expiration date'', ''lot or control number'', and the lot or control number; the
    name, address, and license number of the manufacturer; the name of the source material where applicable; and any other
    information that is necessary to assure safe and effective use of the product. All statements on the label shall be clear,
    accurate, and not misleading.

    '
  applicable_categories:
  - labeling
  - safety
  - quality
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-600
  year: 2024
  tags:
  - labeling
  - compliance
  - product-identification
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-600.14
  type: guideline_clause
  source: 21 CFR 600.14
  title: Adverse Experience Reporting Requirements
  content: 'A licensed manufacturer shall establish and maintain records of adverse experiences with the biological product.
    All adverse experiences that are serious and unexpected shall be reported to FDA. An adverse experience is considered
    serious if it results in death, a life-threatening condition, hospitalization, persistent or significant disability, congenital
    anomaly, or required medical intervention. Unexpected means any adverse experience that is not listed in the biological
    product''s prescribing information or is more severe or frequent than expected.

    '
  applicable_categories:
  - safety
  - post-market
  - regulatory-compliance
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-600
  year: 2024
  tags:
  - pharmacovigilance
  - adverse-events
  - post-market-surveillance
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-610.1
  type: guideline_clause
  source: 21 CFR 610.1
  title: Tests Prior to Release of Biological Products
  content: 'A biological product shall not be released for distribution until it has been tested and found to comply with
    established standards for safety, purity, potency, and identity as specified in this part or in an applicable standard.
    No batch shall be released without completion of all required tests, including but not limited to sterility testing, potency
    testing, purity testing, identity testing, and general safety testing where applicable. Records of all tests and results
    shall be maintained and made available for review by the FDA.

    '
  applicable_categories:
  - testing
  - quality
  - release-criteria
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-610
  year: 2024
  tags:
  - batch-release
  - testing-requirements
  - quality-assurance
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-610.2
  type: guideline_clause
  source: 21 CFR 610.2
  title: Test for Sterility
  content: 'Each batch of a biological product shall be tested for sterility using validated methods. The manufacturer shall
    use an appropriate test method capable of detecting viable aerobic and anaerobic bacteria and fungi. For products where
    stability data supports extended testing beyond 14 days, the test method shall be validated to maintain viability detection
    capability. The results shall be negative (no growth) for the product to be considered sterile and suitable for release.
    Alternative methods may be used if they are validated and approved by FDA.

    '
  applicable_categories:
  - sterility
  - testing
  - quality-control
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-610
  year: 2024
  tags:
  - sterility-testing
  - microbial-limits
  - release-testing
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-610.9
  type: guideline_clause
  source: 21 CFR 610.9
  title: Equivalent Methods and Procedures
  content: 'If a manufacturer can demonstrate that an alternative method or procedure for testing a biological product is
    equivalent to or better than the official method, such alternative method or procedure may be used. The manufacturer shall
    provide analytical data and validation demonstrating that the alternative method is equivalent in sensitivity, specificity,
    reproducibility, and reliability. The FDA must approve the alternative method in writing before its use. All changes to
    approved test methods require prior notification to or approval from the FDA.

    '
  applicable_categories:
  - testing
  - quality
  - analytical-methods
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-610
  year: 2024
  tags:
  - analytical-methods
  - validation
  - alternative-methods
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-610.10
  type: guideline_clause
  source: 21 CFR 610.10
  title: Potency — General Requirements
  content: 'The potency of a biological product shall be determined using a test method that accurately reflects the clinical
    efficacy of the product. The potency test shall be performed on each batch of biological product prior to release. The
    manufacturer shall establish a potency standard that is appropriate for the specific product and shall perform the test
    under conditions specified in the standard. If a reference standard is used, it shall be validated against a recognized
    biological reference standard. The potency test results shall fall within established specifications for release.

    '
  applicable_categories:
  - potency
  - testing
  - efficacy
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-610
  year: 2024
  tags:
  - potency-testing
  - biological-activity
  - batch-release
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-610.11
  type: guideline_clause
  source: 21 CFR 610.11
  title: General Safety Test (Historical)
  content: 'The general safety test (formerly required for all biological products) has been superseded by product-specific
    safety testing and is no longer universally required. However, manufacturers may be required to perform safety testing
    appropriate to the specific biological product if there is reason to believe the product could contain contaminants that
    might cause adverse reactions. Safety testing shall be designed to detect the presence of extraneous agents, toxins, or
    other contaminants that could be harmful to humans.

    '
  applicable_categories:
  - safety
  - testing
  - contamination-detection
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-610
  year: 2024
  tags:
  - safety-testing
  - historical-requirements
  - product-specific-testing
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-610.12
  type: guideline_clause
  source: 21 CFR 610.12
  title: Purity Requirements
  content: 'Each batch of a biological product shall be tested to determine the level of purity as defined by the product
    standard. Purity tests shall detect and quantify contaminants including: host cell proteins (HCP), host cell DNA, process-related
    impurities, product-related impurities, and other extraneous agents. The manufacturer shall establish specifications for
    purity and demonstrate that each batch meets those specifications before release. Methods for purity testing shall be
    validated and capable of detecting the levels of contaminants that could impact product safety or efficacy.

    '
  applicable_categories:
  - purity
  - testing
  - contaminant-control
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-610
  year: 2024
  tags:
  - purity-testing
  - impurity-control
  - quality-control
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-610.13
  type: guideline_clause
  source: 21 CFR 610.13
  title: Identity Tests
  content: 'Each batch of a biological product shall be tested to verify the identity of the product using a validated test
    method. The identity test shall confirm that the product is the correct biological entity and matches the specification.
    Methods may include immunoassays, chromatography, mass spectrometry, peptide mapping, or other validated techniques appropriate
    to the product. The identity test shall be capable of distinguishing the biological product from related but different
    products or contaminants that might be present.

    '
  applicable_categories:
  - identity
  - testing
  - product-verification
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-610
  year: 2024
  tags:
  - identity-testing
  - characterization
  - product-specification
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-610.14
  type: guideline_clause
  source: 21 CFR 610.14
  title: Identity Standard for Blood-Derived Products
  content: 'Blood-derived biological products shall have established identity standards appropriate to the source material
    and the manufacturing process. The identity of blood-derived products may be established by reference to the source material
    characteristics, the manufacturing process, and established biochemical markers. Manufacturers shall validate identity
    methods and maintain consistency across batches. The identity standard shall be established during product development
    and verified in all batches to ensure consistency and patient safety.

    '
  applicable_categories:
  - identity
  - blood-derived-products
  - consistency
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-610
  year: 2024
  tags:
  - blood-products
  - identity-standards
  - source-material
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-211.22
  type: guideline_clause
  source: 21 CFR 211.22
  title: Responsibilities of Quality Control Unit
  content: 'There shall be a quality control unit (which may be separate from or part of the quality assurance unit) with
    authority independent of the production department and reporting to management. The quality control unit shall have responsibility
    and authority to approve or reject all components, containers, closures, in-process materials, packaging materials, and
    finished products. The unit shall establish quality standards, perform required testing, and maintain records. All acceptance
    and rejection decisions shall be documented with justification and reviewed by authorized personnel.

    '
  applicable_categories:
  - quality
  - management
  - organization
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-E/part-211
  year: 2024
  tags:
  - quality-control
  - organization
  - cGMP
  - authority
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-211.42
  type: guideline_clause
  source: 21 CFR 211.42
  title: Design and Construction Features of Facilities
  content: 'Any building, building system, or equipment shall be suitable in size, construction, and location to facilitate
    maintenance, cleaning, and operation in a manner suitable to the manufacture of a biological product. Buildings shall
    be suitable for protection of components and product from environmental contamination, including dust, insects, and other
    pests. The layout of facilities shall allow for proper separation of operations to prevent cross-contamination. Equipment
    shall be designed, constructed, and maintained to prevent product contamination and facilitate cleaning and sanitization.
    Environmental monitoring and controls shall be documented.

    '
  applicable_categories:
  - facility
  - contamination-control
  - manufacturing
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-E/part-211
  year: 2024
  tags:
  - facility-design
  - environmental-controls
  - cGMP
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-211.68
  type: guideline_clause
  source: 21 CFR 211.68
  title: Automatic, Mechanical, and Electronic Equipment — Data Integrity
  content: 'Any automatic, mechanical, or electronic equipment, including computers or related systems, used in the manufacture
    of a biological product shall be calibrated, inspected, checked, and maintained on a periodic basis. Equipment performance
    shall be documented and records maintained. Automated systems shall include audit trails that record all data entries,
    modifications, and access. Electronic records shall be protected against unauthorized access, alteration, or loss. System
    validation documentation shall be maintained demonstrating that the equipment performs consistently according to design
    specifications.

    '
  applicable_categories:
  - equipment
  - data-integrity
  - manufacturing
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-E/part-211
  year: 2024
  tags:
  - equipment-maintenance
  - data-integrity
  - validation
  - cGMP
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-211.100
  type: guideline_clause
  source: 21 CFR 211.100
  title: Written Procedures and Deviations
  content: 'There shall be written procedures for all significant steps in the manufacture of a biological product. Any deviations
    from approved procedures shall be documented, investigated, and justified. The investigation shall identify the cause,
    assess the impact on product quality and safety, and define corrective actions taken to prevent recurrence. Deviations
    shall be reviewed and approved by qualified personnel including quality control. Records of deviations, investigations,
    and resolutions shall be maintained and available for regulatory review. Significant deviations may require notification
    to FDA.

    '
  applicable_categories:
  - procedures
  - quality
  - compliance
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-E/part-211
  year: 2024
  tags:
  - procedures
  - deviations
  - investigation
  - cGMP
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-211.110
  type: guideline_clause
  source: 21 CFR 211.110
  title: Sampling and Testing of In-Process Materials
  content: 'Control procedures shall be established to monitor output and to validate the performance of manufacturing processes.
    In-process controls shall be performed at critical control points to ensure that the product is manufactured according
    to specifications. Samples shall be collected and tested using validated methods. The frequency of testing shall be sufficient
    to ensure product quality. In-process test results shall be reviewed before the process continues. Failure to meet in-process
    specifications shall result in investigation and corrective action.

    '
  applicable_categories:
  - process-control
  - testing
  - quality
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-E/part-211
  year: 2024
  tags:
  - in-process-controls
  - process-validation
  - sampling
  - cGMP
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-211.160
  type: guideline_clause
  source: 21 CFR 211.160
  title: General Requirements for Laboratory Controls
  content: 'Each manufacturer shall establish and maintain control procedures to ensure that all components, containers, closures,
    and finished products conform to established specifications. Appropriate laboratory facilities, equipment, and trained
    personnel shall be available. Reference standards and materials shall be established and maintained. Laboratory records
    shall document all testing, including methodology, equipment used, calibration data, results, and approval by qualified
    personnel. Testing shall be performed by qualified individuals under the supervision of a qualified chemist or microbiologist
    or person with comparable training.

    '
  applicable_categories:
  - laboratory
  - testing
  - quality
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-E/part-211
  year: 2024
  tags:
  - laboratory-controls
  - personnel
  - testing
  - cGMP
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-211.165
  type: guideline_clause
  source: 21 CFR 211.165
  title: Testing and Release for Distribution
  content: 'For each batch of a biological product, appropriate laboratory determination of conformance to the established
    specifications shall be made on representative samples using validated test methods. Finished product testing shall include
    all required tests for safety, purity, potency, and identity. No batch shall be released for distribution until all tests
    have been completed and results reviewed and approved by qualified personnel. Records of testing and release decisions
    shall be maintained. The release decision shall be based on compliance with all established specifications and quality
    standards.

    '
  applicable_categories:
  - testing
  - release
  - quality
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-E/part-211
  year: 2024
  tags:
  - batch-release
  - testing
  - quality-control
  - cGMP
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-211.194
  type: guideline_clause
  source: 21 CFR 211.194
  title: Laboratory Records
  content: 'Any production, control, or other laboratory record shall be retained by a manufacturer for a period that is at
    least as long as the shelf life of the product plus one year, or as required by the FDA. Records shall include all testing
    data, methodology employed, identity of testing personnel, date testing was performed, equipment or instruments used,
    calibration data, and the results of all tests. Records shall be readily available for inspection and copying by FDA representatives.
    Laboratory records for finished products shall document the complete quality control results prior to release.

    '
  applicable_categories:
  - records
  - documentation
  - compliance
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-E/part-211
  year: 2024
  tags:
  - record-retention
  - documentation
  - cGMP
  - regulatory-compliance
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-11.10
  type: guideline_clause
  source: 21 CFR Part 11.10
  title: Controls for Closed Systems
  content: 'For closed systems (automated systems with controlled access), manufacturers shall implement system validation
    that includes prospective validation, retrospective validation as appropriate, or revalidation. System validation shall
    address validation of the system as a whole, the level of security appropriate to the system, validation of any modifications,
    and training of users. Closed systems shall be protected from unauthorized access, alteration, or loss of electronic records.
    Change control procedures shall be documented and implemented. Validation documentation shall include protocol, execution,
    and acceptance criteria.

    '
  applicable_categories:
  - electronic-records
  - data-integrity
  - validation
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11
  year: 2024
  tags:
  - electronic-records
  - system-validation
  - closed-systems
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-11.30
  type: guideline_clause
  source: 21 CFR Part 11.30
  title: Controls for Open Systems
  content: 'For open systems (systems where external connections exist or where records are transferred out), manufacturers
    shall implement additional controls. These include validation of systems and external connections, security measures to
    protect against unauthorized access, and procedures for ensuring the authenticity and integrity of records during transmission.
    Where open systems are used, manufacturers shall establish and maintain procedures to ensure that data are not altered
    inappropriately, are protected from unauthorized access, and can be retrieved in their original form.

    '
  applicable_categories:
  - electronic-records
  - data-integrity
  - open-systems
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11
  year: 2024
  tags:
  - electronic-records
  - open-systems
  - data-integrity
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-11.50
  type: guideline_clause
  source: 21 CFR Part 11.50
  title: Signature Manifestations
  content: 'Electronic signatures shall contain all information normally contained in handwritten signatures including the
    printed name of the signer, the date and time of signing, and the meaning (such as reviewed by, approved by, or witnessed
    by). Electronic signatures shall link the signer to the record in a manner that is not susceptible to being altered. When
    an electronic signature is intended to serve as a legally binding signature, it shall be unique to the individual signer
    and shall not be reused or reassigned. The signer shall have the sole authority to execute the signature.

    '
  applicable_categories:
  - electronic-signatures
  - data-integrity
  - documentation
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11
  year: 2024
  tags:
  - electronic-signatures
  - authentication
  - compliance
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-11.100
  type: guideline_clause
  source: 21 CFR Part 11.100
  title: General Requirements for Electronic Signatures
  content: 'Electronic signatures shall be used only by their genuine owners and shall not be reused or reassigned. Before
    or at the time of use, each individual shall have a unique identification code or password that is not shared. The identity
    of the signer and the record being signed shall be securely linked. Where a manufacturer uses electronic signatures as
    a replacement for handwritten signatures, the electronic system shall provide equivalent security, authenticity, non-repudiation,
    and reliability to the handwritten signature. Training shall be provided to all users of electronic signature systems.

    '
  applicable_categories:
  - electronic-signatures
  - authentication
  - user-controls
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-A/part-11
  year: 2024
  tags:
  - electronic-signatures
  - user-authentication
  - compliance
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-312.23
  type: guideline_clause
  source: 21 CFR 312.23
  title: IND Content and Format — Chemistry, Manufacturing, Controls (CMC)
  content: 'An IND application shall include a Chemistry, Manufacturing, and Controls (CMC) section that describes: the composition,
    manufacturer, and specifications of the drug substance and drug product; the manufacturing process including controls
    and process validation data; the controls used for each component; in-process controls and specifications; container closure
    system; stability data supporting the proposed shelf life; analytical methods and their validation; and any impurities
    or degradation products identified. The CMC section shall provide sufficient information to assure the drug''s identity,
    strength, quality, purity, and potency.

    '
  applicable_categories:
  - cmc
  - regulatory-submission
  - manufacturing
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-D/part-312
  year: 2024
  tags:
  - IND
  - CMC
  - regulatory-submission
  - information-requirements
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: 21CFR-312.30
  type: guideline_clause
  source: 21 CFR 312.30
  title: Protocol Amendments
  content: 'A sponsor shall notify the FDA of any changes to a protocol or any additional CMC information that could affect
    the safety of study subjects. Changes to manufacturing processes, sources of drug substance, or test methods that could
    affect product quality shall be reported. Major changes require prior FDA approval (IND Amendment - Type B). Minor changes
    that do not significantly alter the CMC section may be reported at the annual update. All protocol amendments with CMC
    implications shall include supporting data demonstrating that the change does not adversely affect product quality or
    safety.

    '
  applicable_categories:
  - cmc
  - regulatory-compliance
