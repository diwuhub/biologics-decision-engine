- id: 21CFR-601.70
  type: guideline_clause
  source: 21 CFR 601.70
  title: Annual Progress Reports of Postmarketing Studies
  content: 'Each applicant who has a postmarketing study commitment as a condition of approval shall submit an annual report
    documenting the progress of the study. The report shall include: the status of patient accrual and enrollment; any significant
    findings or safety issues; data on primary and secondary endpoints; any modifications to the study protocol; and expected
    completion date. For CMC-related studies (such as stability studies, manufacturing process improvements, or analytical
    method development), the applicant shall provide updated data supporting the approved specifications and shelf life.

    '
