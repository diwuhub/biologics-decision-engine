- id: 21CFR-601.14
  type: guideline_clause
  source: 21 CFR 601.14
  title: Regulatory Hearing for Biologics
  content: 'If FDA issues an order refusing to approve a BLA or withdrawing approval of a biologics license, the applicant
    may request a hearing. The applicant may present additional data or information in support of the application. The hearing
    shall be conducted by an administrative law judge. The applicant has the right to present evidence, cross-examine witnesses,
    and submit arguments. The hearing provides an opportunity to address FDA''s concerns regarding manufacturing, quality,
    safety, purity, potency, or other aspects of the product.

    '
  applicable_categories:
  - regulatory-process
  - dispute-resolution
  confidence: 1.0
  url: https://www.ecfr.gov/current/title-21/chapter-I/subchapter-F/part-601
