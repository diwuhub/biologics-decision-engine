entries:
- id: EU-DIR-001
  type: guideline_clause
  source: EMA/CHMP/BWP/247713
  title: Guideline on Similar Biological Medicinal Products (2014 revision)
  content: 'Establishes the overarching framework for assessment of similar biological medicinal products (biosimilars). Covers
    the principles of comparability, quality-related factors including analytical characterization, animal toxicity testing,
    clinical pharmacology/toxicology, and clinical efficacy and safety requirements. Emphasizes the totality of evidence approach
    where less stringent clinical data may be justified by comprehensive quality comparability.

    '
  applicable_categories:
  - purity
  - potency
  - stability
  - comparability
  confidence: 0.95
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/guideline-similar-biological-medicinal-products_en.pdf
  year: 2014
  tags:
  - biosimilar
  - comparability
  - quality
  content_type: paraphrase
  document_status: final
- id: EU-DIR-002
  type: guideline_clause
  source: EMA/CHMP/BWP/532517
  title: Guideline on Similar Biological Medicinal Products Containing Biotechnology-Derived Proteins - Quality Issues (2014)
  content: 'Detailed quality guidance for biotechnology-derived protein products including recombinant proteins, fusion proteins,
    and antibodies. Addresses analytical characterization methodologies, manufacturing process characterization, container
    closure systems, stability testing protocols, and specification setting. Requires comprehensive structural and functional
    analysis (primary/higher order structure, biological activity, purity assessment).

    '
  applicable_categories:
  - purity
  - potency
  - stability
  - characterization
  confidence: 0.95
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/guideline-similar-biological-medicinal-products-containing-biotechnology-derived-proteins-active-substance_en.pdf
  year: 2014
  tags:
  - biotechnology
