  content_type: paraphrase
  document_status: final
- id: WHO-TRS-005
  type: guideline_clause
  source: WHO
  title: Good Manufacturing Practices for Biological Products (Annex 2 to WHO TRS 937) (2016 revision)
  content: 'WHO''s global GMP standards for biological product manufacturing. Covers facility design and environmental controls,
    personnel qualification, equipment validation, materials management, processing and control operations, change control,
    and quality assurance. Establishes minimum expectations for manufacturing in countries implementing WHO GMP. Specifically
    addresses particulate control, microbial testing, viral safety, and documentation requirements.

    '
  applicable_categories:
  - manufacturing
  - process_validation
  - gmp
  confidence: 0.9
  url: https://www.who.int/publications/details
  year: 2016
  tags:
  - WHO
  - GMP
  - manufacturing
  - global
  authority_quality_tier: strong_secondary
  content_type: paraphrase
  document_status: final
- id: WHO-TRS-006
  type: guideline_clause
  source: WHO
  title: 'Guidelines on Quality of Biotechnological/Biological Products: Stability Testing (2011)'
  content: 'WHO guidance on stability testing protocols specifically tailored for biotechnological products. Specifies storage
    conditions and testing intervals, addresses long-term and intermediate testing for biologics, real-time vs. accelerated
    studies, and product-specific considerations (freeze-thaw stability, freeze-dry products). Emphasizes importance of in-use
    stability data for products requiring reconstitution.

    '
  applicable_categories:
  - stability
  - characterization
  confidence: 0.9
  url: https://www.who.int/publications/details
  year: 2011
  tags:
  - WHO
  - stability
  - biotechnology
  authority_quality_tier: strong_secondary
  content_type: paraphrase
  document_status: final
- id: WHO-TRS-007
  type: guideline_clause
  source: WHO Prequalification Programme
  title: Prequalification Programme Guidelines for Biological Products
  content: 'WHO Prequalification requirements for biological products seeking approval in developing countries and UN agency
    procurement. Establishes that products must meet stringent quality standards equivalent to WHO-listed reference standards.
    Requires comprehensive CMC dossier, full IND-equivalent toxicology and clinical data, and post-approval surveillance.
    Covers vaccines, blood products, hormones, and other biologics.

    '
  applicable_categories:
  - purity
  - potency
  - stability
  - gmp
  confidence: 0.9
  url: https://www.who.int/teams/prequalification-live-agent-registration/prequalification-procedures/prequalification-of-medicines
  year: 2020
  tags:
  - WHO
  - prequalification
  - global
  - quality
  authority_quality_tier: strong_secondary
  content_type: paraphrase
  document_status: final
- id: WHO-TRS-008
  type: guideline_clause
  source: WHO
  title: 'Guidelines on Clinical Evaluation of Vaccines: Regulatory Expectations (2017)'
  content: 'WHO guidance on clinical evaluation of vaccine products addressing immunogenicity assessment, efficacy demonstration,
    safety monitoring in clinical trials, and post-authorization surveillance. While vaccine-specific, establishes principles
    applicable to immunogenic biologics including need for immunogenicity data as efficacy surrogate in some cases.

    '
  applicable_categories:
  - immunogenicity
  - clinical_safety
  confidence: 0.9
  url: https://www.who.int/publications/details
