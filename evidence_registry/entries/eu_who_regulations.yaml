- id: PICS-001
  type: guideline_clause
  source: PIC/S
  title: 'Guide to GMP for Medicinal Products - Annex 2: Manufacture of Biological Medicinal Substances and Products'
  content: 'Pharmaceutical Inspection Convention/Scheme comprehensive GMP requirements for biological products. Covers facility
    design and environmental controls for aseptic processing, equipment cleaning and validation, personnel training, materials
    management, manufacturing process controls, in-process testing, finished product testing, and quality assurance. Addresses
    specific requirements for fermentation processes, mammalian cell culture, viral inactivation, and final product formulation.

    '
  applicable_categories:
  - manufacturing
  - gmp
  - purity
  - potency
  confidence: 0.85
  url: https://www.pic-s.org/publication/gmp-guides
  year: 2022
  tags:
  - PIC/S
  - GMP
  - manufacturing
  - biological
  authority_quality_tier: strong_secondary
  content_type: paraphrase
- id: PICS-002
  type: guideline_clause
  source: PIC/S
  title: Guidance on Data Integrity (2021)
  content: 'Establishes expectations for data integrity in pharmaceutical manufacturing including biological products. Requires
    secure electronic records systems, audit trails, change controls, and user authentication. Addresses prevention of intentional
    falsification, detection of unintentional data loss, and remediation procedures. Critical for CMC submission credibility
    as competent authorities assess data integrity as part of GMP inspection.

    '
  applicable_categories:
  - data_integrity
  - gmp
  confidence: 0.85
  url: https://www.pic-s.org/publication/guides
  year: 2021
  tags:
  - PIC/S
  - data_integrity
  - compliance
  authority_quality_tier: strong_secondary
  content_type: paraphrase
- id: PICS-003
  type: guideline_clause
  source: PIC/S
  title: Recommendations on Validation Master Plan (2007)
  content: 'Provides framework for comprehensive validation master planning in pharmaceutical manufacturing. Establishes hierarchy
    of validation activities including IQ/OQ/PQ (Installation/Operational/Performance Qualification), process validation,
    analytical method validation, and computer system validation. Requires prospective validation for new processes and retroactive/concurrent
    validation under defined circumstances.

    '
  applicable_categories:
  - process_validation
  - analytical_validation
  confidence: 0.85
  url: https://www.pic-s.org/publication/guides
  year: 2007
  tags:
  - PIC/S
  - validation
  - manufacturing
  authority_quality_tier: strong_secondary
  content_type: paraphrase
- id: PMDA-001
  type: guideline_clause
  source: PMDA
  title: Guideline for Quality, Safety and Efficacy Assurance of Follow-on Biologics (2009)
  content: 'PMDA''s framework for follow-on biologics (Japan''s equivalent to biosimilars). Establishes comparability assessment
    approach including analytical, non-clinical, and clinical evaluation. Requires demonstration of comparable quality through
    comprehensive analytical characterization. Clinical data requirements may be reduced based on extent of quality comparability.
    Addresses specific considerations for Japanese patient populations and healthcare context.

    '
  applicable_categories:
  - comparability
  - purity
  - potency
  - safety
  confidence: 0.9
