  document_status: final
- id: WHO-TRS-004
  type: guideline_clause
  source: WHO
  title: Guidelines on Quality, Safety and Efficacy of Biotherapeutic Protein Products Prepared by Recombinant DNA Technology
    (2013)
  content: 'Comprehensive WHO guidance on recombinant protein products covering cell substrate selection and characterization,
    manufacturing process development, analytical characterization (primary structure, post-translational modifications, biological
    activity, impurities), process validation, finished product specifications, and stability testing. Addresses product-specific
    considerations for therapeutic proteins, growth factors, hormones, and enzymes.

    '
  applicable_categories:
  - characterization
  - purity
  - potency
  - stability
  confidence: 0.9
  url: https://www.who.int/publications/details
  year: 2013
  tags:
