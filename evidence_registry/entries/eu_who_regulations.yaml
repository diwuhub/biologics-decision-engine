  content_type: paraphrase
- id: PMDA-002
  type: guideline_clause
  source: PMDA
  title: Notification on Quality, Efficacy and Safety of Biosimilars (2014 revision)
  content: 'PMDA regulatory notification establishing requirements for biosimilar development including manufacturing process
    characterization, analytical comparability studies, non-clinical pharmacology/toxicology assessment, and clinical pharmacology/efficacy/safety
    studies. Specifies that abbreviated regulatory pathways are acceptable when extensive comparability is demonstrated. Addresses
    post-approval surveillance requirements and risk management plans.

    '
