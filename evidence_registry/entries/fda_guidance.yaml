- id: FDA-ANAL-1
  type: guideline_clause
  source: 'FDA Guidance: Specifications for Biotechnological/Biological Products'
  title: CQA Definition, Acceptance Criteria, and Analytical Testing Strategy
  content: 'Critical quality attributes (CQAs) for biologics include identity (amino acid sequence, disulfide bonds, post-translational
    modifications), purity (protein content, host cell proteins, DNA, endotoxins), potency (functional activity by validated
    assay), stability (potency retention over shelf life, aggregate formation), and safety (impurities, extractables, microbial
    contamination). Acceptance criteria should be science-based and justified by reference product data, process capability
    studies, and stability data. Tier-based testing is acceptable if justified; routine testing may differ from release testing
    if risk assessment supports it. Analytical specifications should be harmonized with ICH Q3B/Q6B guidelines where applicable.
    Applicants should justify any attribute not included in routine testing (e.g., host cell DNA measured only at release
    for established processes).

    '
