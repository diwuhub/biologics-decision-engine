- id: FDA-PROC-3
  type: guideline_clause
  source: 'FDA Guidance: Changes to an Approved Application for Specified Biotechnology and Specified Synthetic Dependent
    Biologics Products (2021 Revision)'
  title: Reporting Categories for CMC and Manufacturing Changes
  content: 'CMC changes for specified biologics (including monoclonal antibodies, recombinant proteins, and biosimilars) fall
    into reporting categories: Category 1 (minor, annual report), Category 2 (moderate, prior approval supplement), Category
    3 (major, prior approval supplement). Changes affecting fermentation, purification, formulation, fill-finish, or analytical
    methods must be categorized based on potential impact on quality. Changes in established operating ranges (within validated
    design space) are generally lower risk. Applicants should provide risk assessment rationale, proposed comparability studies,
    and analytical data for Category 2 and 3 changes. Applicants are encouraged to submit comparability protocols to establish
    pre-approved criteria for anticipated Category 2/3 changes.

    '
  applicable_categories:
