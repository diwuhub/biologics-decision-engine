- id: FDA-PROC-6
  type: guideline_clause
  source: 'FDA Guidance: Chemistry, Manufacturing, and Controls (CMC) for Human Pharmaceutical Drug Products and Drug Substances:
    Common Issues'
  title: Design Space and Post-Approval Flexibility for Process Changes
  content: 'Applicants are encouraged to develop and submit design space (the multidimensional combination of input and process
    variables within validated ranges) to support post-approval flexibility. Operating ranges within design space can typically
    support marketing applications without prior approval; changes outside design space require comparability data. Design
    space submission should include justification (e.g., mechanistic understanding, design of experiments) and risk assessment.
    For biologics, design space may encompass ranges of fermentation parameters (e.g., temperature, pH, dissolved oxygen),
    purification column capacities, and buffer compositions if impact on product quality has been characterized. Applicants
    should differentiate between design space (built-in flexibility) and proven acceptable ranges (historical operating ranges).

    '
  applicable_categories:
