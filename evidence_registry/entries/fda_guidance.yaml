- id: FDA-PROC-2
  type: guideline_clause
  source: 'FDA Guidance: CMC Postapproval Manufacturing Changes: General Principles and Approaches'
  title: Risk-Based Change Categories and CMC Reporting Pathways
  content: 'Post-approval manufacturing changes are categorized by risk: Minor changes may be reported in the next annual
    report. Major changes typically require prior approval (PAS) or equivalent procedures. Risk assessment should consider
    impact on product quality, purity, potency, stability, and consistency. Applicants must submit appropriate comparability
    data (analytical, animal, or clinical) proportional to the change. For well-characterized biologics with robust prior
    comparability studies, analytical data alone may suffice for certain changes. Documentation of process understanding and
    design space enables justified omission of additional comparability studies. Change protocol submissions are recommended
    for anticipated, recurring changes.

    '
  applicable_categories:
