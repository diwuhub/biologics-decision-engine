- id: FDA-BIOSIM-7
  type: guideline_clause
  source: 'FDA Guidance: Analytical Procedures and Methods Validation for Drugs and Biologics'
  title: Bioanalytical Method Validation for Biosimilar Comparative Studies
  content: 'Bioanalytical methods for measuring drug concentrations, biomarkers, or antidrug antibodies in clinical samples
    must be validated per ICH Q2(R2) principles. Validation parameters include selectivity, sensitivity (lower limit of quantification),
    accuracy (bias), precision (intra- and inter-assay CV), linearity, range, and stability. For ligand-binding assays (LBA),
    assay reagent stability, matrix effects, and subject sample stability under proposed storage conditions must be established.
    Cross-reactivity with reference product, endogenous analogs, or metabolites must be characterized. Multiple validated
    methods may be necessary for comprehensive characterization (e.g., total drug concentration by LCMS and functional assay
    by cell-based assay).

    '
  applicable_categories:
