- id: FDA-PROC-5
  type: guideline_clause
  source: 'FDA Guidance: Bioanalytical Method Validation and Platform Approaches for Ligand-Binding Assays'
  title: Method Transfer, Reagent Characterization, and Lifecycle Management
  content: 'Bioanalytical method lifecycle management includes initial validation, method transfer to other laboratories,
    and continued suitability monitoring. Method transfer between sites must include parallel runs with both original and
    receiving laboratory methods, with acceptance criteria pre-established (typically <20% difference for key parameters).
    Reagents (antibodies, antigens, reference standards) must be characterized for lot-to-lot consistency; assay reagent qualification
    and stability studies are critical. Platform approaches may be applied if the assay platform is well-characterized and
    individual ligand-binding assays share design elements. Ongoing monitoring of method performance during routine use (quality
    control samples) ensures continued compliance with validation criteria.

    '
  applicable_categories:
