- id: FDA-ANAL-2
  type: guideline_clause
  source: 'FDA Guidance: Characterization of Monoclonal Antibody Products (IND and BLA Applications)'
  title: Structural and Functional Characterization of Charge Variants and Aggregates
  content: 'Comprehensive characterization of monoclonal antibodies should include structural analyses (amino acid sequence,
    N-terminal sequencing, mass spectrometry), post-translational modifications (glycosylation, oxidation, deamidation, sialylation),
    charge heterogeneity (isoelectric focusing, cation-exchange chromatography), higher-order structure (circular dichroism,
    thermal stability), size variants (size-exclusion chromatography, analytical ultracentrifugation), and functional potency
    (ELISA, cell-based assays). Charge variants should be characterized by mass spectrometry to identify underlying modifications.
    Aggregates (soluble and subvisible aggregates) must be quantified; their formation under stress conditions should be evaluated.
    Process development should establish which variants are process-related and acceptable, and which represent degradation
    or risk. Comparability assessments should focus on clinically relevant variants.

    '
