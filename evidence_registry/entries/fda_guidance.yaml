- id: FDA-ANAL-5
  type: guideline_clause
  source: 'FDA Guidance: Extractables and Leachables from Packaging Components for Pharmaceutical Products (PDA Technical
    Report 44)'
  title: Risk Assessment and Analytical Characterization of Container/Closure Systems
  content: 'Container/closure systems for biologics must be evaluated for extractables (substances released from the container
    under stress conditions) and leachables (substances that migrate into the product during normal storage). Risk-based assessment
    should consider contact time, storage temperature, pH, and product polarity. Extractables studies involve contact of solvents
    with container materials under stress (elevated temperature, potentially extended time). Identified extractables should
    be qualified (assessed for safety relevance). Leachables studies involve actual product stability under normal storage,
    with analysis of extracted analytes. Acceptance criteria should ensure that levels of concern are below safety thresholds.
    For novel containers or biologics with unique characteristics, additional testing may be warranted.

    '
  applicable_categories:
