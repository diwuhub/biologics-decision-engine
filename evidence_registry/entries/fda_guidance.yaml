entries:
- id: FDA-BIOSIM-1
  type: guideline_clause
  source: 'FDA Guidance: Scientific Considerations in Demonstrating Biosimilarity'
  title: Stepwise Comparative Approach and Totality of Evidence Framework
  content: 'The assessment of biosimilarity should follow a stepwise, totality-of-evidence approach using comparative analytical,
    animal toxicity, clinical pharmacology (PK/PD), and clinical immunogenicity studies. Each level of investigation builds
    on prior findings to establish sufficient similarity. No single study is determinative; the strength of evidence from
    one study can compensate for limitations in others. Comparative clinical immunogenicity assessment is critical given potential
    differences in impurities and manufacturing processes.

    '
  applicable_categories:
