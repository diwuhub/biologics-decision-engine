- id: FDA-BIOSIM-6
  type: guideline_clause
  source: 'FDA Guidance: Biosimilars: Additional Questions and Answers (2024 Revision)'
  title: Interchangeability Designation and Post-Approval Comparative Manufacturing Studies
  content: 'Interchangeability beyond switching may be supported by demonstration of highly similar analytical profiles, animal
    toxicity, clinical pharmacology, and clinical immunogenicity data, plus additional comparative clinical data (usually
    at least two comparative controlled clinical trials in different patient populations). Post-approval manufacturing changes
    require risk-based comparability protocols; non-major changes may proceed with analytical data alone if robust prior comparability
    has been established. Applicants should discuss interchangeability strategy with FDA at pre-BLA meeting. Pharmacovigilance
    post-approval must track switching events and any unexpected adverse events in interchangeability populations.

    '
  applicable_categories:
