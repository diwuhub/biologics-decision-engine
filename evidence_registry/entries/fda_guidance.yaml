- id: FDA-ANAL-6
  type: guideline_clause
  source: 'FDA Guidance: Analytical Procedures and Methods Validation for Drugs and Biologics (Q2(R2) Alignment)'
  title: Development and Validation of Potency and Immunoassay Methods
  content: 'Analytical methods for biologics must be developed and validated per ICH Q2(R2) principles. For potency assays,
    relevant biological systems (cell-based assays, enzyme-linked immunosorbent assays, competitive immunoassays) should be
    employed. Cell-based assays require characterization of cell line origin, passage number limits, viability acceptance
    criteria, and reference standard responsiveness. Ligand-binding assays require optimization of antibody pairs or reagents,
    assay format (sandwich, competitive), and signal detection method. Validation parameters include specificity (selectivity
    for target analyte), sensitivity (lower limit of quantification), accuracy (recovery, systematic bias), precision (intra-
    and inter-assay reproducibility), linearity, range, and robustness. For immunoassays, critical parameters (pH, temperature,
    incubation time) should be evaluated in robustness studies.

    '
