- id: FDA-ANAL-4
  type: guideline_clause
  source: 'FDA Guidance: Stability Testing of Drug Substances and Drug Products (ICH Q1A, Q1B Alignment)'
  title: Stability Study Design for Biological Products
  content: 'Stability studies for biologics should be designed per ICH Q1A(R2) and Q1B(R2) guidelines. Long-term studies (typically
    36 months) at the proposed storage condition are required to support shelf life. Intermediate and accelerated studies
    (if applicable) may help predict degradation pathways. For biologics, accelerated conditions often involve elevated temperature
    or light (if applicable) rather than humidity. Stability-indicating analytical methods are essential; methods must detect
    known degradation products (e.g., aggregates, oxidized forms, fragments). Acceptance criteria should be justified based
    on initial batch data and process capability. Stability data should support all critical quality attributes (potency,
    purity, identity, safety). For biosimilars, comparative stability data (side-by-side with reference product under identical
    conditions) may support extrapolation of shelf life if analytical and clinical data are similar.

    '
  applicable_categories:
