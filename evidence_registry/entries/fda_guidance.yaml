- id: FDA-BIOSIM-3
  type: guideline_clause
  source: 'FDA Guidance: Statistical Approaches to Evaluate Analytical Similarity'
  title: Equivalence Testing and Quality Specification Ranges
  content: 'Statistical comparability of analytical attributes between the proposed biosimilar and reference product should
    be established using equivalence testing rather than difference testing. The applicant should pre-specify equivalence
    margins (acceptance criteria) before conducting analyses. For normally-distributed continuous data, two one-sided tests
    (TOST) or confidence interval approach is appropriate. For non-normal data, appropriate transformations or non-parametric
    methods should be justified. Quality ranges should be derived from historical reference product data supplemented by proposed
    product data. Acceptance criteria should be narrow enough to ensure clinically relevant similarity.

    '
  applicable_categories:
