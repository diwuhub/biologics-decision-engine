- id: FDA-ANAL-3
  type: guideline_clause
  source: 'FDA Guidance: Use of Reference Standards (ICH-Based; FDA Alignment)'
  title: Establishment and Qualification of Reference Standards for Biologics
  content: 'Reference standards for biologics should be qualified per ICH Q3B/Q4B principles. For therapeutic proteins (monoclonal
    antibodies, recombinant proteins), a primary reference standard (PRS) is typically the reference product or a lot-matched
    material with extensive characterization. Secondary reference standards may be established from calibrated lots if analytical
    comparability to the PRS has been demonstrated. Qualification of a secondary standard requires comparative analytical
    data (potency, identity, purity assays) and stability data. Documentation should include certificate of analysis, characterization
    data, storage conditions, and stability data (real-time, accelerated). For new assays, reference standard qualification
    may require additional lot-to-lot comparability data and suitability assessment across intended uses.

    '
  applicable_categories:
