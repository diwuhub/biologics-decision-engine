- id: FDA-BIOSIM-5
  type: guideline_clause
  source: 'FDA Guidance: Clinical Immunogenicity Considerations for Biosimilar Therapeutic Protein Products'
  title: Antidrug Antibody Assessment and Clinical Safety Implications
  content: 'Clinical immunogenicity assessment, including measurement of antidrug antibodies (ADA) and neutralizing antibodies
    (NAb), is essential for biosimilar applications. Studies should prospectively evaluate the incidence, titer, and kinetics
    of ADA/NAb responses in the proposed biosimilar and reference product arms. Sensitive and specific immunoassay methods
    (ELISA or electrochemiluminescence) must be pre-validated. Clinical relevance must be established by correlating ADA formation
    with pharmacokinetic changes, loss of efficacy, injection site reactions, or infusion reactions. Safety signals (e.g.,
    unexpected adverse events in the biosimilar arm) must be evaluated for association with immunogenicity.

    '
  applicable_categories:
  - safety
  - immunogenicity
  - potency
  confidence: 0.95
