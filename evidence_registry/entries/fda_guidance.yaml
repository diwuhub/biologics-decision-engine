- id: FDA-BIOSIM-8
  type: guideline_clause
  source: 'FDA Guidance: Comparability Protocols for Human Drugs and Biologics - Chemistry, Manufacturing, and Controls Information'
  title: Pre-Approved CMC Change Protocols for Biosimilars
  content: 'Approved applicants may submit comparability protocols that establish pre-approved analytical, animal toxicity,
    and clinical pharmacology criteria for certain CMC changes without regulatory review and approval before implementation.
    Protocols are particularly useful for biosimilars where manufacturing flexibility is limited. Changes subject to protocols
    must be low-risk (e.g., minor supplier changes, process optimization within established operating ranges). High-risk changes
    (e.g., new expression system, altered purification strategy, significant process capability changes) cannot be included
    in protocols. Applicants must justify that comparability criteria are appropriate to detect clinically relevant changes.

    '
