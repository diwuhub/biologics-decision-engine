- id: FDA-BIOSIM-4
  type: guideline_clause
  source: 'FDA Guidance: Clinical Pharmacology Data to Support a Demonstration of Biosimilarity to a Monoclonal Antibody Reference
    Product'
  title: PK/PD Study Design and Bioanalytical Methods for Biosimilars
  content: 'Comparative pharmacokinetic and pharmacodynamic studies in a PD-responsive population are critical components
    of biosimilarity demonstration. Study design should employ crossover or parallel designs with adequate sample size (typically
    50-150 subjects per arm) to detect clinically meaningful differences. Serum concentration and biomarker measurements should
    use validated bioanalytical methods (LCMS or immunoassay) with sensitivity and specificity adequate to characterize the
    dose-concentration-response relationship. Antidrug antibody formation must be monitored throughout the study as it may
    confound PK/PD assessments and impact clinical relevance of observed differences.

    '
  applicable_categories:
  - potency
