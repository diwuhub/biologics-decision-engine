- id: FDA-BIOSIM-2
  type: guideline_clause
  source: 'FDA Guidance: Quality Considerations in Demonstrating Biosimilarity of a Therapeutic Protein Product'
  title: Analytical Similarity Tier Testing and Justification Strategy
  content: 'Analytical similarity assessment should employ a tiered approach based on risk. Tier 1 studies address structural
    and functional similarity (charge variants, higher-order structure, potency). Tier 2 studies address additional functional
    assays and animal toxicity when Tier 1 data raise concerns. Tier 3 includes general toxicity studies if analytical differences
    cannot be resolved. The applicant must justify the testing matrix and rationale for omitting certain studies based on
    risk assessment. Particle analysis, subvisible particles, and microbiological attributes require attention given process
    differences.

    '
  applicable_categories:
