- id: FDA-EXP-005
  type: guideline_clause
  source: 'FDA Guidance: Formal Meetings Between the FDA and Sponsors or Applicants of BLAs (Pre-BLA, End-of-Phase II, etc.)'
  title: Pre-BLA Meeting Strategy and Information Submission Requirements
  content: 'Pre-BLA meetings are encouraged to discuss development plans, regulatory pathway, CMC data needs, analytical similarity
    strategy (for biosimilars), clinical study design, and post-approval plans. Meeting requests should include a briefing
    package with proposed agenda, regulatory questions, and supporting data summaries. FDA will provide responses and recommendations
    addressing key decision points. Meeting minutes should be agreed upon and maintained. Pre-BLA meetings are particularly
    important for novel products (advanced therapy medicinal products, continuous manufacturing) to establish alignment on
    CMC expectations and comparative testing strategies. End-of-Phase II meetings may address transition from exploratory
    to pivotal clinical studies. Applicants should use meetings to clarify reference product selection criteria, accept ability
    of analytical similarity approaches, and discuss interchangeability strategy.

    '
  applicable_categories:
