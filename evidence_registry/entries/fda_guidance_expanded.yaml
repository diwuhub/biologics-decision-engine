- id: FDA-EXP-030
  type: guideline_clause
  source: 'FDA Guidance: Control and Characterization of Host Cell Proteins in Recombinant Therapeutic Protein Products'
  title: HCP Detection Methods, Acceptance Criteria, and Mechanism of Unwanted Response
  content: 'Host cell proteins (HCPs) are non-target proteins from the production cell line (typically CHO, E. coli, yeast)
    that may copurify with the therapeutic protein. HCP levels should be minimized through purification process development;
    acceptance criteria (typically <100-1000 ppm depending on therapeutic class) should be established based on manufacturing
    capability and toxicity data. HCP detection methods (ELISA with HCP-specific antibodies, mass spectrometry) must be validated
    for specificity, sensitivity, and reproducibility. Acceptance criteria should account for assay variability. Process characterization
    studies should establish typical HCP levels and variability range. Residual HCPs may elicit adverse immune responses (anti-HCP
    antibodies) or cause direct toxicity; clinical immunogenicity assessment should monitor for such responses. For biosimilar
    products, HCP levels and profiles may differ from reference product due to manufacturing process differences; impact on
    immunogenicity and safety should be assessed comparatively. HCP spiking studies may be employed to establish safety margins.

    '
