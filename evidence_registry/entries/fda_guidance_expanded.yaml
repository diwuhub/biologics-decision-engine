- id: FDA-EXP-012
  type: guideline_clause
  source: 'FDA Guidance: Scientific Considerations in Demonstrating Biosimilarity — Reference Product Exclusivity'
  title: Selection of Appropriate Reference Product and Extrapolation of Indications
  content: 'For biosimilar development, the reference product must be approved in the United States (U.S. licensed biologics).
    The applicant should select a reference product representative of the active moiety on the U.S. market; demonstration
    of biosimilarity to one licensed reference product does not necessarily establish biosimilarity to other versions or formulations
    of the same active ingredient. Reference product lots used for comparative studies should span multiple manufacturing
    runs, formulations, and storage conditions to ensure representative characterization. Indications approved for the reference
    product may be extrapolated to the biosimilar if sufficient analytical, nonclinical, and clinical data support such extrapolation.
    Complete in-indication clinical data may not be necessary for all reference product indications if pharmacokinetics, pharmacodynamics,
    and mechanism of action are similar and preclinical/clinical data support extrapolation. Pre-BLA meetings should address
    reference product selection and indication extrapolation rationale.

    '
  applicable_categories:
