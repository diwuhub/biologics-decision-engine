- id: FDA-EXP-016
  type: guideline_clause
  source: 'FDA Guidance: Questions and Answers on Biosimilar Development and the BPCI Act (2024 Revision)'
  title: Interchangeability, Switching Events, and Post-Approval Regulatory Updates
  content: 'Interchangeability designation (ability to switch between reference and biosimilar without clinical intervention)
    requires additional clinical data demonstrating highly similar efficacy and safety in two different patient populations
    or disease indications. Switching studies should randomize patients between reference product and proposed biosimilar
    and measure clinical outcomes. Multiple switching events may be evaluated in long-term follow-up. Post-approval pharmacovigilance
    must track switching events and any unexpected adverse events temporally associated with switching. Applicants should
    consider interchangeability strategy during development and discuss in pre-BLA meetings. Non-interchangeable biosimilars
    may be preferred in certain clinical contexts (e.g., high-potency biologics with narrow therapeutic windows). Regulatory
    guidance on biosimilar naming, labeling, and competitive positioning continues to evolve; applicants should remain current
    with FDA updates.

    '
