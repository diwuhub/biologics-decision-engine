entries:
- id: FDA-EXP-001
  type: guideline_clause
  source: 'FDA Guidance: Characterization and Qualification of Cell Substrates and Other Biological Materials Used in the
    Production of Viral Vaccines'
  title: Cell Substrate Characterization, Identity, Purity, and Viral Safety
  content: 'Cell substrates used in vaccine production must undergo comprehensive characterization including identification
    of cell line origin (species, tissue of origin, morphology), viability assessment, stability testing (passage limits),
    and sterility/mycoplasma testing. Biological materials (bovine serum, cell culture media components) must be sourced from
    qualified suppliers with documented purity and safety. Viral safety of cell substrates and biological materials must be
    established through appropriately sensitive in vitro and in vivo assays. For continuous cell lines, tumorigenicity testing
    may be required. Identity markers (isoenzymes, cytochrome analysis, karyotype) should be established at earliest and latest
    passage numbers used in manufacturing. Host cell DNA residual levels and RNA detection assays should be validated and
    monitored to detect adventitious agents.

    '
  applicable_categories:
