- id: FDA-EXP-003
  type: guideline_clause
  source: 'FDA Guidance: Content and Format of Chemistry, Manufacturing and Controls Information and Establishment Description
    Information for a Vaccine or Related Product'
  title: CMC Module Organization and Acceptance Criteria for Vaccines
  content: 'Vaccine CMC sections must include manufacturing process narrative (including scale-up rationale), in-process control
    specifications with acceptance criteria, finished product specifications (potency, purity, safety), stability protocol
    and data, analytical procedures with validation data, container/closure system data, and environmental assessment (for
    live vaccines). For viral vaccines, seed lot quality (characterization, adventitious agent testing) and continuous manufacturing
    controls are essential. Potency specifications should be justified using reference lots and manufacturing variability
    data. Impurity profiling (host cell proteins, residual DNA, process-related impurities) must support safety and efficacy.
    Comparability protocols may be submitted to pre-approve anticipated changes to cell substrates, seed lots, or manufacturing
    processes. Post-approval stability must be monitored for at least two years of commercial product.

    '
  applicable_categories:
