- id: FDA-EXP-010
  type: guideline_clause
  source: 'FDA Guidance: Immunogenicity Assessment for Therapeutic Protein Products'
  title: Anti-Drug Antibody Detection, Characterization, and Clinical Significance
  content: 'Immunogenicity assessment for therapeutic protein biologics should include testing for anti-drug antibodies (ADA)
    both in nonclinical (animal) and clinical studies. ADA testing should employ validated immunoassay methods (ELISA, electrochemiluminescence,
    surface plasmon resonance) with adequate sensitivity. Samples should be titered to characterize the magnitude of response.
    Functional antibodies (neutralizing antibodies) should be measured if mechanism of action suggests potential for loss
    of activity. In clinical studies, ADA incidence should be compared between proposed product and reference product (for
    biosimilars). ADA-positive subjects should be monitored for pharmacokinetic changes (accelerated clearance) and loss of
    efficacy. Safety signals (unexpected adverse events, infusion reactions) in ADA-positive subjects must be investigated.
    Dose, route, and frequency of administration may impact immunogenicity; these factors should inform study design.

    '
  applicable_categories:
