- id: FDA-EXP-004
  type: guideline_clause
  source: 'FDA Guidance: Potency Tests for Cellular and Gene Therapy Products'
  title: In Vitro and In Vivo Potency Assay Development and Validation
  content: 'Potency assays for cell therapy products must measure the therapeutic activity of the cell product in a clinically
    relevant manner. In vitro assays (proliferation, differentiation, cytokine production, migration) should be developed
    if validated methods exist. In vivo potency assays may be necessary if in vitro methods cannot capture clinical benefit.
    Assay validation should address accuracy (recovery of spiked material), precision (intra- and inter-assay variability),
    specificity (absence of cross-reactivity with non-therapeutic components), and sensitivity. Acceptance criteria should
    be justified by manufacturing process capability and nonclinical/clinical data correlation. Multiple potency assays may
    be required to characterize different aspects of therapeutic activity (e.g., viability, functionality, immunomodulatory
    capacity). For gene therapy, potency should measure functional gene expression and therapeutic activity, not merely transgene
    copy number.

    '
  applicable_categories:
  - potency
  - safety
