- id: FDA-EXP-021
  type: guideline_clause
  source: 'FDA Guidance: Investigating Out-of-Specification Test Results for Pharmaceutical Production'
  title: Root Cause Analysis, Batch Disposition, and Prevention Strategies
  content: 'Out-of-specification (OOS) test results must trigger comprehensive investigation including repeat testing (if
    sample available) to rule out analytical error. Root cause analysis should examine sample handling, test method performance,
    system performance (e.g., instrument calibration, environmental conditions), and process performance. Investigation documentation
    must include timeline of events, root cause hypothesis, supporting evidence, and proposed corrective/preventive actions.
    Batch disposition decisions must consider clinical risk, evidence of product quality, and public health impact. Retest
    of failed lots may be permitted if justified by scientific evidence; batch rejection should occur if evidence of non-conformance
    exists. Repeat testing of OOS results using the same method and comparable conditions should be evaluated cautiously (potential
    for bias). For biologics, OOS results in critical quality attributes (potency, purity, identity) may trigger more conservative
    batch disposition (rejection) due to inherent variability in biological assays.

    '
