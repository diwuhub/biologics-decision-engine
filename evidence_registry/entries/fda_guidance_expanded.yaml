- id: FDA-EXP-019
  type: guideline_clause
  source: 'FDA Guidance: Process Validation: Collection and Evaluation of Data (2020 Revision)'
  title: Data Collection, Statistical Analysis, and Continued Process Verification Strategies
  content: 'Process validation for biologics should employ data collection throughout manufacturing to establish process capability
    and statistical confidence in control strategies. Stage 1 (Process Design) establishes critical process parameters (CPPs)
    and critical quality attributes (CQAs) through studies during development. Stage 2 (Process Qualification) evaluates at
    least three commercial-scale batches; statistical approaches should confirm that CQAs meet specifications with high confidence
    (typically 95-99% confidence intervals should be within specifications). Stage 3 (Continued Process Verification) employs
    ongoing monitoring of commercial batches using trend analysis, statistical process control (SPC) charts, and risk-based
    sampling. Data should be evaluated for trends indicating process drift. Root cause investigations should be triggered
    if trends or out-of-specification results occur. For well-established processes, historical batch data may support Stage
    3 without additional batches if risk assessment justifies this approach.

    '
  applicable_categories:
