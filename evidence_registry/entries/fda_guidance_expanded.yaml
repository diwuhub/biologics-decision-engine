- id: FDA-EXP-027
  type: guideline_clause
  source: 'FDA Guidance: Extractables and Leachables from Packaging Components for Pharmaceutical Products (PDA Technical
    Report 44 / FDA Alignment)'
  title: Risk-Based Testing Strategy for Container/Closure Systems
  content: 'Extractables and leachables (E&L) assessment for biologics must employ a risk-based approach considering product
    polarity, storage conditions, container material composition, and contact surface area/time. Extractables testing uses
    exaggerated conditions (elevated temperature, potentially extended contact, aggressive solvents simulating product polarity).
    Identified extractables should be qualified for safety relevance using notified body assessments, published literature,
    or dedicated toxicity studies. Leachables testing involves actual product stability under normal storage conditions with
    analysis of migrated components. Acceptance criteria should ensure that identified leachables remain below safety thresholds.
    For novel containers or biologics with unique characteristics (e.g., very low pH, high polarity), additional testing may
    be warranted. Quality agreement with container suppliers should address extractables specifications and testing documentation.
    Container integrity (glass delamination for vials, particulates) should be monitored as part of specification testing.

    '
