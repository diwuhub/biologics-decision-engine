- id: FDA-EXP-011
  type: guideline_clause
  source: 'FDA Guidance: Immunogenicity Testing of Therapeutic Protein Products — Developing and Validating Assays for Anti-Drug
    Antibodies (2019 Revision)'
  title: Method Development, Validation, and Assay Reagent Characterization for ADA Testing
  content: 'Assays for anti-drug antibodies must be developed and validated according to ICH Q2(R2) principles. Assay format
    typically employs sandwich immunoassay architecture with capture and detection arms specific to ADA. Positive control
    reagents (human ADA or rabbit anti-idiotype antibodies) must be characterized and calibrated. Assay optimization must
    address critical parameters affecting sensitivity, specificity, and reproducibility. Validation must demonstrate freedom
    from interference (e.g., circulating drug, complement components). Clinical sample testing strategy should include screening
    (single dilution) followed by confirmation (repeat with alternative method or orthogonal technique) to reduce false positives.
    Borderline samples (near assay cutoff) should be retested or confirmed. Assay reagent lot-to-lot consistency must be monitored
    through quality control practices. Time-point selection in clinical studies should capture peak ADA responses post-dose.

    '
  applicable_categories:
