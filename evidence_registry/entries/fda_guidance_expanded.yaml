- id: FDA-EXP-017
  type: guideline_clause
  source: 'FDA Guidance: Drug Products, Including Biological Products, that Contain Nanomaterials — Guidance for Industry'
  title: Characterization, Safety, and CMC Considerations for Nano-Formulated Biologics
  content: 'Drug products containing nanomaterials (e.g., nanoparticles, liposomes, micelles, polymer conjugates) must provide
    comprehensive characterization of nanoparticle composition, size distribution, surface properties, and stability. Analytical
    methods must be capable of detecting and quantifying nanoparticles in final product and biological samples. In-process
    controls and specifications must address nanoparticle characteristics relevant to product safety and efficacy. Extractables
    and leachables studies must consider nanoparticle shedding or degradation under proposed storage conditions. Biocompatibility
    of nanoparticle materials should be assessed. Tissue distribution, clearance, and accumulation of nanoparticles must be
    evaluated in nonclinical studies if not addressed in clinical pharmacology. For biologics conjugated to nanoparticles
    (e.g., antibody-drug conjugates on nanocarriers), both the biologic and carrier must be adequately characterized. Labeling
    should communicate nanoparticle content and special handling/storage requirements if applicable.

    '
  applicable_categories:
