- id: FDA-EXP-007
  type: guideline_clause
  source: 'FDA Guidance: Container Closure System Integrity Testing in Lieu of Sterility Testing'
  title: Robustness Testing and Equivalence to Sterility Assays
  content: 'For certain biologics, container/closure integrity testing (CCIT) may provide an acceptable alternative to or
    supplement sterility testing if process control and CCIT data are robust. CCIT methods include dye ingress, helium leak,
    pressure hold, vacuum decay, and other physical integrity tests. CCIT must be validated to demonstrate equivalence to
    detecting the same degree of microbial contamination that sterility testing would detect. Critical parameters (worst-case
    temperature, humidity, storage duration) must be established. CCIT data should support sterile batch release when coupled
    with robust environmental monitoring and process controls. This approach is particularly applicable to products with established
    aseptic processing and tight process controls. Pre-BLA alignment with FDA is necessary; not all products or conditions
    support CCIT-only release strategies.

    '
  applicable_categories:
