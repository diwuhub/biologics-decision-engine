- id: FDA-EXP-029
  type: guideline_clause
  source: 'FDA Guidance: Testing of Cell Substrates and Other Biological Materials Used in Vaccine Production (Adventitious
    Agent Testing)'
  title: In Vitro, In Vivo, and Molecular Testing for Viral and Microbial Contaminants
  content: 'Adventitious agent testing of cell substrates and biological materials (serum, growth factors) must employ appropriately
    sensitive in vitro, in vivo, and molecular methods to detect potential viral and microbial contaminants. In vitro testing
    may include co-cultivation with susceptible cell lines, electron microscopy for viral particles, and PCR for known viruses.
    In vivo testing may include inoculation into animals (guinea pigs, mice) and observation for viral symptoms or seroconversion.
    Molecular methods (RT-PCR, qPCR) should target common contaminant viruses (retroviruses, herpesviruses, paramyxoviruses,
    picornaviruses). Testing scope should be justified based on source material history and manufacturing process controls.
    Positive results require investigation and batch disposition decisions (rejection if contamination confirmed). Cell bank
    testing (PCB, WCB, MCB) should include comprehensive adventitious agent testing before use. Ongoing surveillance of production
    batches may employ targeted testing if process controls are robust.

    '
