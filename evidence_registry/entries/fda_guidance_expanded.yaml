- id: FDA-EXP-013
  type: guideline_clause
  source: 'FDA Guidance: Labeling for Biosimilar Products'
  title: Designation, Prescribing Information, and Risk Minimization Strategies
  content: 'Biosimilar products must be designated with a unique nonproprietary name suffix to distinguish them from the reference
    product (e.g., filgrastim-sndz for Zarxio). Labeling must clearly communicate biosimilar status, comparative manufacturing
    process, and clinical comparability data. Prescribing information should be consistent with the reference product where
    possible, but may differ in sections addressing manufacturing, stability, or precautions supported by comparative clinical
    data. Risk evaluation and mitigation strategies (REMS) may be required if the reference product has REMS; biosimilar REMS
    should address interchangeability designation (if applicable). Healthcare providers should be educated about biosimilar
    designation and distinctions from the reference product. Adverse event reporting and pharmacovigilance should monitor
    for unexpected safety signals post-approval, particularly in patients switched from reference product to biosimilar.

    '
  applicable_categories:
