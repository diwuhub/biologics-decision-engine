- id: FDA-EXP-015
  type: guideline_clause
  source: 'FDA Guidance: Considerations in Planning a Pediatric Study Using a Proposed Biosimilar'
  title: Extrapolation to Pediatric Populations and Study Design Considerations
  content: 'Pediatric biosimilar studies may extrapolate from adult comparability data if pharmacokinetics, pharmacodynamics,
    and disease pathophysiology are similar across age groups. Studies should address pediatric dosing requirements and administration
    feasibility. For some indications (e.g., growth hormone, cancer), dose adjustment based on body weight or body surface
    area may be necessary; biosimilar dosing should follow reference product guidance. Clinical pharmacology studies in pediatric
    populations may be limited in scope if extrapolation is scientifically justified. Immunogenicity assessment in children
    may reveal different ADA prevalence or clinical significance compared to adults; immunogenicity studies may be required
    even if adult studies demonstrate biosimilarity. Pediatric labeling should reflect any pediatric-specific findings. Safety
    and efficacy data in pediatric populations should support proposed indications in children.

    '
  applicable_categories:
