- id: FDA-EXP-022
  type: guideline_clause
  source: 'FDA Guidance: Hold-Time Studies for Pharmaceutical Products'
  title: In-Process Hold Times and Stability During Manufacturing
  content: 'Hold-time studies for biologics establish the maximum allowable time between manufacturing steps (e.g., after
    purification before filling, during frozen storage awaiting formulation) while maintaining product quality. Studies should
    be conducted under conditions simulating worst-case manufacturing scenarios (e.g., room temperature for intermediate steps,
    typical refrigerated conditions). Sampling time-points should reflect proposed manufacturing hold times plus margin. Critical
    quality attributes should be monitored: potency retention (at least 90% is often acceptable), aggregate formation, endotoxin
    levels (if applicable), sterility (if pre-filled stage). Hold times should be justified by manufacturing process flow
    and data demonstrating acceptable product stability. For continuous manufacturing, residence time distributions and in-process
    hold times must be evaluated separately. Proposed hold times should be conservative to account for manufacturing variability
    and worst-case conditions.

    '
