- id: FDA-EXP-026
  type: guideline_clause
  source: 'FDA Guidance: Use of Reference Standards and Pharmacopeial Standards in IND and BLA Applications (ICH Q3B/Q4B Alignment)'
  title: Characterization and Documentation of Reference Materials
  content: 'Reference standards for biologics must be qualified per ICH standards with appropriate characterization and documentation.
    For therapeutic proteins, primary reference standards (PRS) are typically approved reference products or well-characterized
    production lots. Secondary reference standards (SRS) may be established if comparative analytical data demonstrate equivalence
    to PRS across relevant CQAs. Qualification documentation should include certificate of analysis listing all relevant test
    results, stability data (real-time and accelerated), storage conditions, shelf life, and lot-to-lot variability. Pharmacopeial
    standards (USP, BP, EP) may be used if available and appropriate for the specific biologic. Reference standard stability
    must be monitored post-implementation using reference samples. Lot changes to reference standards used in nonclinical/clinical
    studies should be considered when assessing comparative data.

