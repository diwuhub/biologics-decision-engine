- id: FDA-EXP-018
  type: guideline_clause
  source: 'FDA Guidance: Emerging Technology Program'
  title: Advanced Manufacturing, Real-Time Release Testing, and Risk-Based Approaches
  content: 'The FDA Emerging Technology Program supports innovative manufacturing approaches for biologics including continuous
    manufacturing, advanced analytical methods (PAT—Process Analytical Technology), real-time release testing (RTRT), and
    other novel strategies. Applicants pursuing emerging technologies should engage with FDA early through pre-BLA meetings
    to discuss regulatory expectations and provide justification for alternative approaches. Real-time release testing may
    replace or supplement traditional end-of-batch testing if supported by robust analytical data and process controls. Process
    analytical technology (PAT) tools (e.g., spectroscopy, particle size analysis) may be employed during manufacturing for
    in-process monitoring and control. Design space and multivariate data analysis must support post-approval flexibility.
    Documentation of process understanding (mechanistic modeling, design of experiments) is essential. The program aims to
    accelerate patient access to innovative biologics while maintaining safety and efficacy.

    '
