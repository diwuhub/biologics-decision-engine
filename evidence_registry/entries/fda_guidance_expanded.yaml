- id: FDA-EXP-002
  type: guideline_clause
  source: 'FDA Guidance: Q5D Derivation and Characterisation of Cell Substrates Used for Production of Biotechnological/Biological
    Products (ICH Alignment)'
  title: Primary, Working, and Production Cell Bank Characterization
  content: 'Cell banks used for biotechnological product manufacturing must be characterized at multiple levels. Primary cell
    banks (PCB) are the source material established from a single source (e.g., an initial viral seed). Working cell banks
    (WCB) are derived from PCB and used to produce manufacturing cell banks. Production cell banks (MCB/PCA) are inoculated
    into bioreactors for manufacturing. Each bank tier must have documented identity, viability, sterility, mycoplasma testing,
    and adventitious agent testing. Passage number limits must be justified by stability studies. Genetic stability (karyotype,
    copy number of transgene) should be assessed at relevant passage numbers. Phenotypic stability (morphology, growth characteristics,
    marker expression) must be monitored. Cell bank qualification must precede scale-up. Retroactively characterized cell
    banks may require additional justification if inadequate documentation exists.

    '
  applicable_categories:
