- id: FDA-EXP-032
  type: guideline_clause
  source: 'FDA Guidance: Microbial Limits for Non-Sterile Products (USP/EP/BP Alignment)'
  title: Acceptance Criteria and Testing Methods for Aerobic and Anaerobic Microorganisms
  content: 'Non-sterile biologics (some vaccines, immunoglobulins) must meet microbial limits for total aerobic microbial
    count (TAMC) and total combined yeasts/molds count (TYMC). Acceptance criteria vary by route and product class; typical
    limits are <10^4 CFU/g (TAMC) and <10^3 CFU/g (TYMC) for non-sterile products. Specified microorganisms (Escherichia coli,
    Salmonella, Staphylococcus aureus, Pseudomonas aeruginosa) should be absent. Testing methods should follow USP <2023>,
    <2021>, <2022> (microbial enumeration and identification). For biologics with poor microbiological stability, accelerated
    microbial limits testing at elevated temperature may be employed to predict shelf-life microbial counts. In-process monitoring
    of manufacturing environment (air, surfaces, personnel) should complement finished product testing. Batch rejection or
    retreat should occur if microbial limits are exceeded.

    '
