- id: FDA-EXP-025
  type: guideline_clause
  source: 'FDA Guidance: Considerations for the Design of Early-Phase Clinical Trials of Cellular and Gene Therapy Products'
  title: Safety Monitoring, Dose Escalation, and Pharmacokinetic/Pharmacodynamic Assessment
  content: 'Early-phase clinical trials for cellular and gene therapy products (Phase I/II) should prioritize safety assessment.
    Study design should include careful dose escalation to identify maximum tolerated dose (MTD) or biologically effective
    dose. Intensive safety monitoring should address infusion/injection reactions, systemic toxicity, organ-specific toxicity,
    and genotoxicity (for gene therapy). Pharmacokinetic studies should measure cell persistence, biodistribution, and clearance
    kinetics. Pharmacodynamic assessments should measure biomarker response and mechanistic activity (e.g., cytokine production
    for CAR-T therapies). Long-term follow-up is essential given potential for delayed adverse events or genotoxicity. Animal
    toxicity studies should precede human dosing and address species-specific responses. Risk-based approach should guide
    study population selection, monitoring intensity, and stopping rules. Pre-IND meetings with FDA are encouraged to discuss
    trial design, endpoints, and safety monitoring strategies.

    '
