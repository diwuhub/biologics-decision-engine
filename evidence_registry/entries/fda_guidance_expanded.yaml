- id: FDA-EXP-009
  type: guideline_clause
  source: 'FDA Guidance: Pyrogen and Endotoxins Testing: Points to Consider'
  title: Endotoxin Limits, LAL/Kinetic Chromogenic Testing, and Monocyte Activation Testing
  content: 'Endotoxin testing for biologics should employ validated Limulus Amebocyte Lysate (LAL) assays (kinetic chromogenic
    or gel-clot methods) or monocyte activation testing (MAT). Acceptance criteria should be based on maximum recommended
    starting dose, product potency, and route of administration. For intravenous biologics, typical endotoxin limits are <175
    IU/V (where V = maximum recommended starting dose in mL/kg). For subcutaneous/intramuscular products, limits may be higher
    if clinical tolerance is established. LAL assays must be validated per USP <85> with appropriate sensitivity, validity,
    and specificity criteria. Reagent water and glassware must be pyrogen-free. Kinetic assay parameters (temperature, pH,
    incubation time) must be controlled. For products with naturally high endotoxin levels (e.g., lipopolysaccharide-based
    vaccines), alternative testing strategies should be justified. MAT is an acceptable alternative, particularly for products
    with interfering substances.

    '
  applicable_categories:
