- id: FDA-EXP-031
  type: guideline_clause
  source: 'FDA Guidance: Safety Considerations for Biotechnology Products Containing Recombinant DNA (Gene Therapy and Gene
    Modified Cells)'
  title: Genotoxicity, Biodistribution, and Long-Term Safety Monitoring
  content: 'Recombinant DNA-based biologics (gene therapy, gene-modified cellular products, CAR-T cells) must address genotoxicity
    and long-term safety. Nonclinical genotoxicity studies should assess potential for integration of transgene into host
    genome and off-target effects. For retroviruses or integrating vectors, studies should evaluate potential for insertional
    mutagenesis or oncogenic transformation. Animal toxicity studies should investigate biodistribution of transgene or modified
    cells, particularly to sensitive organs (liver, spleen, lymphoid tissue). Shedding/viral load assessment should be performed
    if applicable. Clinical long-term follow-up (years to decades) should monitor for unexpected adverse events, development
    of malignancies, and efficacy durability. Labeling should communicate long-term monitoring requirements and potential
    risks. Pharmacovigilance should be intensified for gene therapy products, with particular attention to delayed genotoxic
    or tumorigenic events. Pre-IND meetings with FDA are essential to establish appropriate nonclinical and clinical testing
    strategies.

    '
