- id: FDA-EXP-014
  type: guideline_clause
  source: 'FDA Guidance: Development of Therapeutic Protein Biosimilars: Comparative Analytical Assessment and Other Preclinical
    Considerations'
  title: Comprehensive Analytical Comparability Testing Strategy
  content: 'Comparative analytical assessment should employ state-of-the-art analytical methods to characterize structural
    and functional attributes of proposed biosimilar and reference product. Testing should address: primary structure (amino
    acid sequence, N-terminal sequencing, mass spectrometry of intact protein and peptide maps); post-translational modifications
    (glycosylation patterns, sialylation, phosphorylation, oxidation, deamidation); higher-order structure (circular dichroism,
    Fourier-transform infrared spectroscopy, dynamic light scattering, hydrogen-deuterium mass spectrometry); charge variants
    (cation-exchange chromatography, isoelectric focusing, capillary electrophoresis); size variants (size-exclusion chromatography);
    and functional activities (binding assays, cell-based assays, receptor activation assays). Comparative data should demonstrate
    that differences are consistent with process-related variation and do not raise safety concerns. Statistical equivalence
    testing should support analytical similarity conclusions.

    '
