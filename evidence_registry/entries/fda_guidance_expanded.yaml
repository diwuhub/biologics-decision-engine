- id: FDA-EXP-023
  type: guideline_clause
  source: 'FDA Guidance: Points to Consider in the Manufacture and Testing of Monoclonal Antibody Products'
  title: Well-Characterized Monoclonal Antibody Development and Comparability Assessment
  content: 'Well-characterized monoclonal antibodies (mAbs) are biologics with comprehensive structural and functional characterization
    that supports streamlined regulatory pathways. Characterization should include amino acid sequence identity, post-translational
    modifications (glycosylation, N-terminal modifications), higher-order structure (e.g., Fab-Fc confirmation), size and
    aggregate analysis, binding characteristics (affinity, specificity), and cell-based functional potency. Manufacturing
    comparability studies for well-characterized mAbs may emphasize analytical similarity over clinical testing if process
    changes are minor and do not affect critical modifications. Stability studies should demonstrate that product maintains
    critical quality attributes (potency, purity, identity) under proposed storage conditions. For biosimilar mAbs, comparative
    characterization may be more comprehensive than nonclinical testing if analytical data support similarity. Documentation
    of process understanding (critical process parameters, CQAs, design space) enables post-approval flexibility.

    '
