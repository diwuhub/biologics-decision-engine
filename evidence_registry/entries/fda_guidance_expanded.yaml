- id: FDA-EXP-028
  type: guideline_clause
  source: 'FDA Guidance: Comparability for Post-Approval Manufacturing Changes in Approved Biologics (CBER Perspective)'
  title: Analytical, Nonclinical, and Clinical Data for CMC Change Justification
  content: 'Post-approval manufacturing changes for biologics require comparability data demonstrating that changes do not
    adversely impact product quality, safety, or efficacy. Comparability strategy should be proportional to change magnitude
    and risk. Minor changes (supplier substitution within specifications, equipment upgrade with demonstrated equivalence)
    may require only analytical comparability data. Moderate changes (purification method modification, formulation concentration
    change) typically require analytical and nonclinical data. Major changes (new expression system, significant process alteration)
    may require clinical comparability studies. Comparability data should employ side-by-side analysis (pre-change product
    vs. post-change product) using the same analytical methods and conditions. For well-characterized biologics with robust
    prior comparability, analytical data alone may suffice for certain changes. Comparability protocols enable pre-approval
    of anticipated changes, streamlining post-approval regulatory pathway.

    '
