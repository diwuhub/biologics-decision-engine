- id: FDA-EXP-020
  type: guideline_clause
  source: 'FDA Guidance: Data Integrity and Compliance With Drug CGMP'
  title: Electronic Records, Audit Trails, and System Validation
  content: 'Data integrity in biologics manufacturing requires compliance with 21 CFR Part 11 (electronic records) and Part
    211 (CGMP). All manufacturing data (batch records, test results, environmental monitoring) must be recorded contemporaneously
    and retained per regulatory requirements. Electronic systems must have user identification, password protection, audit
    trails capturing all data changes (who, what, when, why), and system validation (IQ/OQ/PQ). Backup and disaster recovery
    procedures must ensure data protection. Data modifications must be documented with scientific/regulatory justification.
    Analytical instruments (HPLC, mass spectrometers, chromatography systems) and laboratory information management systems
    (LIMS) must be validated. System owners are responsible for ensuring data integrity; security and access controls must
    prevent unauthorized changes. For cloud-based systems, service provider controls and data residency must be verified.
    Data integrity failures may result in regulatory action or product recalls.

    '
