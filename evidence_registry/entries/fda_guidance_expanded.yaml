- id: FDA-EXP-033
  type: guideline_clause
  source: 'FDA Guidance: Excipients for Use in Pharmaceutical Products: Acceptance Criteria, Testing, and Documentation'
  title: Excipient Qualification and Suitability for Biologics Formulation
  content: 'Excipients in biologics formulations (buffers, stabilizers, surfactants, cryoprotectants) must be selected for
    compatibility with the therapeutic protein and demonstrated suitability. Excipient suppliers should provide certificates
    of analysis confirming identity, purity, and specification compliance. For new excipients or novel uses of established
    excipients, safety data (toxicity, genotoxicity) should support proposed doses and routes. Formulation development should
    demonstrate protein stability under accelerated conditions (elevated temperature, light exposure, freeze-thaw cycles).
    Excipient interactions with protein (pH dependency, aggregation promotion, oxidation catalysis) should be characterized.
    For intravenous biologics, endotoxin, particulate matter, and sterility of excipient solutions must be confirmed. Stability-indicating
    analytical methods should detect excipient degradation products. Excipient concentration ranges should be justified by
    stability and functional data.

    '
