- id: FDA-EXP-024
  type: guideline_clause
  source: 'FDA Guidance: Analytical Similarity Assessment — Tips for Sponsor'
  title: Study Design, Sample Selection, and Acceptance Criteria for Analytical Comparability
  content: 'Analytical similarity studies should employ reference product lots representing multiple manufacturing runs, vendors,
    formulations, and storage conditions to establish the natural variability inherent in reference product manufacturing.
    Proposed biosimilar lots should similarly represent manufacturing variability and multiple manufacturing runs. Lot selection
    should be justified; convenience sampling may not be acceptable. Sample size determination should address statistical
    power to detect clinically relevant differences. Equivalence testing should employ pre-specified margins based on reference
    product variability and clinical relevance; post-hoc margin selection is not acceptable. Acceptance criteria should account
    for analytical method variability; margins should be wider than assay precision (typically 2-3x assay standard deviation).
    For highly variable assays (cell-based assays), larger lot sample sizes may be required. Comparative data should be presented
    in tabular and graphical formats clearly showing reference product and proposed biosimilar distributions.

    '
