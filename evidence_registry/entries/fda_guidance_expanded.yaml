- id: FDA-EXP-006
  type: guideline_clause
  source: 'FDA Guidance: Providing Regulatory Submissions in Electronic Format — Certain Human Pharmaceutical Product Applications
    and Related Submissions'
  title: eCTD Submission Format and Data Standards for BLA Applications
  content: 'BLA submissions should be provided in eCTD (electronic Common Technical Document) format with proper module structure:
    Module 1 (administrative/regional information), Module 2 (summaries and overviews), Module 3 (quality—CMC), Module 4 (nonclinical
    study reports), Module 5 (clinical study reports). Electronic submission must comply with FDA data standards for document
    formatting, XML/PDF compliance, and file organization. Lifecycle table-of-contents must be provided showing all submitted
    information. For biologics, CMC module (Module 3) should follow ICH Q11 structure (drug substance characterization, manufacturing
    process, process controls, acceptance criteria, reference standards, container/closure, stability). Electronic submission
    enables FDA to leverage search and retrieval tools but requires careful attention to file naming, cross-referencing, and
    completeness. Applicants should request electronic submission guidance from FDA during pre-BLA meeting.

    '
  applicable_categories:
