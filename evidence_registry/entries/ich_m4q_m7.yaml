  - shelf_life
  - degradation
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: ICH-M7-001
  type: guideline_clause
  source: ICH M7(R2)
  title: Mutagenic Impurities Assessment and Qualification
  content: Mutagenic impurities require assessment and control during drug substance/product development. Impurities identified
    as mutagenic (in vitro or in vivo) must be qualified through toxicological evaluation (rat study at clinically relevant
    exposure).
  applicable_categories:
  - quality
  - safety
  - impurity_management
  confidence: 0.97
  url: https://www.ich.org/page/quality-guidelines
  year: 2014
  tags:
  - m7
  - mutagenic_impurities
  - qualification
  - safety
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: ICH-M7-002
  type: guideline_clause
  source: ICH M7(R2)
  title: Identification of Potential Mutagenic Impurities
  content: 'Potential mutagenic impurities identified from: synthetic route analysis, process chemistry assessment, and database
    searches (e.g., EMBL, AMES database). Structural alerts screened using in silico tools; positive findings require confirmatory
    testing.'
  applicable_categories:
  - quality
  - safety
  - impurity_management
  confidence: 0.96
  url: https://www.ich.org/page/quality-guidelines
  year: 2014
  tags:
  - m7
  - mutagenic_impurities
  - screening
  - structural_alerts
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: ICH-M7-003
  type: guideline_clause
  source: ICH M7(R2)
  title: Control of Mutagenic Impurities - Specification and Limits
  content: 'Mutagenic impurities must be controlled via specification with acceptance criteria. Limits based on: qualification
    study, structural class, therapeutic indication, and population exposure. Limits typically <5-50 ppm depending on qualification
    data and toxicology.'
  applicable_categories:
  - quality
  - safety
  - impurity_management
  confidence: 0.97
  url: https://www.ich.org/page/quality-guidelines
  year: 2014
  tags:
  - m7
  - mutagenic_impurities
  - specification_limits
  - control
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: ICH-M7-004
  type: guideline_clause
  source: ICH M7(R2)
  title: Qualification Strategy for Known Mutagenic Impurities
  content: Known mutagenic impurities require qualification through toxicology studies demonstrating safety margin. Rat study
    (28-day or longer) must achieve systemic exposure above expected patient exposure. Safety margin calculation supports
    acceptable dose/level.
  applicable_categories:
  - quality
  - safety
  - toxicology
  confidence: 0.97
