- id: Q1A-3.1
  type: guideline_clause
  source: ICH Q1A(R2)
  title: Stress Testing Overview
  content: 'Stress testing is performed under more severe conditions than those used for the long-term and accelerated studies.
    It is intended to demonstrate how the quality of the drug substance or drug product varies with time under the influence
    of environmental factors (temperature, humidity, light, oxidation) and thereby establish the intrinsic stability of the
    molecule. The study should be designed to identify the likely degradation products that may be formed.

    '
  applicable_categories:
  - stability
  - safety
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q1A%28R2%29%20Guideline.pdf
  year: 2003
