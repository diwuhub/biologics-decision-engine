- id: Q1A-5.2
  type: guideline_clause
  source: ICH Q1A(R2)
  title: Statistical Analysis Requirements (Reference Q1E)
  content: 'Statistical analysis of stability data should follow ICH Q1E guidance. A sufficient number of samples should be
    tested (typically 6 per batch and multiple batches, minimum 3 batches for drug substance) to allow reliable estimation
    of degradation kinetics. Testing times should be appropriately spaced and fixed in advance. The data should be evaluated
    for adequacy before use in shelf-life estimation.

    '
  applicable_categories:
  - stability
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q1A%28R2%29%20Guideline.pdf
