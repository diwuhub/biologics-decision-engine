- id: Q5C-2.1
  type: guideline_clause
  source: ICH Q5C
  title: Potency and Biological Activity Monitoring During Stability
  content: 'For biotechnological products, potency or biological activity must be monitored throughout stability studies.
    This is a critical attribute that should be measured at each stability time point. Changes in potency may precede physical
    or chemical changes detectable by other analytical methods. The relationship between potency decline and other indicators
    of degradation (e.g., aggregates, charge variants) should be established. Loss of potency may be the limiting factor in
    shelf-life determination, even in the absence of other significant changes.

    '
  applicable_categories:
  - potency
  - stability
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q5C%20Guideline.pdf
  year: 2003
