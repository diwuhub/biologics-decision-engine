- id: Q5C-2.3
  type: guideline_clause
  source: ICH Q5C
  title: Glycoprotein-Specific Stability Considerations
  content: 'Glycoproteins may undergo glycan-specific degradation, including deglycosylation, glycan oxidation, galactose
    loss, or fucose loss. These changes can significantly impact potency, immunogenicity, and pharmacokinetics. Stability
    studies should include characterization of N- and O-linked glycans using appropriate analytical methods (e.g., HPLC, mass
    spectrometry). Changes in glycosylation patterns should be tracked as critical quality attributes. Storage conditions
    should be selected to minimize glycan degradation.

    '
  applicable_categories:
  - stability
  - potency
  - purity
  - safety
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q5C%20Guideline.pdf
