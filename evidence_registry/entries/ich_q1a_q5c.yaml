- id: Q5C-2.2
  type: guideline_clause
  source: ICH Q5C
  title: Real-Time vs Accelerated Conditions for Protein Products
  content: 'For proteins, accelerated stability conditions may not accurately predict degradation observed under long-term
    storage conditions. The degradation pathways active at accelerated conditions (e.g., 40°C) may differ quantitatively or
    qualitatively from those occurring at recommended storage temperature. Real-time (25°C or refrigerated) stability data
    is therefore essential for establishing valid shelf life. Accelerated data should be used with caution and only when shown
    to be predictive of real-time degradation through comparative analysis.

    '
  applicable_categories:
  - stability
  - potency
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q5C%20Guideline.pdf
  year: 2003
  tags:
