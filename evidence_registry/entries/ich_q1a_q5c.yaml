- id: Q1A-6.1
  type: guideline_clause
  source: ICH Q1A(R2)
  title: Container-Closure System Considerations for Drug Products
  content: 'The stability of a drug product may be influenced by the container-closure system. Container closure integrity
    (CCI), permeability to water vapor and oxygen, light transmission, and interaction with the formulation should be assessed.
    Data should demonstrate that the selected package protects the drug product throughout the proposed shelf life. Alternative
    container-closure systems (e.g., blister vs bottle) require separate justification and supporting data.

    '
  applicable_categories:
  - stability
  - physicochemical
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q1A%28R2%29%20Guideline.pdf
