- id: Q5C-5.1
  type: guideline_clause
  source: ICH Q5C
  title: Comparability Stability Requirements (Cross-reference Q5E)
  content: 'When manufacturing changes are made to a biotechnological product (e.g., cell line, process, formulation), comparability
    studies should include side-by-side stability testing of pre- and post-change material under identical conditions. Identical
    time points, identical analytical methods, and adequate sample sizes should be used. Stability profiles should be compared
    to demonstrate that the change does not adversely impact product stability. Data should support continued use of the previously
    established shelf life. Refer to ICH Q5E for detailed comparability guidance.

    '
  applicable_categories:
