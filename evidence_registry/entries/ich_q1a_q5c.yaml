- id: Q1A-3.3
  type: guideline_clause
  source: ICH Q1A(R2)
  title: Photostability Testing (Reference Q1B)
  content: 'Photostability testing of drug substances and drug products should be conducted following the guidance in ICH
    Q1B. The purpose is to ensure that light exposure will not lead to unacceptable levels of degradation. If the drug substance
    is photolabile, appropriate container-closure systems (light-resistant packaging) should be selected for the drug product.

    '
  applicable_categories:
  - stability
  - safety
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q1A%28R2%29%20Guideline.pdf
