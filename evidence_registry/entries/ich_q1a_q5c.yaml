- id: Q1A-5.1
  type: guideline_clause
  source: ICH Q1A(R2)
  title: Shelf Life Determination from Stability Data
  content: 'The shelf life should be determined from the time-point at which the 90% confidence interval about the regression
    line (or appropriate statistical model) intersects with the acceptance limit, whichever occurs first. Linear regression
    with a 95% lower confidence bound is recommended when data trends are linear. Non-linear models should be used when appropriate,
    with adequate justification. For attributes with limited data, worst-case assumptions should be applied.

    '
  applicable_categories:
  - stability
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q1A%28R2%29%20Guideline.pdf
  year: 2003
  tags:
