- id: Q1A-1.2
  type: guideline_clause
  source: ICH Q1A(R2)
  title: 'Accelerated Storage Condition: 40°C/75%RH'
  content: 'The recommended accelerated testing condition is 40°C ± 2°C and 75% ± 5% RH. Data should be collected at 0, 3,
    and 6 months. This condition is intended to increase the rate of chemical degradation and physical changes. A 6-month
    data set is required for submission; if significant change occurs before 6 months, 3-month data may be the last time point.

    '
  applicable_categories:
