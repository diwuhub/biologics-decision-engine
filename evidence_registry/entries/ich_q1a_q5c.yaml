entries:
- id: Q1A-1.1
  type: guideline_clause
  source: ICH Q1A(R2)
  title: 'Long-Term Storage Conditions: 25°C/60%RH'
  content: 'The recommended long-term testing condition is 25°C ± 2°C and 60% ± 5% relative humidity (RH). This condition
    is intended to simulate average room temperature storage. Data should be collected at 0, 3, 6, 9, and 12 months, with
    continued collection at 12-month intervals thereafter. The 12-month data point is considered the minimum submission requirement.

    '
  applicable_categories:
  - stability
  confidence: 1.0
