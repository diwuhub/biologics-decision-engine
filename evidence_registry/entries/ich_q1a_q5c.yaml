- id: Q1A-2.1
  type: guideline_clause
  source: ICH Q1A(R2)
  title: Minimum Stability Data at Time of Submission
  content: 'For drug substances and drug products stored at 25°C/60% RH, a minimum of 12 months of long-term stability data
    and 6 months of accelerated (40°C/75% RH) data should be available at the time of submission. Where 12-month long-term
    data is not available, data from a commitment to generate the data should be provided. Continued testing is required to
    support the proposed shelf life.

    '
  applicable_categories:
  - stability
  confidence: 1.0
