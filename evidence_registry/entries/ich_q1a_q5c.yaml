- id: Q5C-3.1
  type: guideline_clause
  source: ICH Q5C
  title: Appropriate Storage Conditions for Biologics
  content: 'Appropriate storage conditions for biotechnological products should be justified on the basis of stability data.
    Many protein products require refrigerated storage (2-8°C) to maintain stability. Some products may be stable at room
    temperature if formulation and container closure are optimized (e.g., with stabilizers, buffers). Products may require
    storage in the frozen state (-20°C or -70°C) if degradation is prohibitive at higher temperatures. The selected storage
    condition should be based on comprehensive stability data demonstrating adequate shelf life. Freeze-thaw stability should
    be assessed if applicable.

    '
  applicable_categories:
  - stability
  - potency
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q5C%20Guideline.pdf
  year: 2003
  tags:
