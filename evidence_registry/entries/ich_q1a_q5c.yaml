- id: Q1A-3.2
  type: guideline_clause
  source: ICH Q1A(R2)
  title: 'Stress Testing Conditions: Temperature and Humidity'
  content: 'Stress testing of drug substances should include testing at temperatures above those recommended in long-term
    studies (e.g., 50°C, 60°C) and may include testing at elevated humidity (e.g., 75% RH or greater). Stress testing of drug
    products should follow similar principles. Testing should be conducted for a sufficient period to allow characterization
    of degradation products and establishment of kinetic data. Adequate sample size and multiple replicates are recommended.

    '
  applicable_categories:
  - stability
  - safety
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q1A%28R2%29%20Guideline.pdf
