- id: Q1A-4.1
  type: guideline_clause
  source: ICH Q1A(R2)
  title: Significant Change Criteria for Drug Products
  content: 'Significant change for a drug product is defined as: (1) not more than 5% degradation from initial assay value,
    (2) not more than 5% relative standard deviation (RSD) of assay values within the accepted range, (3) any physical or
    chemical attribute outside the range specified in the specification, (4) pH change of more than 1 unit, (5) dissolution
    rate outside approved specifications. Meeting any of these criteria may warrant accelerated stability or reduced shelf
    life claims.

    '
  applicable_categories:
  - stability
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q1A%28R2%29%20Guideline.pdf
  year: 2003
  tags:
