- id: Q1A-1.3
  type: guideline_clause
  source: ICH Q1A(R2)
  title: 'Intermediate Storage Condition (Optional): 30°C/65%RH'
  content: 'An optional intermediate condition of 30°C ± 2°C and 65% ± 5% RH may be recommended, in particular for drug products
    for storage in a refrigerator or freezer. Data collection at 0, 6, and 9 months is recommended. This condition provides
    additional guidance on degradation kinetics between long-term and accelerated conditions.

    '
  applicable_categories:
