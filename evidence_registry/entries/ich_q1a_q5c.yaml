- id: Q5C-4.1
  type: guideline_clause
  source: ICH Q5C
  title: Forced Degradation Studies for Biologics
  content: 'Forced degradation studies should be conducted for biotechnological products to characterize potential degradation
    products and pathways. Conditions may include elevated temperature, pH extremes, oxidative stress (hydrogen peroxide),
    freeze-thaw cycling, agitation/shaking, and light exposure. The goal is to produce sufficient degradation (typically 20-30%)
    to allow detection and characterization of degradants by stability-indicating methods. Degradants identified in forced
    studies should be monitored in real-time and accelerated stability studies to establish kinetics.

    '
  applicable_categories:
  - stability
  - safety
  - purity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q5C%20Guideline.pdf
  year: 2003
  tags:
