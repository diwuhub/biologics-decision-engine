- id: Q2R2-7
  type: guideline_clause
  source: ICH Q2(R2)
  title: System Suitability Testing Requirements
  content: 'System Suitability Testing (SST) is an integral part of many analytical procedures. SST parameters must be established
    during method validation. For chromatographic methods, typical parameters include: plate number (N), peak tailing factor
    (Tf), resolution (Rs), and relative standard deviation (RSD). Limits are procedure-specific and must be justified. SST
    must be performed with each analytical batch to ensure system is performing adequately.

    '
  applicable_categories:
  - potency
  - purity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q2%28R2%29%20Guideline.pdf
  year: 2023
