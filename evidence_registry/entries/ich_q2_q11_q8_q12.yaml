  document_status: final
- id: Q8R2-3
  type: guideline_clause
  source: ICH Q8(R2)
  title: Risk Assessment and Link to ICH Q9
  content: 'Risk assessment, as described in ICH Q9 (Quality Risk Management), is central to QbD. Risk assessment should identify
    which material attributes and process parameters have the greatest impact on CQAs. Methods such as Failure Mode and Effects
    Analysis (FMEA), fault tree analysis, or design of experiments (DoE) are appropriate. High-risk parameters are those with
    potential to significantly affect quality if not controlled. The assessment should justify the selection of CPPs and set
    their ranges. Risk assessment is not a one-time activity but should be revisited as manufacturing experience accumulates.
    Documented risk decisions support the scientific rationale for the control strategy.

    '
  applicable_categories:
  - purity
  - potency
  - stability
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q8%28R2%29%20Guideline.pdf
