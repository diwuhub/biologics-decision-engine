- id: Q2R2-2
  type: guideline_clause
  source: ICH Q2(R2)
  title: Accuracy - Definition and Validation Approach
  content: 'Accuracy is the closeness of test results obtained by the analytical procedure to the true value (content) of
    the sample. Accuracy of an analytical procedure is established across its range. Three concentrations: low (20%), middle
    (50%), and high (100%) of the target concentration are recommended. Minimum of nine determinations recommended (3 replicates
    × 3 concentration levels).

    '
  applicable_categories:
  - purity
  - potency
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q2%28R2%29%20Guideline.pdf
  year: 2023
