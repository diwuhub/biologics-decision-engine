entries:
- id: Q2R2-1
  type: guideline_clause
  source: ICH Q2(R2)
  title: Specificity - Definition and Requirements
  content: 'Specificity is the ability to assess unequivocally the analyte in the presence of components which may be expected
    to be present. Such components may include impurities, degradation products, matrix, etc. Lack of specificity of an analytical
    procedure may be compensated by other supporting analytical procedures.

    '
  applicable_categories:
  - identity
  - purity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q2%28R2%29%20Guideline.pdf
