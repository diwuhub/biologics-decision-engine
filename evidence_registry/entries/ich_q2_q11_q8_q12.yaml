- id: Q12-1
  type: guideline_clause
  source: ICH Q12
  title: Established Conditions (ECs) - Regulatory Framework
  content: 'Established Conditions (ECs) are the conditions (parameters, ranges, acceptance criteria) that are established
    during drug development and supported by experimental data or theoretical justification. ECs are proposed in the initial
    regulatory submission (NDA/BLA) and are subject to formal approval. Once approved, changes within ECs may be implemented
    and reported to the regulatory authority through a Post-Approval Change Management (PACM) module rather than requiring
    pre-approval. ECs provide a science-based, predetermined regulatory framework that enables post-approval flexibility.
    Categories of changes within ECs are pre-approved, reducing regulatory burden while maintaining safety and efficacy. ECs
    may include: process parameters, raw material specifications, analytical methods, and acceptance criteria.

    '
  applicable_categories:
  - purity
  - potency
  - identity
  - stability
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q12_Guideline.pdf
  year: 2019
  tags:
