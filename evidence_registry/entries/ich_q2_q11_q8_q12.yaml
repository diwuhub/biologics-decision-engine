- id: Q2R2-6
  type: guideline_clause
  source: ICH Q2(R2)
  title: Robustness - Evaluation of Analytical Procedure Stability
  content: 'Robustness is the capacity of an analytical procedure to remain unaffected by small variations in method parameters.
    Typical variables assessed include pH, temperature, mobile phase composition, flow rate, column chemistry, organic solvent
    percentage, and ionic strength. One factor-at-a-time variation or design of experiments (DoE) approaches are acceptable.
    Results should demonstrate the procedure is suitable for its intended use despite minor parameter variations.

    '
  applicable_categories:
  - physicochemical
  - potency
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q2%28R2%29%20Guideline.pdf
  year: 2023
