- id: Q12-3
  type: guideline_clause
  source: ICH Q12
  title: Regulatory Flexibility Based on Enhanced Knowledge
  content: 'ICH Q12 enables regulatory flexibility based on enhanced knowledge gained during drug development and post-approval
    manufacturing experience. Established Conditions can be expanded or refined (e.g., wider process parameter ranges, additional
    equipment options) if supported by data demonstrating quality is not compromised. For example: bioreactor scale-up within
    established CQA ranges; supplier changes supported by equivalent characterization; analytical method improvements that
    maintain or improve specificity and accuracy; equipment substitution with equivalent or superior capability. The concept
    of "continued process verification" supports prospective flexibility by demonstrating process robustness across operating
    ranges. This regulatory framework encourages continuous improvement and innovation throughout the product lifecycle.

    '
  applicable_categories:
  - potency
  - purity
  - identity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q12_Guideline.pdf
  year: 2019
  tags:
