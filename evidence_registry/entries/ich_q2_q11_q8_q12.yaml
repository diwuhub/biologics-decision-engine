- id: Q2R2-4
  type: guideline_clause
  source: ICH Q2(R2)
  title: Linearity and Range - Design and Acceptance Criteria
  content: 'Linearity is the ability of the procedure to obtain test results that are directly proportional to the analyte
    concentration within a given range. A minimum of 5 concentration levels covering at least 80% to 120% of the target concentration
    is recommended. The correlation coefficient should be ≥ 0.99. Range is typically established from lower to upper acceptance
    limits (LOD to highest expected concentration).

    '
  applicable_categories:
  - potency
  - purity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q2%28R2%29%20Guideline.pdf
  year: 2023
  tags:
