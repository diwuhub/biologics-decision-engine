- id: Q12-4
  type: guideline_clause
  source: ICH Q12
  title: Comparability Assessment for Post-Approval Changes
  content: 'Comparability protocols establish the scientific framework for demonstrating that a post-approval change does
    not adversely affect the safety or efficacy of the drug product. Comparability is established through: analytical characterization
    of pre- and post-change batches; in vitro bioassay data; nonclinical and/or clinical data if appropriate. For changes
    to manufacturing site, process equipment, or supplier of critical raw material, comprehensive comparability packages may
    be required. Head-to-head comparisons of batches made before and after the change, using validated analytical methods,
    are the foundation of comparability assessment. Statistical approaches (e.g., equivalence testing) and similarity limits
    based on historical batch variability are applied. Comparability documentation supports the regulatory decision that the
    change maintains product quality.

    '
  applicable_categories:
  - purity
  - potency
  - identity
  - stability
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q12_Guideline.pdf
  year: 2019
  tags:
  - comparability
