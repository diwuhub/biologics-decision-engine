  document_status: final
- id: Q2R2-3
  type: guideline_clause
  source: ICH Q2(R2)
  title: Precision - Repeatability and Intermediate Precision
  content: 'Precision is the degree of agreement among individual test results when the procedure is applied repeatedly to
    a homogeneous sample. Repeatability (intra-assay precision) is assessed with 6 replicates at 100% concentration. Intermediate
    precision should consider variables such as different days, analysts, equipment within a single laboratory environment.
    Relative Standard Deviation (RSD) acceptance typically ≤ 2% for potency assays.

    '
  applicable_categories:
  - potency
  - purity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q2%28R2%29%20Guideline.pdf
  year: 2023
