  - range
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: Q2R2-5
  type: guideline_clause
  source: ICH Q2(R2)
  title: Detection Limit and Quantitation Limit - Determination Methods
  content: 'Detection Limit (DL) is the lowest amount of analyte that can be detected but not necessarily quantitated. Quantitation
    Limit (QL) is the lowest amount that can be quantitated with acceptable accuracy and precision (typically RSD ≤ 10%, recovery
    80-120%). Determination may use signal-to-noise ratio (3:1 for DL, 10:1 for QL), standard deviation of response and slope,
    or visual evaluation methods for biological assays.

    '
  applicable_categories:
  - purity
  - potency
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q2%28R2%29%20Guideline.pdf
  year: 2023
