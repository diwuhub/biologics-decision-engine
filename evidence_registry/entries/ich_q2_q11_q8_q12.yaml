  document_status: final
- id: Q8R2-2
  type: guideline_clause
  source: ICH Q8(R2)
  title: Quality Target Product Profile (QTPP) Definition
  content: 'The Quality Target Product Profile (QTPP) is a prospective summary of the quality characteristics of a drug product
    that ideally will be achieved to ensure the desired quality, taking into account safety and efficacy. QTPP is established
    based on the intended clinical use and may include: dosage form, strength, route of administration, container closure
    system, stability, and relevant quality attributes. For biologics, QTPP characteristics include: potency (as it relates
    to biological activity), purity (absence of product-related and process-related impurities), identity (isoform pattern),
    stability (shelf-life), pH, osmolality, appearance, and sterility. QTPP drives CQA identification and is the link between
    clinical requirements and manufacturing reality.

    '
  applicable_categories:
  - potency
  - purity
  - stability
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q8%28R2%29%20Guideline.pdf
  year: 2009
