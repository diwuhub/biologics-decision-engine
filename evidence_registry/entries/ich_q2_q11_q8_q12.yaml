  - cell_bank_characterization
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: Q11-7
  type: guideline_clause
  source: ICH Q11
  title: Continuous Process Verification and Real-Time Control
  content: 'A state of control may be demonstrated by traditional process validation or through continuous process monitoring
    and real-time control strategies. Continuous monitoring includes: in-process parameter surveillance using Process Analytical
    Technology (PAT); multivariate analysis of batch data; control charts and statistical methods to detect out-of-control
    conditions. This approach enables real-time corrective actions and trend analysis across batches. Continuous verification
    is particularly applicable to continuous manufacturing processes. The strategy must define normal operating ranges, action/alert
    limits, and response procedures for parameter excursions.

    '
  applicable_categories:
  - purity
  - potency
  - identity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q11_Guideline.pdf
  year: 2019
  tags:
