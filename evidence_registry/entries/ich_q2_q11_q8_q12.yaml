- id: Q8R2-5
  type: guideline_clause
  source: ICH Q8(R2)
  title: Real-Time Release Testing and Process Analytical Technology
  content: 'Real-time release testing (RTRT) is the ability to release manufactured batches based on process and in-process
    data rather than relying solely on finished product testing. RTRT is enabled by Process Analytical Technology (PAT) -
    tools and approaches for analyzing and controlling manufacturing processes. PAT tools include: spectroscopy, process monitoring,
    chemometrics, and design of experiments. RTRT requires strong process understanding and development data demonstrating
    equivalence between in-process measurements and finished product quality. Implementation must be supported by validation
    and risk assessment. RTRT can reduce time to release, improve supply chain agility, and provide better control of product
    quality.

    '
  applicable_categories:
  - potency
  - purity
  - physicochemical
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q8%28R2%29%20Guideline.pdf
