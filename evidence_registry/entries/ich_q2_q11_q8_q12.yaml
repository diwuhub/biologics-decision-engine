- id: Q2R2-8
  type: guideline_clause
  source: ICH Q2(R2)
  title: Validation of Analytical Procedures for Biological/Immunochemical Assays
  content: 'For biological and immunochemical assays, additional considerations apply: use of reference standards or reference
    materials with known purity/potency; parallelism and validity testing to demonstrate assay biology; dose-response curve
    evaluation; selectivity assessment in presence of matrix components; stability of analyte in matrix. Protein recovery
    and cross-reactivity must be evaluated. Statistical approaches (e.g., probit analysis) may be required. Positive and negative
    controls are essential validation elements.

    '
  applicable_categories:
  - potency
  - identity
  - purity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q2%28R2%29%20Guideline.pdf
