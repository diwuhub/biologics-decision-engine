  - doe
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: Q11-4
  type: guideline_clause
  source: ICH Q11
  title: Control Strategy Development and Implementation
  content: 'Control strategy is the planned set of controls, derived from current process understanding, that assures process
    performance and product quality. It is not just the specification but encompasses: parameters monitored during manufacturing;
    in-process tests and acceptance criteria; finished product specifications; and risk management. A multi-variate approach
    is preferred over single-parameter acceptance. Controls should address: raw material quality, process parameter variation,
    in-process control points, intermediate stability, finished product testing. The control strategy links to design space
    and supports post-approval flexibility. Regular review and continuous improvement are inherent in control strategy management.

    '
  applicable_categories:
  - purity
  - potency
  - safety
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q11_Guideline.pdf
  year: 2019
  tags:
