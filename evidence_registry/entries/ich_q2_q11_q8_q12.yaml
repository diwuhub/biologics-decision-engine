- id: Q11-6
  type: guideline_clause
  source: ICH Q11
  title: Raw Material Controls for Cell Culture Processes
  content: 'Raw materials used in cell culture, including media supplements, buffers, and cell banks, should be appropriately
    characterized and controlled. Critical raw materials with potential impact on CQAs require: supplier qualification; certificate
    of analysis verification; in-house testing for critical attributes (e.g., endotoxin, sterility for culture supplements);
    stability data; and traceability. Master Cell Bank (MCB) and Working Cell Bank (WCB) characterization must include: viability,
    identity (species and cell line), mycoplasma testing, microbial contaminants, adventitious agents, potency, and karyology.
    Seed lot comparability assessment demonstrates consistent product quality across different manufacturing campaigns.

    '
  applicable_categories:
  - purity
  - identity
  - safety
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q11_Guideline.pdf
  year: 2019
  tags:
  - raw_materials
