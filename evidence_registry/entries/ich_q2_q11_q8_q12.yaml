- id: Q11-1
  type: guideline_clause
  source: ICH Q11
  title: Process Development Principles for Biotech Products
  content: 'Process development should be based on the understanding of how process parameters affect product quality attributes.
    A systematic approach is recommended: establish CQAs based on intended use and pharmacology; identify process parameters
    affecting CQAs; conduct risk assessment of parameter impact; design and optimize process through experimentation. For
    biologics, cell culture conditions (temperature, dissolved oxygen, pH, osmolality), media composition, inoculum preparation,
    bioreactor operation, and purification step conditions must be systematically evaluated. Linkage between in-process parameters
    and final product quality is fundamental.

    '
  applicable_categories:
  - purity
  - potency
  - identity
  - safety
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q11_Guideline.pdf
  year: 2019
