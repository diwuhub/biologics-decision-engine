- id: Q8R2-4
  type: guideline_clause
  source: ICH Q8(R2)
  title: Control Strategy Development and Flexibility
  content: 'Control strategy is the set of controls, derived from understanding, that ensures that the drug product will meet
    its QTPP. Controls include: input material attributes and controls, process parameters and in-process controls, intermediate
    controls, and finished product specifications. A strong control strategy, founded on good development understanding, provides
    the scientific basis for post-approval changes and can support regulatory flexibility (e.g., wider acceptance criteria,
    reduced testing). Controls are not limited to finished product testing but encompass the entire process. Multivariate
    approaches to control are preferred. Documentation of the scientific rationale for each control element strengthens regulatory
    submissions.

    '
  applicable_categories:
  - purity
  - potency
  - physicochemical
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q8%28R2%29%20Guideline.pdf
