  document_status: final
- id: Q11-5
  type: guideline_clause
  source: ICH Q11
  title: Process Validation Linkage and Batch Definition
  content: 'Process validation should confirm that the process as established during development consistently produces drug
    substance of the intended quality. Process validation studies should use process parameters within the established design
    space. A minimum of three commercial-scale batches is recommended (may be reduced if supportive data available). For continuous
    processes, alternative approaches to demonstrate state of control are acceptable. Batch definition must be scientifically
    justified and consider: homogeneity of final product, process flow, time-dependent changes, and realistic worst-case operating
    conditions. Changes made post-validation require assessment under ICH Q12 (post-approval change management).

    '
  applicable_categories:
  - potency
  - purity
  - identity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q11_Guideline.pdf
  year: 2019
  tags:
