- id: Q8R2-1
  type: guideline_clause
  source: ICH Q8(R2)
  title: Quality by Design (QbD) - Holistic Framework
  content: 'Quality by Design is a systematic approach to development that begins with predefined objectives and emphasizes
    product and process understanding and control. QbD comprises: Quality Target Product Profile (QTPP); identification of
    CQAs; linkage between raw materials, manufacturing processes, and CQAs; design space establishment; control strategy definition;
    and continued process verification. QbD is not equivalent to one specific tool or method but represents an integrated
    philosophy where quality is built in during development, not tested in at the end. Application of QbD enables post-approval
    flexibility and risk-based regulatory decisions.

    '
  applicable_categories:
  - purity
  - potency
  - stability
  - physicochemical
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q8%28R2%29%20Guideline.pdf
  year: 2009
