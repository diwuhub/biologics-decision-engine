- id: Q12-2
  type: guideline_clause
  source: ICH Q12
  title: Post-Approval Change Management (PACM) Protocols
  content: 'Post-Approval Change Management (PACM) is the systematic approach to introducing changes to approved drug products
    throughout their lifecycle. Changes within Established Conditions can be reported in the PACM module without prior regulatory
    approval. Changes outside ECs require traditional change protocols (e.g., CBE, CBE-0, CBE-30 in the US). PACM submission
    must include: description of the change; justification for why change is within ECs; analytical/manufacturing data supporting
    the change; comparative data if applicable; and proposed updates to product documentation. The timing and mode of PACM
    reporting (annual, quarterly, or other) are specified. This framework balances flexibility with appropriate regulatory
    oversight and transparency.

    '
  applicable_categories:
  - purity
  - potency
  - stability
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q12_Guideline.pdf
  year: 2019
  tags:
