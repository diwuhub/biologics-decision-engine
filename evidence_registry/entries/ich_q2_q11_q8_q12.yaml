- id: Q11-2
  type: guideline_clause
  source: ICH Q11
  title: Critical Quality Attributes (CQAs) Identification and Control
  content: 'Critical Quality Attributes (CQAs) are physical, chemical, biological, or microbiological properties or characteristics
    that should be within an appropriate limit, range, or distribution to ensure the desired product quality. CQAs are derived
    from knowledge of how drug substance characteristics relate to safety and efficacy. For monoclonal antibodies, typical
    CQAs include: potency, purity (product-related impurities), identity (isotope pattern, molecular weight), host cell protein
    (HCP) levels, process-related impurities, aggregate content, charge variants, glycosylation pattern, and stability-indicating
    parameters. CQAs must be justified with scientific rationale.

    '
  applicable_categories:
  - potency
  - purity
  - identity
  - safety
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q11_Guideline.pdf
  year: 2019
  tags:
