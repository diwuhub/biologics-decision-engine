  - cqa
  - risk_assessment
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: Q11-3
  type: guideline_clause
  source: ICH Q11
  title: Critical Process Parameters (CPPs) and Design Space
  content: 'Critical Process Parameters (CPPs) are process parameters whose variability has an impact on a CQA and therefore
    should be monitored or controlled to ensure that the process produces the intended quality. Design Space is the multidimensional
    combination of input variables (e.g., material attributes, process parameters) and process conditions that have been demonstrated
    to provide assurance of quality. It is the proposed design space during development, not the control space. For cell culture
    processes, CPPs may include: temperature setpoint, aeration rate, agitation, pH control, feed rate of media, inoculum
    density. Purification CPPs may include: pH, salt concentration, temperature, resin lot, column flow rate. DoE is the recommended
    approach for design space establishment.

    '
  applicable_categories:
  - purity
  - potency
  - identity
  confidence: 1.0
  url: https://database.ich.org/sites/default/files/Q11_Guideline.pdf
  year: 2019
  tags:
  - critical_process_parameters
