- id: Q5A-3
  type: guideline_clause
  source: ICH Q5A(R1)
  title: Testing of Unprocessed Bulk Harvest and Production Bulk
  content: 'Unprocessed bulk harvest must be tested for adventitious viruses and other agents. Testing should be conducted
    on representative lots from the production process. For continuous cell lines, testing at the beginning, middle, and end
    of production may be appropriate. For product batches, testing should cover the manufacturing period. Detection assays
    must include both general methods (electron microscopy, reverse transcriptase assay) and specific viral assays relevant
    to the production system. Results should be evaluated against pre-established acceptance criteria.

    '
  applicable_categories:
  - safety
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q5a-viral-safety-evaluation-biotechnology-products-derived-mammalian-cell-lines-step-5_en.pdf
