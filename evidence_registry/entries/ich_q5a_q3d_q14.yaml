- id: Q5A-6
  type: guideline_clause
  source: ICH Q5A(R1)
  title: Retrovirus-Like Particles in CHO Cell Lines
  content: 'Chinese Hamster Ovary (CHO) cells may contain retrovirus-like particles (RLPs). The presence, quantity, and potential
    infectivity of RLPs must be evaluated. Testing includes electron microscopy to detect particles, reverse transcriptase
    assays to assess potential infectivity, and in vitro infection assays where appropriate. Even if RLPs are detected, evidence
    of their non-infectivity should be provided through appropriate assays. The impact of RLPs on product safety must be evaluated,
    including their removal or inactivation by downstream purification and viral inactivation steps. Documentation of RLP
    characterization is essential for regulatory approval of CHO-derived products.

    '
  applicable_categories:
  - safety
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q5a-viral-safety-evaluation-biotechnology-products-derived-mammalian-cell-lines-step-5_en.pdf
