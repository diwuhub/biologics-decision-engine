- id: Q3D-1
  type: guideline_clause
  source: ICH Q3D(R2)
  title: Classification of Elemental Impurities - Class 1 (Carcinogenic/Mutagenic)
  content: 'Class 1 elemental impurities are those with evidence of carcinogenicity and/or mutagenicity and are considered
    undesirable in pharmaceutical products. These include cadmium, lead, and mercury. The Permitted Daily Exposure (PDE) values
    for Class 1 elements are derived from carcinogenic potency and are set at the threshold below which non-threshold carcinogenic
    effects are considered unlikely. Exposure to Class 1 elemental impurities should be minimized as much as reasonably achievable
    (ALARA principle), and their presence in drug substances and products should be controlled through specification limits
    based on the established PDEs.

    '
  applicable_categories:
  - safety
  - purity
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q3d-elemental-impurities-step-5_en.pdf
  year: 2019
  tags:
  - elemental_impurities
  - classification
  - carcinogenic
  - PDE
  authority_quality_tier: primary
  content_type: paraphrase
  document_status: final
- id: Q3D-2
  type: guideline_clause
  source: ICH Q3D(R2)
  title: Permitted Daily Exposures (PDEs) for Parenteral Route
  content: 'PDEs are derived from point of departure values identified from hazard characterization studies and adjusted by
    uncertainty factors. For the parenteral route of administration, PDEs generally reflect systemic bioavailability of elemental
    impurities. PDEs vary by element: Class 1 elements (Cd: 3 μg/day, Pb: 1.5 μg/day, Hg: 30 μg/day), Class 2A elements (As:
    15 μg/day, Co: 50 μg/day, Ni: 200 μg/day, V: 100 μg/day), Class 2B elements (Ag: 150 μg/day, Au: 100 μg/day, Pd: 100 μg/day,
    Pt: 100 μg/day, Tl: 8 μg/day), and Class 3 elements (Fe: 2100 μg/day, Cu: 300 μg/day, Mn: 613 μg/day, Mo: 2000 μg/day,
    Zn: 7300 μg/day). Concentration limits for individual drug substances/products should be calculated based on the maximum
    recommended dose.

    '
  applicable_categories:
  - safety
  - purity
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q3d-elemental-impurities-step-5_en.pdf
  year: 2019
  tags:
