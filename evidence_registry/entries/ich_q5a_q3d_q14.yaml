- id: Q5A-8
  type: guideline_clause
  source: ICH Q5A(R1)
  title: Raw Material Viral Safety - Bovine and Human-Derived Materials
  content: 'Raw materials of bovine or human origin used in manufacturing must be evaluated for viral safety. For bovine-derived
    materials (serum, growth factors), testing or certification from approved sources should be provided. Materials should
    come from countries with BSE surveillance and minimal viral disease risk. Human-derived raw materials must undergo appropriate
    viral testing (HIV, HBV, HCV antibodies/nucleic acids) and should be sourced from screened and tested donors where possible.
    The viral safety of raw materials should be established before incorporation into the manufacturing process. Inactivation
    or removal steps for adventitious viruses from raw materials should be validated where applicable.

    '
  applicable_categories:
  - safety
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q5a-viral-safety-evaluation-biotechnology-products-derived-mammalian-cell-lines-step-5_en.pdf
