- id: Q14-4
  type: guideline_clause
  source: ICH Q14
  title: Method Operable Design Region (MODR)
  content: 'The Method Operable Design Region (MODR) is the multidimensional operational space within which an analytical
    procedure is expected to operate reliably and produce valid results. The MODR encompasses the ranges of critical method
    parameters (CMPs) that have been demonstrated to yield acceptable performance. Development of the MODR involves systematic
    evaluation of parameter ranges through factorial or similar experimental designs, followed by multivariate statistical
    analysis to define the boundaries. For biologics, the MODR might include column temperature range (e.g., 20-30°C for size-exclusion
    chromatography), mobile phase pH range (e.g., pH 6.8-7.2), and flow rate ranges. The MODR should be sufficiently wide
    to accommodate routine operational variations while maintaining method performance. Definition and documentation of the
    MODR supports regulatory flexibility and lifecycle management of the analytical procedure post-approval.

    '
  applicable_categories:
  - purity
  - potency
  - identity
  - physicochemical
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q14-analytical-procedure-development-step-5_en.pdf
  year: 2023
