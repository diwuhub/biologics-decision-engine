- id: Q14-3
  type: guideline_clause
  source: ICH Q14
  title: Robustness Evaluation as Part of Analytical Development
  content: 'Robustness is evaluated during the analytical procedure development phase (not exclusively during validation)
    to assess the procedure''s ability to remain unaffected by small deliberate variations in method parameters. Robustness
    studies are typically conducted using factorial designs to evaluate the combined effects of parameter variations. For
    chromatographic methods applied to biologics, parameters evaluated include column temperature, mobile phase pH, flow rate,
    and column batch variations. Acceptance criteria should be established such that the procedure is considered robust if
    no failures or excessive variation occurs within the study design. Results of robustness evaluation inform the selection
    of critical method parameters, specification of the MODR, and control measures. Procedures demonstrating poor robustness
    may require redesign or enhanced process controls.

    '
  applicable_categories:
  - purity
  - potency
  - identity
  - physicochemical
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q14-analytical-procedure-development-step-5_en.pdf
  year: 2023
