entries:
- id: Q5A-1
  type: guideline_clause
  source: ICH Q5A(R1)
  title: Cell Line Characterization for Adventitious Agents
  content: 'Cell lines used in the production of biotechnology-derived products must be characterized for the presence of
    adventitious agents. Characterization should include testing for known viruses, mycoplasma, and other potential contaminants.
    The cell line history, including passage number and origin, must be thoroughly documented. All cells should be traced
    back to their original source, and evidence of safety through the manufacturing history must be provided.

    '
  applicable_categories:
  - safety
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q5a-viral-safety-evaluation-biotechnology-products-derived-mammalian-cell-lines-step-5_en.pdf
