- id: Q5A-4
  type: guideline_clause
  source: ICH Q5A(R1)
  title: Viral Clearance Validation Studies - Inactivation
  content: 'Viral inactivation studies must demonstrate the effectiveness of purification and inactivation steps in removing
    or inactivating viruses. Studies should use model viruses representing both enveloped and non-enveloped viruses. The inactivation
    process must be validated by spiking with high titers of test virus and demonstrating logarithmic reduction. Parameters
    affecting viral inactivation (pH, temperature, chemical treatment duration) should be studied. The robustness of the process
    should be demonstrated with reduced/enhanced parameters. Acceptance criteria typically require ≥4 log10 reduction, though
    higher reductions may be required depending on risk assessment outcomes.

    '
  applicable_categories:
  - safety
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q5a-viral-safety-evaluation-biotechnology-products-derived-mammalian-cell-lines-step-5_en.pdf
  year: 1999
  tags:
