- id: Q3D-4
  type: guideline_clause
  source: ICH Q3D(R2)
  title: Catalysts and Process-Related Metal Residuals
  content: 'Metal catalysts and reagents intentionally used in synthesis or manufacturing processes must be controlled to
    acceptable levels. Common catalysts in biopharmaceutical manufacturing include palladium, platinum, nickel, and iron.
    The residual metal content should be minimized through process optimization and/or purification steps. Specification limits
    should be set based on ICH Q3D PDE values, accounting for the maximum recommended dose of the drug product. Process validation
    should demonstrate consistent removal of catalytic metals across the manufacturing range. Documentation of catalyst selection,
    usage, removal procedures, and analytical testing requirements is essential for regulatory compliance. Consideration should
    be given to potential metal contamination from equipment (e.g., stainless steel components).

    '
  applicable_categories:
  - safety
  - purity
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q3d-elemental-impurities-step-5_en.pdf
  year: 2019
  tags:
  - catalysts
  - metal_residuals
