- id: Q14-5
  type: guideline_clause
  source: ICH Q14
  title: Lifecycle Management of Analytical Procedures
  content: 'Analytical procedures are subject to continuous lifecycle management post- approval. The lifecycle includes development,
    validation, implementation, and ongoing monitoring and improvement. Changes to analytical procedures may be classified
    as: 1) changes within the established MODR (routine changes that may not require full revalidation), 2) changes requiring
    verification studies, or 3) changes requiring full revalidation. Establishment of the MODR during development enables
    a risk-based approach to post-approval changes. Regular review of analytical data (control charts, out-of-specification
    results, method performance trends) should be conducted to identify potential method drift or issues. Continuous improvement
    initiatives may optimize procedure parameters or enhance robustness. Documentation of the analytical lifecycle, including
    rationale for changes and supporting data, supports regulatory compliance and ensures sustained method performance and
    reliability.

    '
  applicable_categories:
  - purity
  - potency
