- id: Q3D-5
  type: guideline_clause
  source: ICH Q3D(R2)
  title: Container Closure System Contributions to Elemental Impurities
  content: 'Container closure systems (vials, syringes, stoppers, needles) may contribute elemental impurities to pharmaceutical
    products, particularly for parenteral formulations. Common sources include iron, nickel, chromium, and manganese from
    stainless steel components, and boron from glass vials. Compatibility studies should evaluate leaching of elemental impurities
    from container materials into the product over the intended shelf life and storage conditions. Suppliers of primary packaging
    materials should provide elemental composition data or certificates of analysis. The cumulative elemental burden from
    all sources (raw materials, process steps, container closure system) should not exceed PDE-based concentration limits.
    For biologics, this assessment is particularly important given the typically small injection volumes and concentrated
    dosages.

    '
  applicable_categories:
  - safety
  - purity
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q3d-elemental-impurities-step-5_en.pdf
