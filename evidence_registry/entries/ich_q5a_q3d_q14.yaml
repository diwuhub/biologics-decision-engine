- id: Q3D-3
  type: guideline_clause
  source: ICH Q3D(R2)
  title: Risk Assessment Approach for Elemental Impurities in Biologics
  content: 'A risk assessment framework should be applied to determine control requirements for elemental impurities in biologics.
    The approach includes identifying sources of elemental impurities (raw materials, catalysts, equipment, container closure
    systems), assessing the likelihood and magnitude of contamination, and establishing appropriate control measures. For
    biologics derived from cell culture systems, metal content in cell culture media, growth factors, and supplements should
    be evaluated. The risk assessment should justify which elements require analytical testing and which can be controlled
    through component specifications or process controls. A tiered approach may be used: elements with low risk may not require
    routine testing if process controls are demonstrated.

    '
  applicable_categories:
  - safety
  - purity
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q3d-elemental-impurities-step-5_en.pdf
  year: 2019
  tags:
  - risk_assessment
