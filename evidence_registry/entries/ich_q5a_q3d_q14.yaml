- id: Q14-1
  type: guideline_clause
  source: ICH Q14
  title: Analytical Target Profile (ATP) Concept
  content: 'The Analytical Target Profile (ATP) defines the intended use and performance characteristics required of an analytical
    procedure. The ATP is established at the beginning of analytical procedure development and serves as the foundation for
    method design and validation strategy. The ATP should specify: the analyte (drug substance, impurity, or product attribute),
    matrix composition, expected concentration range, required accuracy and precision, selectivity requirements, and intended
    use (release testing, shelf-life stability, in-process controls). For biologics, the ATP may include specifications for
    identity, strength, purity, and potency of the drug substance and product. The ATP should be scientifically justified
    based on regulatory requirements, drug product characteristics, and intended clinical use.

    '
  applicable_categories:
  - purity
  - potency
  - identity
  - physicochemical
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q14-analytical-procedure-development-step-5_en.pdf
  year: 2023
  tags:
