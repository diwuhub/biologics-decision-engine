- id: Q5A-2
  type: guideline_clause
  source: ICH Q5A(R1)
  title: Testing of Master Cell Bank (MCB) and Working Cell Bank (WCB) for Viruses
  content: 'Master Cell Banks and Working Cell Banks must be tested for a comprehensive panel of viruses using both in vitro
    cell culture and in vivo assays. Testing requirements include mammalian viruses (e.g., bovine viral diarrhea virus, reovirus,
    parainfluenza virus), avian viruses where applicable, and retrovirus- like particles. Each cell bank lot must be tested
    individually. Detection methods should include electron microscopy, reverse transcriptase assay, and specific viral assays.
    Acceptance criteria must be established and documented before testing commences.

    '
  applicable_categories:
  - safety
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q5a-viral-safety-evaluation-biotechnology-products-derived-mammalian-cell-lines-step-5_en.pdf
