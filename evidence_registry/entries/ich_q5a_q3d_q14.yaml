- id: Q5A-7
  type: guideline_clause
  source: ICH Q5A(R1)
  title: Panel of Model Viruses for Clearance Studies
  content: 'A representative panel of model viruses must be used in viral clearance studies. The panel should include both
    enveloped and non-enveloped viruses, and both RNA and DNA viruses, to challenge different purification mechanisms. Typical
    viruses include poliovirus (RNA, non-enveloped), pseudorabies virus (DNA, enveloped), reovirus (RNA, non-enveloped), minute
    virus of mice (DNA, non-enveloped), and bovine viral diarrhea virus (RNA, enveloped). The selection of model viruses should
    be scientifically justified based on size, resistance to inactivation, and relevance to potential contaminating viruses.
    For each manufacturing step, the most resistant virus in the panel should be used for validation.

    '
  applicable_categories:
  - safety
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q5a-viral-safety-evaluation-biotechnology-products-derived-mammalian-cell-lines-step-5_en.pdf
