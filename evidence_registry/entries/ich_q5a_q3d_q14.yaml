  document_status: final
- id: Q5A-5
  type: guideline_clause
  source: ICH Q5A(R1)
  title: Viral Clearance Validation Studies - Removal
  content: 'Viral removal studies must demonstrate the effectiveness of purification steps in physically removing viruses
    from the product. Studies should employ model viruses of appropriate size and physical characteristics. Filtration steps
    (microfiltration, ultrafiltration) must be validated using virus spiking experiments. The log10 reduction value (LRV)
    should be determined for each model virus and purification step. Intermediate steps contributing to viral clearance should
    be evaluated and credited. The data should support the claimed safety margins and robustness of the manufacturing process
    across typical operating parameters.

    '
  applicable_categories:
  - safety
  confidence: 1.0
  url: https://www.ema.europa.eu/en/documents/scientific-guideline/ich-q5a-viral-safety-evaluation-biotechnology-products-derived-mammalian-cell-lines-step-5_en.pdf
