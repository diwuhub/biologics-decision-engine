- id: ISS-IMP-002
  type: issue_taxonomy
  source: CMC Inspection Findings
  title: Residual Protein A leaching from affinity resin
  content: 'Detection of Protein A (typically 1-50 ppm) in purified drug substance or drug product. Protein A is used for
    mAb purification but is an animal-derived material with potential immunogenicity risk. Leaching may indicate inadequate
    wash/elution, resin degradation, or column lifetime exceeded.

    **Regulatory Significance**: FDA expects Protein A levels to be minimized, typically to <1 ppm if detectable at all, and
    ideally undetectable (<0.5 ppm). Protein A is xenogeneic (porcine IgG binding protein) and could trigger immune response.
    Regulatory agencies monitor Protein A residuals as indirect indicator of purification process control.

    **Typical Root Causes**: Resin degradation (mechanical or chemical) releasing protein A; column lifetime exceeded (resin
    typically supports 50-100 purification cycles); inadequate elution wash (e.g., low salt, neutral pH favoring protein A
    binding); elevated temperature during purification causing protein A crosslinking; proteolytic degradation of protein
    A releasing peptides.

    **Investigation Approach**: Validate Protein A ELISA specificity and sensitivity. Measure Protein A at multiple purification
    steps (post-harvest, post-affinity, post-polishing, post-diafilter) to identify source. Assess column history (number
    of cycles used, maximum allowed per qualification). Conduct column resin integrity testing (absorbance at 280 nm of wash
    fractions). Perform resin stability study under actual use conditions. Test low salt wash (0.1 M NaCl) vs. high salt wash
    (1.0 M NaCl) effectiveness. Audit manufacturing process (column packing, operating pressures, flow rates).

    **Severity**: Major

    **Resolution Pathways**: 1. Replace protein A column with fresh/new resin 2. Tighten column lifetime definition and implement
    strict cycle counting 3. Increase elution salt concentration (move from 0.5 M to 1.0 M NaCl) 4. Add high salt wash step
    post-binding (0.5-1.0 M NaCl) 5. Reduce column operating temperature if feasible (4°C vs. room temperature) 6. Implement
    Protein A detection in release testing for all future lots 7. Consider alternative purification platform (e.g., protein
    G, engineered domain)

    '
