- id: ISS-CMP-003
  type: issue_taxonomy
  source: Analytical Method Development
  title: Analytical method changed simultaneously with process change
  content: "Process change implemented at same time as analytical method validation/transfer (e.g., SEC-HPLC revalidated,\
    \ CEX method changed, potency assay improved). Unable to determine if observed differences in results are due to process\
    \ change or analytical method change. Confounding variables invalidate comparability conclusion.\n**Regulatory Significance**:\
    \ This is a critical study design flaw. Comparability requires that analytical methods remain constant so differences\
    \ attributed to process change, not method. FDA expects analytical methods frozen before process change, with comparability\
    \ data generated using same methods. Method changes must be implemented independently, with validation data provided separately.\n\
    **Typical Root Causes**: Timing coincidence (method improvement identified during process change planning); assumption\
    \ that minor method refinement won't affect comparability; pressure to implement improvements simultaneously; inadequate\
    \ project planning to sequence method and process changes separately.\n**Investigation Approach**: Document analytical\
    \ method version/revision at time of process change implementation. Compare analytical method protocols (especially assay\
    \ parameters, column, calibration, acceptance criteria) between pre-change and post-change periods. If method changed,\
    \ analyze whether change is \"significant\" (per ICH Q2 criteria): sensitivity, selectivity, range, accuracy, precision,\
    \ linearity. Establish method equivalence between old and new methods using overlapping sample analysis.\n**Severity**:\
    \ Critical\n**Resolution Pathways**: 1. Establish analytical method equivalence by analyzing pre-change samples with both\
    \ old\n   and new methods (if old method still available)\n2. If methods not equivalent, re-analyze all pre-change lots\
    \ using frozen method version 3. Clearly document in comparability report which analytical method version used for each\n\
    \   phase\n4. Consider repeating comparability study with method held constant 5. For future process changes, freeze analytical\
    \ methods 6-12 months before change,\n   complete validation before change implementation\n"
