- id: ISS-STB-001
  type: issue_taxonomy
  source: Stability Strategy Review
  title: Accelerated stability not predicting real-time stability
  content: "Drug substance or drug product exhibits acceptable stability at accelerated conditions (25°C/60%RH or 40°C/75%RH,\
    \ 6 months) but shows degradation or out-of-spec results at real-time conditions (2-3 year timepoint). Indicates potential\
    \ for non-Arrhenius kinetics or higher-order degradation mechanism.\n**Regulatory Significance**: Accelerated stability\
    \ (40°C/75%RH) aims to compress shelf-life assessment. However, some degradation pathways are non-linear or temperature-dependent\
    \ in unpredictable ways. FDA expects real-time stability data to support proposed shelf-life. If real-time data shows\
    \ degradation not seen in accelerated study, shelf-life may be shortened or formulation revised.\n**Typical Root Causes**:\
    \ Crystallization or phase separation occurring at lower temperatures; enzymatic degradation with different temperature\
    \ coefficient than chemical degradation; protein misfolding kinetics not captured by 40°C conditions; ice formation in\
    \ frozen storage altering protein structure; photodegradation pathway not apparent in accelerated timeframe. Heterogeneous\
    \ nucleation (initiating crystallization) at room temperature but not at 40°C.\n**Investigation Approach**: Plot degradation\
    \ rate constants (pseudo-first-order) from accelerated (40°C) vs. real-time (25°C) data as function of temperature. Test\
    \ Arrhenius assumption (plot ln(k) vs. 1/T). If non-linear, investigate potential phase transition or higher-order kinetics.\
    \ Perform low temperature storage study (2-8°C, 12 months) to assess if degradation decreases at lower temperature. Conduct\
    \ temperature cycling study to assess crystallization potential. Examine physical state at different temperatures (visual\
    \ inspection, microscopy, DSC/DTA). If photodegradation suspected, measure photon exposure in study conditions.\n**Severity**:\
    \ Critical\n**Resolution Pathways**: 1. Reduce proposed shelf-life to match real-time data trend-out 2. Change storage\
    \ condition to lower temperature (e.g., 2-8°C vs. 25°C) 3. Add light-protective packaging (amber vial, carton) 4. Reformulate\
    \ to prevent crystallization (adjust pH, ionic strength, excipients) 5. Add stabilizing excipient (trehalose, sorbitol,\
    \ mannitol) to prevent protein misfolding 6. Implement expanded real-time stability study at proposed expiry (24-36 months)\
    \ before\n   regulatory submission\n"
