- id: ISS-IMP-003
  type: issue_taxonomy
  source: Single-Use System Review
  title: Leachables from single-use manufacturing systems
  content: 'Detection of extractables/leachables from single-use bioreactors, filters, or bag systems in drug substance or
    drug product. Common leachables include plasticizers (DEHP, DOP), surfactants, and oligomeric components from polymeric
    tubing/bags.

    **Regulatory Significance**: Leachables are chemical contaminants of concern to regulators. FDA expects characterization
    and quantification of known leachables. If leachables exceed Permitted Daily Exposure (PDE) thresholds, formulation or
    system change may be required. Uncharacterized leachables that appear during stability require investigation.

    **Typical Root Causes**: Single-use polymer materials (polystyrene, polycarbonate, polypropylene) releasing inherent plasticizers
    or monomers under stress (agitation, temperature, aggressive solvents). Silicone-based lubricants from filter membranes
    or valve stems. Surfactant additives from bag formulations. Elastomer components (stoppers, gaskets) leaching compounds.
    Temperature and agitation stress during fermentation or purification.

    **Investigation Approach**: Conduct extractables study on single-use materials per USP <1663> using relevant extraction
    solvents (aqueous, 50% ethanol, ethanol). Identify extracted compounds using GC-MS or LC-MS. Quantify known leachables
    (DEHP, DOP, siloxanes) by targeted LC-MS or GC-MS. Analyze drug product at T=0, 6mo, 12mo stability for same leachables.
    Compare to reference material or literature values. Assess PDE compliance. Audit supplier documentation for material composition
    and QC testing. Consider material migration models (finite element analysis) under actual processing conditions.

    **Severity**: Minor to Major (depending on leachable identity and PDE)

    **Resolution Pathways**: 1. Switch to alternative single-use system supplier (different material composition) 2. Reduce
    fermentation/purification temperature if viable 3. Minimize agitation/shear stress during processing 4. Add additional
    polishing step to remove leachables (e.g., activated carbon, ion exchange) 5. Switch to glass or non-leaching stainless
    steel if feasible 6. Implement leachables control plan and specification limits based on PDE 7. Monitor lot-to-lot leachables
    variability from single-use supplier

    '
