- id: ISS-STB-003
  type: issue_taxonomy
  source: Photostability Testing
  title: Photodegradation of tryptophan residues and aromatic amino acids
  content: 'Loss of potency, altered charge profile, or increased aggregation observed under ICH photostability conditions
    (1.2 million lux hours visible light, 200 Wh/m² UV-A). Indicates inadequate light protection in primary packaging.

    **Regulatory Significance**: Proteins with multiple tryptophan residues (particularly anti-oxidant tryptophan, W86, W32,
    W95 in mAbs) are photosensitive. ICH Q1B photostability testing is required unless light-protective packaging is used.
    If photodegradation exceeds ±10% of initial value, light-protective packaging (amber vial, carton opaque to light) is
    mandatory.

    **Typical Root Causes**: Tryptophan photodegradation via singlet oxygen formation and oxidation; tyrosine photo-oxidation;
    disulfide bond reduction under UV-A; protein misfolding secondary to tryptophan/tyrosine damage. Inadequate UV filters
    in packaging. Direct sunlight exposure in field (patient homes).

    **Investigation Approach**: Conduct ICH photostability test on drug product in primary container as proposed (clear vial
    in cool white/UV-A light per ICH Q1B). Measure potency, aggregation, charge variants, and tryptophan fluorescence at T=0
    and post-exposure. If degradation >10%, test light-protective packaging (amber vial, opaque carton). Measure tryptophan
    oxidation directly using high-performance liquid chromatography (HPLC) or mass spectrometry. Assess singlet oxygen contribution
    using 1O2 quenchers (sodium azide).

    **Severity**: Major

    **Resolution Pathways**: 1. Switch primary container to amber (dark yellow/brown) vial 2. Add opaque carton packaging
    to protect from direct light exposure 3. Add light-protective excipient (e.g., BHA, propyl gallate, ascorbate) if not
    already present 4. Increase antioxidant concentration (methionine, EDTA) 5. Conduct repeat photostability study with light-protective
    packaging to confirm stability 6. Update labeling with light-protection storage instruction ("protect from light")

    '
