- id: ISS-STB-004
  type: issue_taxonomy
  source: Shelf-Life Assessment
  title: Stability at new storage condition (e.g., room temperature vs. refrigerated)
  content: "Drug substance or drug product formulated for 2-8°C storage, but manufacturing/distribution may involve room temperature\
    \ exposure (25°C). New stability study shows faster degradation at 25°C than 2-8°C. May indicate need for revised storage\
    \ recommendations or formulation change to support room temperature storage.\n**Regulatory Significance**: Room temperature\
    \ (25°C/60%RH) storage is preferred by patients and reduces cold-chain logistics. FDA encourages room temperature storage\
    \ where feasible. However, if stability is inadequate at 25°C, shelf-life may be shorter or formulation must be revised.\
    \ Regulatory agencies review stability margin (difference between interim timepoint and spec limit) to determine if real-time\
    \ shelf-life is supported.\n**Typical Root Causes**: Protein oxidation kinetics increase exponentially with temperature\
    \ (Q10 ~2-4 for oxidative reactions); aggregation accelerates with temperature; buffer capacity diminishes; excipient\
    \ degradation or interaction increases; water uptake (in lyophilized products) increases at higher humidity.\n**Investigation\
    \ Approach**: Conduct real-time stability study at 25°C/60%RH in addition to 2-8°C baseline. Measure degradation pathways\
    \ (aggregation, oxidation, charge variants, potency) at equivalent timepoints (0, 6mo, 12mo, 18mo, 24mo, 36mo). Compare\
    \ degradation rates at both temperatures using Arrhenius or modified Arrhenius model. Assess if 25°C data would require\
    \ shortened expiry. Test formulation modifications (increased antioxidant, surfactant, cryoprotectant) to support 25°C\
    \ storage. Perform stress study at 30°C/75%RH to assess upper temperature limit.\n**Severity**: Major\n**Resolution Pathways**:\
    \ 1. If 25°C stability marginal, maintain 2-8°C storage condition with no change needed 2. If acceptable at 25°C but slower\
    \ than 2-8°C, can propose room temperature storage with\n   shortened expiry (e.g., 12 months RT vs. 24 months 2-8°C)\n\
    3. Reformulate to improve 25°C stability (increase antioxidant, surfactant, buffering capacity) 4. Add desiccant or barrier\
    \ film to reduce moisture ingress (if lyophilized product) 5. Switch to more stable formulation excipient combination\
    \ 6. Validate proposed room temperature storage with full real-time study (36+ months)\n"
