- id: ISS-CMP-001
  type: issue_taxonomy
  source: Comparability Study Guidance
  title: Insufficient number of lots for analytical comparability
  content: "Comparability study generated using only 2-3 manufacturing lots before/after process change, which is statistically\
    \ insufficient to detect 10-15% differences or to assess lot-to-lot variability. FDA expects minimum 3-6 lots per phase\
    \ to assess both mean shift and variance change.\n**Regulatory Significance**: Adequate lot sampling is critical to comparability\
    \ assessment. Small sample size increases risk of both Type I errors (falsely claiming equivalence) and Type II errors\
    \ (missing real differences). FDA reviews lot matrix critically and may request additional lots if sample size is insufficient.\
    \ Inability to justify lot number may result in Refuse to File (RTF).\n**Typical Root Causes**: Limited manufacturing\
    \ capacity; time pressure to submit regulatory application; cost of running additional manufacturing lots; assumption\
    \ that 2-3 lots is \"industry standard\" without formal statistical justification.\n**Investigation Approach**: Conduct\
    \ power analysis to determine minimum lot number needed to detect clinically/functionally meaningful difference (e.g.,\
    \ 15% potency change) with 80% power and 5% Type I error. Account for within-lot variability (assay CV) and expected between-lot\
    \ variability. Compare to FDA guidance (typically 3 pre-change + 3 post-change minimum). Assess if additional lots can\
    \ be manufactured within regulatory timeline. Document rationale for chosen lot number.\n**Severity**: Major\n**Resolution\
    \ Pathways**: 1. Manufacture additional pre-change and post-change lots (target 3-6 each phase minimum) 2. Expand analytical\
    \ testing matrix to provide more data points per lot (multiple containers,\n   multiple assays)\n3. Conduct formal statistical\
    \ power analysis to justify lower lot number if time-limited 4. Document scientific justification for lot number in comparability\
    \ protocol 5. Engage regulatory authority pre-submission to confirm acceptability of planned lot matrix\n"
