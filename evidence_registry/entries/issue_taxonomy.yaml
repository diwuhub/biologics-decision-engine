- id: ISS-STB-002
  type: issue_taxonomy
  source: Freeze-Thaw Study Findings
  title: Freeze-thaw degradation in drug substance
  content: 'Increased aggregation, loss of potency, or other degradation observed after freeze-thaw cycles (3-5 cycles at
    -20°C or -70°C) in drug substance or drug product. Indicates inadequate protective excipient coverage or formulation instability.

    **Regulatory Significance**: Freeze-thaw cycles are routine in manufacturing (intermediate storage, drug substance holding).
    FDA expects protein to remain stable through multiple freeze-thaw cycles. Loss of >10% potency or increase in aggregation
    >5% is generally unacceptable. If freeze-thaw instability observed, formulation change or reduced storage cycle limits
    may be required.

    **Typical Root Causes**: Inadequate surfactant (polysorbate 80) coverage leading to protein adsorption to ice-liquid interface;
    ice crystal formation causing protein denaturation; phase separation of excipients during freezing; osmotic stress from
    ice formation; absence of cryoprotectants (glucose, trehalose, glycerol). Electrolyte concentration changes during freezing
    affect pH microenvironment.

    **Investigation Approach**: Conduct formal freeze-thaw study (3-5 cycles at -20°C or -70°C with thaw at 2-8°C for 1-2
    hours). Measure aggregation (SEC-HPLC) and potency (cell-based or ELISA) after each cycle. If degradation observed, test
    formulation variables: (1) increase polysorbate 80 concentration (0.01% → 0.05%); (2) add cryoprotectant (5% glucose,
    1-3% trehalose, 5% glycerol); (3) adjust pH toward neutral (pH 7.0). Perform visual inspection for phase separation. Measure
    solution pH after thaw cycle to assess buffer capacity.

    **Severity**: Major

    **Resolution Pathways**: 1. Increase polysorbate 80 concentration (0.01-0.05%) 2. Add cryoprotectant (5-10% glucose, 1-5%
    trehalose, or 5-10% glycerol) 3. Increase buffer ionic strength or add additional buffer capacity 4. Store drug substance
    at 2-8°C instead of -20°C if viable (shorter term) 5. Implement single-use aliquoting to minimize repeated freeze-thaw
    cycles 6. Validate freeze-thaw stability with revised formulation (minimum 3 cycles)

    '
