- id: ISS-CMP-004
  type: issue_taxonomy
  source: Trending Analysis
  title: Trending data shows drift but each lot passes specification
  content: "Statistical trend analysis reveals gradual increase (or decrease) in a quality attribute across multiple manufacturing\
    \ lots over time, but each individual lot remains within specification limits. May indicate incipient process drift that\
    \ could eventually result in out-of-spec lots if not addressed. Regulatory concern: are spec limits adequate?\n**Regulatory\
    \ Significance**: Trending analysis is required by FDA (21 CFR 211.192). Gradual drift within spec may indicate deteriorating\
    \ process capability or emergence of assignable cause. Regulators expect companies to initiate process improvement when\
    \ trend detected, not wait for spec excursion. May trigger CAPA investigation and specification limit review.\n**Typical\
    \ Root Causes**: Gradual cell line passage number increase; fermentation parameter drift (pH setpoint creep, dissolved\
    \ oxygen control drift); column resin degradation through cycle number accumulation; equipment calibration drift; environmental\
    \ condition changes (temperature, humidity in manufacturing suite); minor change in raw material supplier or lot.\n**Investigation\
    \ Approach**: Implement statistical trending (plot attribute vs. time, calculate linear/non-linear trend line, assess\
    \ statistical significance). Conduct root cause analysis for upward/downward trend: (1) review manufacturing records for\
    \ parameter drift; (2) assess cell line passage number; (3) audit equipment calibration records; (4) review environmental\
    \ monitoring data; (5) analyze raw material lot numbers and supplier changes. Identify whether trend is random variation\
    \ or assignable cause. If assignable cause, implement targeted CAPA.\n**Severity**: Major\n**Resolution Pathways**: 1.\
    \ Implement statistical trending alerts (control charts) with alert limit lower than spec 2. Conduct root cause investigation\
    \ when alert triggered 3. Implement CAPA for identified assignable cause (e.g., cell line passage control, equipment\n\
    \   maintenance, raw material supplier audit)\n4. Review specification limits to ensure they remain protective (consider\
    \ tightening if\n   trend approaches limits)\n5. Establish intermediate control limits (action limits) below specification\
    \ to trigger\n   process evaluation before spec violation\n6. Increase manufacturing lot sampling frequency if trend continues\n"
  applicable_categories:
  - comparability
  - process_control
  - trending
