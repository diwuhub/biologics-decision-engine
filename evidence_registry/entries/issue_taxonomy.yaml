- id: ISS-CMP-002
  type: issue_taxonomy
  source: Post-Approval Stability
  title: Pre-change reference standard expired before comparison complete
  content: "Pre-change reference standard or comparator product used in comparability study reaches expiration before all\
    \ analyses are complete or validated. Results in incomplete baseline data or need to use alternative/degraded reference\
    \ that compromises data integrity.\n**Regulatory Significance**: Reference standards must be qualified, characterized,\
    \ and used within expiration date. If pre-change reference expires, comparability study lacks valid baseline. Regulatory\
    \ agencies require new/replacement reference standard or study invalidation. This is a critical GMP/analytical compliance\
    \ issue.\n**Typical Root Causes**: Limited availability of pre-change reference material; long lead-time for comparability\
    \ study (manufacturing, analytical, regulatory review); reference standard stability issues (shorter shelf-life than anticipated);\
    \ failure to order replacement reference in advance.\n**Investigation Approach**: Verify reference standard expiration\
    \ date early in comparability protocol. Assess remaining shelf-life relative to planned study duration. Identify source\
    \ of pre-change reference (retained sample, comparator drug product, or synthesized standard). If retained sample, assess\
    \ stability (visual, potency, purity) at proposed storage condition. Plan for replacement reference standard procurement\
    \ early (3-6 months lead-time). Document characterization data for new reference standard batch.\n**Severity**: Critical\n\
    **Resolution Pathways**: 1. Immediately procure replacement pre-change reference standard if available 2. Characterize\
    \ replacement reference standard using archived analytical data from original\n   comparator\n3. Extend study timeline\
    \ to accommodate new reference standard characterization (minimum\n   3 months)\n4. If no valid reference standard available,\
    \ request regulatory waiver or accept study\n   delay/re-do\n5. For future comparability studies, identify reference standard\
    \ source and shelf-life early\n   and order replacement batches in advance\n"
