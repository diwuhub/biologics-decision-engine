  content: 'Proteolytic cleavage of antibody chains (heavy chain, light chain, or Fab-Fc junction) during manufacturing hold
    steps; leads to loss of function and novel species Typical sources: Residual proteases from cell culture or purification
    resins; Endogenous protease activation at elevated temperature/pH; Extended hold times at room temperature; Contaminating
    proteases (bacterial or fungal from manufacturing environment); Serum proteases in media batches (BSA or FBS contamination).
    Detection: Intact MS (loss of mass corresponding to cleaved fragment); SE-HPLC (increased peak asymmetry or new peaks);
    SDS-PAGE reducing/non-reducing (chain fragmentation visible); Peptide mapping (new cleavage products); SEC-MALS (heterogeneous
    MW). Severity: High. Regulatory significance: Critical quality issue; fragments may lack efficacy and pose safety concern;
    must remain <0.5% Mitigation: Minimize hold times at room temperature; protease inhibitors during manufacturing; validated
    inactivation steps; aseptic processing controls'
