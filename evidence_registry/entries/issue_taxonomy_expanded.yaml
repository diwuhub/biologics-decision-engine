  content: 'N-terminal glutamine cyclizes to form pyroglutamic acid (pGlu); increases molecular weight by -18 Da (loss of
    ammonia), charge changes Typical sources: Elevated pH during formulation/hold (>7.0); Elevated temperature; Extended manufacturing
    hold times; Direct expression from CHO cells may produce heterogeneous N-terminal processing. Detection: Peptide mapping
    (mass shift -18 Da for pGlu-modified N-terminus); Intact MS (mixture of populations); Capillary electrophoresis (heterogeneity
    detection); Amino acid sequencing (Edman shows pGlu blockage). Severity: Medium. Regulatory significance: Comparability
    concern; must match innovator distribution (often as charge variants) Mitigation: pH control <pH 7.5 during manufacturing;
    minimize hold times at room temperature; accelerated stability studies to quantify rate'
  id: ISS-EXP-N_TERMINAL_PYR_GLU
  source: 'ICH Q5C (Quality of Biotechnology Products), FDA Guidance: Comparability for Therapeutic Protein Products'
