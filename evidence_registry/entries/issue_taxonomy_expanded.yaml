  content: 'Asparagine or glutamine residue in CDR undergoes deamidation (Asn→Asp/isoAsp; Gln→Glu/isoGlu); charge shift and
    geometry change disrupt target recognition Typical sources: Elevated pH during manufacturing (>7.5); Elevated temperature
    during processing/storage; Acidic residues or amino acids in n+1/n-1 positions accelerate reaction (Asn/Gln adjacent to
    small residues); Asparagine in CDR2 or CDR3 of many clones (hotspot residues identified). Detection: Peptide mapping with
    deamidation-specific chromatography (isoAsp detection by MS); Isoelectric focusing (charge variant analysis); Capillary
    electrophoresis (native or IEF mode); Potency/binding assay (functional impact); cIEF or RP-HPLC-UV with high resolution.
    Severity: High. Regulatory significance: Critical comparability marker; even low deamidation in critical CDR residues
    can impact efficacy Mitigation: Strict pH control (pH 6.5-7.5 during manufacturing); controlled temperature; excipient
    selection (avoid Mg2+, promotes deamidation)'
  id: ISS-EXP-DEAMIDATION_CDR
  source: 'FDA Guidance: Comparability for Therapeutic Protein Products (2019), ICH Q5C (Quality of Biotechnology Products)'
