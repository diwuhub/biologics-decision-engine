  content: 'Variation in whether C-terminal residue is amidated (e.g., Ser-CONH2 vs Ser-COOH); affects charge and potentially
    FcRn/receptor binding Typical sources: Incomplete C-terminal post-translational modification in CHO cells (variable extent);
    Proteolytic cleavage partial, leading to free carboxyl vs amide; Cell culture media/pH effects on amidation enzyme activity;
    Difference between mammalian vs microbial expression (platform-dependent). Detection: Peptide mapping focusing on C-terminal
    region (MS or HPLC); Intact MS (mass difference 0.984 Da between COOH and CONH2); Capillary electrophoresis (charge difference);
    Amino acid sequencing (Edman degradation). Severity: Medium. Regulatory significance: Process-dependent marker; impacts
    manufacturability claims and bioequivalence assessment Mitigation: Characterize baseline amidation level; establish process
    control and specification; monitor in-process control'
  id: ISS-EXP-C_TERMINAL_AMIDATION
