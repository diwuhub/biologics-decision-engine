  content: 'Incorrect inter- or intra-chain disulfide pairing during manufacturing/storage; typically from exposure to reducing
    agents or alkaline pH Typical sources: Purification resin residuals (DTT carryover); pH excursions (>8) during formulation/hold
    steps; Oxidative stress with insufficient native disulfide stability; Freeze-thaw cycling with redox-active impurities.
    Detection: Intact MS with native/denaturing comparison; Peptide mapping with reduction/non-reduction; Isoelectric focusing
    (native vs denaturing); HDX-MS (structural perturbation). Severity: High. Regulatory significance: Critical comparability
    marker; direct impact on Fc-receptor binding and target engagement Mitigation: Tight pH control during manufacturing;
    validated disulfide reduction/oxidation protocols; reducing agent removal verification'
  id: ISS-EXP-DISULFIDE_SCRAMBLING
  source: 'FDA Guidance: Comparability for Therapeutic Protein Products (2019), ICH Q5C (Quality of Biotechnology Products)'
