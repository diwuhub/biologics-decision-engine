  content: 'Mechanical agitation, vibration, or temperature cycling during transport causes protein aggregation, container
    stress fractures, or glass delamination releasing particles Typical sources: Vibration from vehicle transport (truck,
    air freight); Temperature cycling (loading dock temperature swings); Improper cushioning/packaging (vials contact rigid
    surfaces); Freeze-thaw cycling during cold chain breaks; Pressure changes during air transport; Glass delamination from
    temperature shock (cold package → warm storage). Detection: Subvisible particle count pre- and post-shipment (MFI/FlowCam);
    Particle size/morphology analysis (protein vs glass origin); Potency/appearance trending; Accelerated transport simulation
    (vibration chamber, thermal cycling). Severity: Medium-High. Regulatory significance: Post-approval surveillance concern;
    regulatory action if acceptance criteria exceeded; trend data critical for CMC Mitigation: Optimize secondary packaging
    (foam insert design); thermal stability testing under transport conditions; vibration testing of package; cold chain management;
    particle size specification monitoring'
  id: ISS-EXP-SUBVISIBLE_PARTICLE_SHIPPING
