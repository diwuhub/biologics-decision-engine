  confidence: 0.85
  content: 'Cell culture media components (amino acids, vitamins, growth factors, trace elements) vary batch-to-batch from
    suppliers; affects cell growth kinetics, protein yield, and posttranslational modification patterns Typical sources: Amino
    acid composition variability (especially branched-chain amino acids); Trace metal content variations (Fe, Zn, Cu levels);
    Growth factor potency variability (EGF, FGF, HGF); Vitamin concentration differences (biotin, folate); Osmolality or pH
    drift of media components; Supplier changes or component sourcing changes (geographical, seasonal). Detection: Cell growth
    rate monitoring (viable cell concentration, growth kinetics); Protein titer measurement (yield impact); Charge variant
    profile assessment (cIEF/RP-HPLC - affects PTM patterns); Potency assay trending; ICP-MS (trace metal content in media);
    Amino acid profiling. Severity: Medium-High. Regulatory significance: CMC impact on lot-to-lot consistency; can trigger
    release hold if charge variants or potency shift observed; requires supplier qualification and in-process control monitoring
    Mitigation: Media supplier qualification (stability profile, USP/EP specification); established cell culture control parameters
    (pH, osmolality, amino acid profiling); in-process monitoring (titer, charge variants, potency); specification tolerance
    ranges; media lot acceptance testing before manufacturing use'
  id: ISS-EXP-RAW_MATERIAL_VARIABILITY_MEDIA
  source: 'ICH Q7 (Good Manufacturing Practice), ICH Q9 (Quality Risk Management), FDA Guidance: Changes to Established Drug
    Products (2002)'
