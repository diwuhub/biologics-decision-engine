  content: 'Residual protein from previous manufacturing run (same facility, different product) contaminates current batch
    via inadequate cleaning or shared equipment Typical sources: Shared bioreactors, chromatography resins, fill-finish equipment
    without validated cleaning; Inadequate campaign separation (different antibodies on same line); Environmental contamination
    (air handling, personnel, splash); Transfer of filters, tubing, equipment between products; Carryover in recirculating
    water systems (WFI loops). Detection: Species-specific HPLC or SEC-HPLC (co-elution detection difficult); Mass spectrometry
    (intact MS, peptide mapping - species identification); Product-specific ELISA or immunoassay; Cell line-specific PCR (if
    CHO product contaminated with mammalian product); ATP bioluminescence (microbial risk assessment). Severity: High. Regulatory
    significance: Critical regulatory concern; product safety and identity issue; can trigger product recall; requires robust
    cleaning validation and in-process controls Mitigation: Facility segregation (dedicated suites); validated cleaning procedures
    (ATP monitoring, product-specific swabs); campaign separation; dedicated equipment; environmental monitoring; product-specific
    tests in release specifications'
  id: ISS-EXP-CROSS_CONTAMINATION_MULTIPRODUCT
  source: 'FDA Guidance: Contamination of Injectables (2003), ICH Q7 (Good Manufacturing Practice), FDA Guidance: Risk-Based
