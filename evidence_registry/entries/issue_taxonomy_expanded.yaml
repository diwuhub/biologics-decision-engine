  content: 'Oxidation of tryptophan residues (typically in CDRs or Fab interface) to kynurenine/other oxidation products;
    alters binding kinetics Typical sources: Oxidative stress (singlet oxygen, ROS); Light exposure (especially 300-400 nm);
    Metal-catalyzed oxidation; Hydrogen peroxide from cell culture or purification steps; Extended storage without protection.
    Detection: Peptide mapping with differential UV detection (340 nm); Intact MS (variable mass shift depending on oxidation
    product); Potency assay trending (early indicator); HPLC with fluorescence detection. Severity: Medium-High. Regulatory
    significance: Loss of potency through oxidation is a comparability concern; must be controlled to <0.5-1% Mitigation:
    Light-protected storage (amber vials); antioxidant excipients; oxygen removal (nitrogen flush); EDTA/metal chelation'
  id: ISS-EXP-TRP_OXIDATION
  source: 'ICH Q3B (Impurities), FDA Guidance: Analytical Procedures and Methods Validation'
