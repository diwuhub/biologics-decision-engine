  content: 'Buffer salts crystallize at low temperature (eutectic crystallization) during freezing, altering solution pH and
    ionic strength; protein can aggregate in altered microenvironment Typical sources: Phosphate buffer at pH 7.0-7.5 (eutectic
    -17°C); Acetate buffer at certain concentrations; Multiple freeze-thaw cycles; Vial headspace variability (nucleation
    sites); Slow freezing rate (allows crystal nucleation). Detection: Visual inspection (crystals visible at bottom of frozen
    vials); pH measurement post-thaw (pH shift indicates crystallization); Osmolality measurement (osmolyte concentration
    change); Stability data (potency loss, aggregation increase post-thaw); Microscopy (crystal identification). Severity:
    Medium. Regulatory significance: CMC control point; affects stability data interpretation; must be characterized in frozen
    product studies Mitigation: Buffer selection (use buffering species with minimal eutectic effect); formulation pH optimization;
    cryoprotectant excipients (mannitol, trehalose); controlled freezing rate; vial-to-vial variability control'
  id: ISS-EXP-BUFFER_CRYSTALLIZATION
  source: ICH Q1A (Stability Testing), ICH Q3B (Excipient Justification)
