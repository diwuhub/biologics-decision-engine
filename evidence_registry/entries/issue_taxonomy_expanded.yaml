  content: 'Protein concentration >100 mg/mL increases solution viscosity; impacts injectability, flowability, and syringe
    fill accuracy Typical sources: High protein concentration (inherent property); Excipient choices (some stabilizers, sugars
    increase viscosity); pH and ionic strength affecting protein hydration shell; Aggregation or partial misfolding increasing
    effective volume; Temperature sensitivity of viscosity. Detection: Viscosity measurement (cone-and-plate or capillary
    rheometer); Viscosity trending during stability; Flow-time measurement (Ph.Eur. <2.2.9>); Syringe fill accuracy/consistency
    testing; Injectability assessment (needle penetration force, plunger friction). Severity: Medium. Regulatory significance:
    CMC control point; affects patient acceptability and manufacturing (fill/finish operations); specification critical Mitigation:
    Excipient optimization (sugar alcohols, amino acids reduce viscosity); pH/ionic strength adjustment; silicone oil application
    (syringes); rheology study during development; pre-filled syringe design optimization'
  id: ISS-EXP-VISCOSITY_HIGH_CONC_SC
  source: ICH Q6B (Acceptance Criteria), Ph.Eur. <2.2.9> (Flow Time)
