  confidence: 0.85
  content: 'Polysorbate (80, 20) undergoes oxidation (peroxide formation) and hydrolysis (ester bond cleavage to oleic acid/sorbitan);
    degradation products can aggregate or oxidize protein Typical sources: Exposure to light (especially UV or visible light);
    Metal ion catalysis (Fe2+, Cu2+, trace metals from manufacturing); Oxygen in headspace (unsaturated fatty acid side chains
    oxidize); Elevated temperature; Extended storage time; Mechanical stress (agitation during manufacturing). Detection:
    HPLC analysis of polysorbate (free fatty acids, peroxides, hydrolysis products); Peroxide number determination (iodometric
    titration); GC-MS (fatty acid profile); Protein aggregation assay (indicator of oxidation impact); pH/conductivity trending
    (hydrolysis produces acidic species). Severity: High. Regulatory significance: Critical stability concern; polysorbate
    peroxides/hydrolysis products directly impact protein stability; specification justification required Mitigation: Polysorbate
    supplier qualification (peroxide, free fatty acid acceptance criteria); antioxidants (EDTA, ascorbic acid); light protection
    (amber vials); nitrogen headspace; metal ion control; temperature control during manufacturing/storage'
  id: ISS-EXP-EXCIPIENT_DEGRADATION_POLYSORBATE
  source: 'ICH Q3B (Impurities: Excipients), FDA Guidance: Polysorbate Excipient Degradation Study (2018), USP <467> (Residual
