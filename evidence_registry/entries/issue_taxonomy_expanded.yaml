  content: 'Color shift (yellowing, browning) from oxidation/degradation of excipients (polysorbate, EDTA), metal ion catalysis,
    or protein oxidation; turbidity from aggregation or precipitation Typical sources: Polysorbate peroxide formation (hydrolysis
    to peroxide); EDTA or other chelators precipitate with trace metals; Phenolic excipients oxidize to colored quinone products;
    Aggregate formation visible as haze/cloudiness; Container-closure interaction (glass leachables, plastic discoloration);
    Light exposure (photodegradation). Detection: Visual inspection (manual or automated); Turbidity measurement (NTU); Spectrophotometry
    (UV-Vis absorbance at 420 nm for discoloration); HPLC (colored oxidation products); Microscopy (particle morphology).
    Severity: Medium. Regulatory significance: Regulatory rejection risk; color/appearance specification must be clear and
    measurable Mitigation: Antioxidant excipients; light-protected containers; metal ion control (EDTA chelation); avoid redox-active
    impurities in manufacturing'
  id: ISS-EXP-COLOR_APPEARANCE_CHANGES
  source: ICH Q6B (Acceptance Criteria), USP <790>/<1790> (Visual Inspection), Ph.Eur. 2.2.1 (Appearance of Solutions)
