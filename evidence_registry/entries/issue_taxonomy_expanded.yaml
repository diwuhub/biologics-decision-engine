  content: 'Protein adsorbs to container inner surfaces (glass, polycarbonate, polypropylene) via hydrophobic interactions
    or electrostatic binding; reduces solution concentration over time Typical sources: Direct glass contact (inadequate silicone
    or other coating); Container type change (glass to plastic, vendor change); Formulation pH/ionic strength change; Elevated
    temperature accelerating adsorption kinetics; Underfilled containers with high surface-area-to-volume ratio. Detection:
    HPLC/SEC quantification at T0 and after hold (concentration loss); Radiolabeled protein tracing (125I-labeled protein
    tracking); Surface analysis (XPS, Raman) identifying adsorbed protein; Potency assay trending (functional loss correlates);
    Container leachate analysis (identifying glass/plastic leachables that promote adsorption). Severity: High. Regulatory
    significance: Critical manufacturing consistency concern; must be controlled and characterized in CMC; can invalidate
    bioequivalence if uncontrolled Mitigation: Siliconized glass vials; neutral glass preferred (Type I); surfactant addition
    to formulation if compatible; pre-coating of containers; minimize headspace'
  id: ISS-EXP-CONTAINER_CLOSURE_PROTEIN_ADSORPTION
