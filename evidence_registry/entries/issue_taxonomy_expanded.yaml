  content: 'Oxidation of methionine residues (M252, M431 in IgG1 Fc) to methionine sulfoxide; reduces Fc-FcRn binding and
    shortens serum half-life Typical sources: Oxidative stress during manufacturing (oxygen exposure); Hydrogen peroxide or
    peroxide-generating impurities; Metal ion catalysis (Fe2+, Cu2+); Extended storage at elevated temperature or light exposure;
    Freeze-thaw cycling with oxidative headspace. Detection: Peptide mapping with oxidation-specific fragmentation; Intact
    MS (mass shift 16 Da per oxidized Met); Reversed-phase HPLC (FcγRIIIa variant separation); FcRn binding assay (functional
    confirmation). Severity: High. Regulatory significance: PK alterations can require different clinical positioning vs innovator;
    comparability-critical Mitigation: Antioxidant excipients (EDTA, ascorbic acid); nitrogen headspace; light-protected containers;
    manufacturing redox control'
