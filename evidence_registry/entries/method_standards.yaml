- id: MS-AC-001
  type: method_standard
  source: ICH Q6B
  title: Affinity Chromatography for Active Content and Identity
  content: 'Affinity chromatography measures functional/active content by capturing protein via specific binding interactions
    (e.g., Protein A for mAbs, HSA-binding domains for fusion proteins). Elution is quantitative relative to standards. For
    mAbs, Protein A chromatography is standard; acceptance criteria typically require recovery of 90-110% relative to total
    protein. FcRn-based affinity methods measure neonatal Fc receptor binding, relevant for half-life and PK. Method provides
    orthogonal confirmation of identity and estimates of functional protein content vs. total mass. Regulatory expectation
    is inclusion in release testing and stability protocols. Buffer conditions, ligand capacity, and binding kinetics must
    be characterized during method development. Required in potency assessment, manufacturing process validation, and comparability
    studies.

    '
  applicable_categories:
  - purity
  - identity
  - potency
  - characterization
  confidence: 0.95
  url: https://www.ich.org
