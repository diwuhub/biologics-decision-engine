- id: MS-INTACT-MS-001
  type: method_standard
  source: ICH Q6B / FDA CMC Guidance
  title: Intact Mass Spectrometry Analysis by ESI-MS and MALDI
  content: 'Intact MS measures the total molecular weight of the protein including all post-translational modifications (glycosylation,
    oxidation, etc.). ESI-MS (electrospray ionization) is preferred for aqueous samples and provides charge state distribution;
    MALDI (matrix-assisted laser desorption/ionization) requires matrix and is suited for dried samples. Typical acceptance
    criteria require measured MW to match theoretical within ±1% (or ±100 Da for mAbs). Multiple charge states in ESI-MS can
    be deconvoluted to provide monoisotopic mass. Method is critical for detecting unexpected modifications (e.g., N-terminal
    truncations, unexpected glycosylation). Regulatory expectation includes intact MS in IND/CTA and BLA/MAA submissions.
    Mass accuracy and mass resolution depend on instrument capability (TOF, Orbitrap, Q-TOF). Required in characterization,
    process development, and stability to detect emerging variants. Post-translational modifications can shift mass by 1-3
    kDa (e.g., N-glycan ±2.5 kDa).

    '
  applicable_categories:
  - characterization
  - identity
  - purity
  confidence: 0.97
  url: https://www.fda.gov
