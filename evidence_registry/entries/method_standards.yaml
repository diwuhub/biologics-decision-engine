- id: MS-DSC-001
  type: method_standard
  source: ICH Q6B / Pharmacopeial Methods
  title: Differential Scanning Calorimetry for Thermal Stability
  content: 'DSC measures protein thermal stability by recording enthalpy changes during heating. Melting temperature (Tm)
    and transition enthalpy (ΔH) characterize protein unfolding. For mAbs, typical Tm ranges 60-75°C. Acceptance criteria
    require Tm within ±2°C of reference standard; major onset temperature should be consistent. DSC is stability-indicating;
    decreased Tm or appearance of additional transitions indicates aggregation or degradation. Method development includes
    scan rate optimization (2-5°C/min typical), buffer selection, and reference baseline subtraction. Regulatory expectation
    includes DSC in characterization, stability, and process development. DSC predicts protein shelf-life at ambient conditions
    based on Arrhenius extrapolation. Complementary to differential scanning fluorimetry (DSF) for high-throughput screening.
    Required in formulation development and excipient compatibility studies.

    '
  applicable_categories:
