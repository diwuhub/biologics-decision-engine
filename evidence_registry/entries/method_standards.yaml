- id: MS-POTENCY-PROLIF-001
  type: method_standard
  source: ICH Q6B / USP <801>
  title: 'Cell-Based Potency Assay: Proliferation and Viability Assay'
  content: 'Proliferation assays measure therapeutic activity by monitoring cell growth/viability in response to drug (e.g.,
    growth factor-induced proliferation, cytotoxic antibody-induced cell death). Common endpoints include ATP-based viability
    (CellTiter-Glo), LDH release (cytotoxicity), or cell counting. Potency is expressed as EC50 or IC50 relative to reference
    standard. Acceptance criteria require dose-response with R² >0.95, potency within 80-120% of target, and inter-assay CV
    <20%. Assay robustness requires control of cell passage number, culture conditions, incubation time, and temperature.
    Regulatory expectation includes multiple cell sources (primary and/or cell lines) and species validation. Required in
    potency specification, stability, and comparability assessment (especially for manufacturing process changes). Results
    inform patient dosing and efficacy predictions.

    '
  applicable_categories:
