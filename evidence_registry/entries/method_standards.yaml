- id: MS-CEX-001
  type: method_standard
  source: ICH Q6B / Ph. Eur. 2.2.6
  title: Cation-Exchange Chromatography for Charge Variant Analysis
  content: 'CEX (cation-exchange) separates proteins by isoelectric point differences, resolving charge variants arising from
    deamidation, oxidation, phosphorylation, and sialic acid content. Charge variants are expressed as % of total protein.
    Regulatory acceptance requires characterization of all significant charge variants (typically >1% or major peaks) and
    functional assessment of minor variants. For mAbs, acidic variants may arise from aspartate isomerization (pAsp) and basic
    variants from lysine truncation. ICH Q3B guidance requires trend analysis during stability to monitor charge variant emergence.
    Method is typically run at pH 4.0-4.5 with salt gradients, using UV 280 nm detection. Required in characterization, stability,
    manufacturing process validation, and comparability studies. Salt gradient can range from 0-250 mM NaCl depending on protein
    properties.

    '
  applicable_categories:
