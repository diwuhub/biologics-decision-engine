- id: MS-DLS-001
  type: method_standard
  source: ICH Q6B / Pharmacopeial Methods
  title: Dynamic Light Scattering for Particle Size and Polydispersity
  content: 'DLS measures particle size distribution and polydispersity index (PDI) by analyzing laser light scattered from
    brownian motion of particles. For mAb solutions, typical hydrodynamic diameter is 8-12 nm with PDI <0.2 (monodisperse).
    Acceptance criteria require size consistency with reference standard (within ±1 nm) and PDI <0.3 (indicating homogenous
    population without aggregates). Method is sensitive to aggregates; presence of HMW species shifts size distribution and
    increases PDI. DLS is complementary to SEC and orthogonal detection of aggregation. Sample preparation is critical (0.22
    μm filter, absence of dust). Regulatory expectation includes DLS in formulation development, process optimization, and
    stability assessment (especially freeze-thaw, shaking stress). Temperature control (typically 25°C) essential for reproducibility.
    Required when aggregate control is critical.

    '
  applicable_categories:
