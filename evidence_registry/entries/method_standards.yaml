- id: MS-PMAP-001
  type: method_standard
  source: ICH Q3B / USP <621>
  title: Peptide Mapping by LC-MS/MS for Identity and Purity
  content: 'Peptide mapping (tryptic or peptic digest followed by RP-HPLC or RP-UPLC coupled to MS/MS) provides high-confidence
    protein identification and detects trace impurities and modifications. Each peptide peak is identified by mass and fragmentation
    pattern. Regulatory expectation requires all major peaks (>0.5%) to be identified; coverage should ideally exceed 85-90%
    of protein sequence. Method is stability-indicating and detects oxidation, deamidation, clipping, and unexpected proteolysis.
    MS/MS detection (selected reaction monitoring, SRM) provides excellent specificity. Acceptance criteria for drug substance
    require ≥95% purity, and identified related substances must be characterized. Required in IND, manufacturing process validation,
    stability, and comparability studies. Enzymatic digestion conditions (buffer, temperature, enzyme:substrate ratio, digestion
    time) must be standardized.

    '
  applicable_categories:
  - identity
  - purity
  - characterization
  confidence: 0.98
  url: https://www.ich.org
