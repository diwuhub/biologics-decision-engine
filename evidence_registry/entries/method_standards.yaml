- id: MS-FCRNBINDING-001
  type: method_standard
  source: ICH Q6B / FDA CMC Guidance
  title: FcRn Binding Assay for Neonatal Fc Receptor Interaction
  content: 'FcRn binding assay measures the interaction between mAb Fc domain and neonatal Fc receptor (FcRn), which determines
    serum half-life and neonatal transfer. Typically measured by SPR, ELISA, or bio-layer interferometry. FcRn binding affinity
    directly correlates with mAb circulating half-life; binding defects lead to rapid clearance. Acceptance criteria require
    FcRn binding comparable to reference standard (within 2-fold). Method development includes pH-dependent binding characterization
    (FcRn binds mAb at acidic pH ~6.0, not at neutral pH ~7.4). Regulatory expectation includes FcRn binding assessment in
    characterization and comparability (especially post-Fc domain changes). Required in process development and manufacturing
    changes that could affect Fc glycosylation or sequence. Mutation confirmation is critical for engineered mAbs (e.g., M252Y/S254T
    for enhanced half-life).

    '
