- id: MS-DNA-QPCR-001
  type: method_standard
  source: ICH Q3A / USP <822>
  title: Residual DNA Detection by qPCR
  content: 'qPCR (real-time PCR) quantifies residual DNA from host cell (mammalian, bacterial, insect, fungal) by amplifying
    target DNA sequences and measuring fluorescent product accumulation. Detection limit <1 ng/mL; linear range typically
    0.1-100 ng/mL. Regulatory acceptance requires residual DNA <100 pg/dose for parenteral products based on ICH Q5A recommendations.
    Method development includes primer design (host-specific), validation of amplification efficiency, and reference standard
    preparation (purified genomic DNA). Single-stranded DNA from viral vectors or RNA therapeutics requires nuclease treatment
    before qPCR. Required in manufacturing process validation, lot release, and comparability assessment. Trending DNA levels
    indicates process control. Alternative methods include PicoGreen fluorescence assay (less specific) or digital PCR (higher
    sensitivity).

    '
