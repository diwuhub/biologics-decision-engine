- id: MS-cIEF-001
  type: method_standard
  source: Ph. Eur. 2.2.37 / USP <857>
  title: Capillary Isoelectric Focusing for Charge Heterogeneity
  content: 'cIEF and iCIEF (imaged cIEF) measure charge heterogeneity by separating proteins at their isoelectric points within
    a pH gradient. Each charge variant appears as discrete peak; pI can be determined with appropriate standards. For mAbs,
    typical specification requires characterization and quantification of all variants >0.5%. Main variants (monomer and any
    acidic/basic variants) typically represent >95% of total. Method provides complementary information to CEX but with better
    resolution of closely spaced charge variants. iCIEF includes automated peak detection and pI calculation. Regulatory expectation
    includes characterization in stability and comparability studies. Method requires careful pH gradient preparation, neutral
    capillary coating, and ampholyte selection. Currently preferred for mAb and recombinant protein characterization in development
    and manufacturing.

    '
  applicable_categories:
  - characterization
  - purity
  confidence: 0.94
