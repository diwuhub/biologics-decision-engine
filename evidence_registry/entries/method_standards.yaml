- id: MS-SPR-001
  type: method_standard
  source: ICH Q6B / FDA CMC Guidance
  title: Surface Plasmon Resonance for Binding Kinetics (KON, KOFF, KD)
  content: 'SPR (Surface Plasmon Resonance) and BLI (Biolayer Interferometry) measure real-time binding kinetics between therapeutic
    protein and target. Kinetic parameters (kon, koff, KD) are derived from association and dissociation curves. Acceptance
    criteria typically require KD consistency (within 2-fold of reference) and kinetic parameters consistent across lots.
    Method development includes immobilization strategy (amine coupling, streptavidin capture), flow rate optimization, and
    regeneration buffer selection. Regulatory expectation includes characterization during process development and comparative
    kinetics for manufacturing changes (CMC). Binding kinetics relate to efficacy and PK (target occupancy, clearance). Required
    in comparability studies (especially biosimilar development and manufacturing process changes). Temperature control (25°C
    standard) is critical for reproducibility.

    '
  applicable_categories:
