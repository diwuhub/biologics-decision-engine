- id: MS-UPLC-001
  type: method_standard
  source: USP <621> / Ph. Eur. 2.2.40
  title: Ultra-Performance Liquid Chromatography for Rapid Purity Assessment
  content: 'UPLC (2-5 μm particles, higher pressures ~15,000 psi) provides improved resolution and reduced analysis time vs.
    traditional HPLC. Used for peptide mapping, impurity detection, and related substances analysis in both drug substance
    and drug product. Acceptance criteria align with HPLC methods (>95-98% purity). UPLC is increasingly preferred in manufacturing
    QC and stability monitoring due to throughput and robustness. Methods must employ stability-indicating capability (typically
    gradient RP-UPLC with UV or MS detection). Column chemistry (BEH, CSH, Cortecs) impacts selectivity and reproducibility.
    Regulatory acceptance is equivalent to HPLC if method development follows ICH Q2(R2) guidelines. Required in high-throughput
    stability monitoring, manufacturing release, and comparability programs.

    '
  applicable_categories:
  - purity
  - identity
  confidence: 0.94
