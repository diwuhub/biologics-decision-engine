- id: MS-POTENCY-CBPA-001
  type: method_standard
  source: ICH Q6B / USP <801>
  title: 'Cell-Based Potency Assay: Reporter Gene Assay'
  content: 'Reporter gene assays measure target engagement and downstream signaling by using engineered cell lines with target
    receptors and luciferase or fluorescent protein reporters. For example, cytokine/growth factor therapeutics are measured
    by dose-dependent reporter activation. Acceptance criteria typically define a potency range (e.g., 80-120% relative to
    reference standard) with coefficient of variation <20%. Assay specificity is critical; off-target activation must be <5%
    of on-target signal. Method development requires optimization of cell line, incubation conditions (temperature, time,
    CO2), reporter detection format (luminescence, fluorescence), and reference standard qualification. Regulatory expectation
    includes cell line characterization (mycoplasma-free, identity, banking). Required in potency specification, stability,
    manufacturing process validation, and lot release. Trend analysis during storage is essential to detect loss of potency.

    '
  applicable_categories:
