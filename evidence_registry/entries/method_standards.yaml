- id: MS-HIC-001
  type: method_standard
  source: Ph. Eur. 2.2.33
  title: Hydrophobic Interaction Chromatography for Oxidation Variants
  content: 'HIC separates proteins based on surface hydrophobicity, effectively resolving oxidation-induced variants, particularly
    methionine and tryptophan oxidation. Oxidized variants elute later (increased hydrophobicity) than native protein. Regulatory
    acceptance requires oxidation variants to be <5% of total protein for most mAbs and recombinant proteins. HIC is complementary
    to CEX as oxidation can occur across charge variants. The method uses high salt mobile phases (ammonium sulfate, sodium
    phosphate) with decreasing salt gradients at 20-30°C. UV detection at 280 nm. Stability-indicating method required in
    stability protocols. Trend analysis of oxidation variants is critical in storage condition studies. Required during characterization,
    stability, and comparability assessment.

    '
  applicable_categories:
  - purity
  - stability
  - characterization
  confidence: 0.96
