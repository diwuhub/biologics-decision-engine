- id: MS-PROTA-ELISA-001
  type: method_standard
  source: ICH Q6B / Pharmacopeial Methods
  title: Protein A ELISA for Total mAb Content Confirmation
  content: 'Protein A ELISA measures total mAb concentration by capturing mAb via Fc domain binding to immobilized Protein
    A, then detecting with anti-human Fc secondary. This method is orthogonal to mass-based quantitation and specifically
    detects intact IgG. Acceptance criteria require Protein A ELISA concentration within 90-110% of mass-based reference (e.g.,
    SEC-HPLC, Bradford, BCA). Method development includes Protein A immobilization, buffer optimization (pH 7.4-8.0 typical),
    and detection antibody selection. Regulatory expectation includes Protein A ELISA in manufacturing process validation
    and lot release as orthogonal identity and purity confirmation. Results are combined with total protein (mass-based) to
    estimate fractional active content (Protein A-positive protein / total protein). Required when mAb fragmentation or modification
    could reduce Fc binding.

    '
