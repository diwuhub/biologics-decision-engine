- id: MS-AUC-001
  type: method_standard
  source: ICH Q6B / Pharmacopeial Methods
  title: Analytical Ultracentrifugation for Size and Shape Characterization
  content: 'AUC (sedimentation velocity and sedimentation equilibrium) measures protein molecular weight, oligomeric state,
    and shape (via sedimentation coefficient). Sedimentation velocity provides hydrodynamic properties; sedimentation equilibrium
    gives MW independent of shape. For mAbs, MW should match theoretical (~150 kDa for IgG monomer). Oligomeric state is confirmed
    (e.g., monomer vs. dimer). Acceptance criteria require MW within ±5% of theoretical and confirmed oligomerization (98%+
    monomer expected). AUC detects aggregates and fragmentation not apparent in SEC or DLS. Method is precision technique
    requiring careful sample dialysis, absorbance optimization (280 nm or 230 nm), and data analysis. Regulatory expectation
    includes AUC in characterization when oligomeric state is in question or during process development. Required in comparability
    studies to confirm MW equivalence post-manufacturing changes.

    '
  applicable_categories:
  - characterization
  - comparability
  confidence: 0.91
