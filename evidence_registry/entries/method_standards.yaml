- id: MS-ELISA-TARGET-001
  type: method_standard
  source: ICH Q6B / USP <825>
  title: ELISA for Target Binding and Functional Content
  content: 'ELISA (sandwich or competitive format) quantifies target-binding capacity by capturing drug with immobilized target
    (or vice versa). For mAbs, sandwich ELISA using target and detection antibody quantifies total protein binding functional
    antigen. Acceptance criteria require dose-response with R² >0.98, accuracy 90-110%, and inter-assay precision (CV) <15%.
    Method development includes optimal plate coating, blocking, incubation temperatures, and detection format (HRP-TMB, chemiluminescence).
    Reference standard qualification is critical; may differ from mass-based reference (e.g., deglycosylated vs. native).
    Regulatory expectation includes qualification of capture reagents (antibodies, antigens) and stability. Required in potency
    specification, stability, manufacturing process validation, and lot release. Trending during stability indicates loss
    of target-binding functionality.

    '
  applicable_categories:
