- id: MS-RP-HPLC-001
  type: method_standard
  source: USP <202> / Ph. Eur. 2.2.40
  title: Reversed-Phase HPLC for Purity and Identity
  content: 'RP-HPLC measures protein purity by separating proteins and related substances based on hydrophobicity. For intact
    protein analysis, typically uses ion-pairing reagents (TFA or formic acid) with acetonitrile gradients. Acceptance criteria
    for drug substance require ≥95% purity; impurities >0.05% must be identified. For peptide mapping analysis, RP-HPLC-UV
    is the workhorse method in CMC packages, typically achieving >98% purity for therapeutic peptides. UV detection at 214
    nm (for peptide bond) or 280 nm (aromatic residues) are standard. Regulatory guidance (ICH Q2(R2)) requires stability-indicating
    capability. Method must resolve all known and related substances. Temperature control (±2°C) is critical. Required in
    identity, purity, and related substances testing throughout product lifecycle.

    '
  applicable_categories:
  - purity
  - identity
  confidence: 0.98
  url: https://www.usp.org
  year: 2023
