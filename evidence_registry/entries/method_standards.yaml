- id: MS-CGE-001
  type: method_standard
  source: Ph. Eur. 2.2.33
  title: Capillary Gel Electrophoresis for Molecular Weight Determination
  content: 'CGE provides size-based separation under denaturing conditions, similar to SDS-PAGE but with improved automation
    and quantitation. Particularly useful for measuring monomer MW and detecting size variants (fragmentation, C-terminal
    processing). Acceptance criteria vary by molecule but typically require ≥95% of expected MW population. Method can resolve
    1-2 kDa differences, useful for detecting clipped forms (heavy chain C-terminal clipping, signal peptide retention). Regulatory
    guidance requires MW determination by multiple orthogonal methods (intact MS, peptide mapping MW calculation, CGE). CGE
    is faster than traditional SDS-PAGE and more quantitative. Required in characterization and when MW variants are suspected.
    Buffer conditions (glycine, SDS concentration) must be optimized for target protein.

    '
  applicable_categories:
  - characterization
  - identity
  confidence: 0.93
  url: https://www.edqm.eu
