- id: MS-HCP-ELISA-001
  type: method_standard
  source: ICH Q3A / USP <801>
  title: Host Cell Protein ELISA for Residual Impurity Control
  content: 'HCP ELISA quantifies total residual host cell protein using anti-HCP antiserum (typically rabbit antibodies raised
    against whole host cell lysate) in sandwich ELISA format. Detection limit is typically 1-10 ng/mL; method is quantitative
    to <1000 ng/mL. Regulatory acceptance requires HCP <100 ng/mg drug substance for mammalian cell-derived products; E. coli-derived
    products may tolerate higher levels depending on safety assessment. Method development includes qualification of anti-HCP
    antibody (specificity, cross-reactivity), reference standard preparation, and assay optimization. HCP limits are product-specific
    and set during process development based on toxicology (repeat-dose animal studies) and comparability to reference product.
    Required in manufacturing process validation, lot release, and comparability assessment. Trending HCP levels indicates
    process control and consistency.

    '
