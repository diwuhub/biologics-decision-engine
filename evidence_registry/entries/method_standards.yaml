- id: MS-CE-SDS-001
  type: method_standard
  source: Ph. Eur. 2.2.47
  title: Capillary Electrophoresis-SDS for Purity and Subunit Analysis
  content: 'CE-SDS (reduced and non-reduced) measures purity under denaturing conditions, separating subunits and related
    substances by charge and size. Reduced conditions break disulfide bonds; non-reduced maintains tertiary structure. For
    mAbs, typical acceptance is ≥95% purity on non-reduced CE-SDS (intact IgG), and ≥95% on reduced CE-SDS (heavy and light
    chains). Method is fast (~30 min) and requires minimal sample. Complementary to SEC and RP-HPLC, providing orthogonal
    separation mechanism. UV detection at 214 nm. Regulatory expectation includes both reduced and non-reduced analysis in
    characterization and stability. Method development per ICH Q2(R2) requires buffer system optimization (borate buffer,
    pH 8.0-8.5 typical). Required in identity, purity, and manufacturing QC protocols.

    '
  applicable_categories:
  - purity
  - identity
  - characterization
  confidence: 0.96
