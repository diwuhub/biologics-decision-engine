- id: MS-GLYCAN-MS-001
  type: method_standard
  source: ICH Q6B / Pharmacopeial Methods
  title: Glycan Profiling by MALDI-TOF MS or LC-MS
  content: 'Glycan profiling characterizes N- and O-linked glycosylation by releasing glycans (enzymatic: PNGase F for N-glycans;
    or chemical: hydrazine for O-glycans), then analyzing by MALDI-TOF or LC-MS/MS. Major glycan species are quantified as
    % of total glycans. For mAbs, typical acceptance requires ≥95% core fucosylated, galactosylated biantennary complex N-glycans;
    afucosylated and non-fucosylated variants are typically <5%. O-glycosylation (if present) must be characterized. Glycosylation
    impacts Fc effector functions (ADCC, CDC), drug product stability, and PK. ICH Q6B requires glycan characterization in
    characterization and comparability studies. Method development includes glycan derivatization (e.g., permethylation, labeling
    with 2-AB) to enhance ionization. Required in process development, manufacturing changes, and comparability programs to
    ensure consistent glycosylation.

    '
  applicable_categories:
  - characterization
  - comparability
  confidence: 0.95
  url: https://www.ich.org
