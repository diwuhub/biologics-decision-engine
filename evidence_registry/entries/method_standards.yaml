- id: MS-CD-001
  type: method_standard
  source: ICH Q6B / Pharmacopeial Methods
  title: Circular Dichroism Spectroscopy for Secondary Structure
  content: 'CD spectroscopy measures protein secondary structure content (α-helix, β-sheet, random coil) via differential
    absorption of left and right circularly polarized light. Far-UV CD (190-250 nm) measures backbone conformation; near-UV
    CD (250-350 nm) reports aromatic residue environment. For mAbs, typical secondary structure is ~50% α-helix, ~40% β-sheet.
    Acceptance criteria require CD spectra consistent with reference standard (visual superimposition or numerical deconvolution
    within ±10% secondary structure content). CD is sensitive to unfolding, aggregation, and oxidation. Method development
    includes cuvette selection (quartz 0.1-1 mm path length), scan speed, and buffer compatibility (avoid high salt/absorbance).
    Regulatory expectation includes CD in characterization and stability to detect structural changes. Required when secondary
    structure integrity is critical (e.g., enzyme therapeutics).

    '
  applicable_categories:
