- id: MS-ENDOTOXIN-001
  type: method_standard
  source: USP <85> / Ph. Eur. 2.6.14
  title: 'Endotoxin Testing: Limulus Amebocyte Lysate and rFC Methods'
  content: 'Endotoxin (lipopolysaccharide from gram-negative bacteria) is detected by LAL (Limulus Amebocyte Lysate) assay
    or rFC (recombinant Factor C) assay. LAL kinetic chromogenic method measures endotoxin as Endotoxin Units (EU/mL). Regulatory
    acceptance requires <175 EU/V where V is maximum recommended dose volume (ICH Q6B). Parenteral products must meet <5-100
    EU/dose depending on route and frequency. rFC methods are animal-free alternatives with equivalent sensitivity. Method
    development includes depyrogenation procedures, test sample preparation, and positive product control (spiking endotoxin).
    Both methods are limit tests (pass/fail at action limit). LAL is temperature-sensitive (37°C ±1°C critical). Regulatory
    expectation includes endotoxin testing in raw materials, drug substance, and drug product. Required in manufacturing process
    validation and lot release. Trending across lots indicates process control.

    '
