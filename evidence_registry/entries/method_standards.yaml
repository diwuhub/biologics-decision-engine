- id: MS-HCP-LCMS-001
  type: method_standard
  source: ICH Q3A / Pharmacopeial Methods
  title: Host Cell Protein Identification by LC-MS/MS
  content: 'HCP identification by quantitative proteomics (LC-MS/MS) detects and identifies residual host cell proteins in
    drug substance and drug product. Unbiased mass spectrometry approach identifies all proteins present above detection limit
    (~1 ng/mL for sensitive methods). Regulatory acceptance requires control of HCP at <100 ng/mg (mAb or recombinant protein)
    with characterization of any single HCP >1 ng/mg. Method uses tryptic digestion, RP-UPLC-MS/MS, and spectral library matching
    for protein identification. Supports ELISA-based HCP methods by identifying specific species driving regulatory limits.
    Trending HCP levels during manufacturing process validation is critical. Required in process characterization, manufacturing
    process validation, and lot release testing when HCP concerns exist.

    '
  applicable_categories:
