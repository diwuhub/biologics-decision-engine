- id: MS-SEC-001
  type: method_standard
  source: USP <621> / Ph. Eur. 2.2.30
  title: Size-Exclusion Chromatography for Aggregate Analysis
  content: 'SEC separates molecules by hydrodynamic radius, measuring high molecular weight (HMW) aggregates, low molecular
    weight (LMW) fragments, and monomer distribution. For mAbs and therapeutic proteins, aggregates are typically quantified
    as % monomer. Regulatory acceptance generally requires ≥95% monomer for active pharmaceutical ingredient (API) and drug
    product. ICH Q6B guidelines specify that aggregate testing must be included in release and stability protocols. SEC is
    a stability-indicating method that tracks protein degradation pathways. Required during development, IND/CTA, BLA/MAA
    submissions, and ongoing lot release. Calibration with appropriate standards (globular proteins, dextrans) is critical
    for accurate size determination. Method typically uses UV detection at 280 nm, with flow rates of 0.5-1.0 mL/min for analytical
    columns.

    '
  applicable_categories:
  - purity
  - stability
  - comparability
  confidence: 0.98
