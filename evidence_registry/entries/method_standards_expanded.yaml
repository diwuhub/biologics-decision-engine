  content: 'Determine absolute molecular weight and detect aggregation state without standard calibration Principle: Light
    scattering at multiple angles determines MW via Rayleigh scattering; coupled with SEC provides size/MW correlation Applications:
    Aggregate quantification (dimer, multimer detection); Monomeric MW confirmation across buffer conditions; Complex formation
    assessment; Polydispersity index determination. Acceptance criteria: Monomeric MW within 2% of theoretical; aggregation
    threshold <2% by mass. Gold standard for MW and aggregation; requires minimal assumptions; expensive instrument'
  id: MS-EXP-MALS_SEC
  source: 'ICH Q14 Annex 1 (Advanced Analytics), FDA Guidance: Analytical Procedures and Methods Validation (2015)'
