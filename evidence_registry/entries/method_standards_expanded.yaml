  confidence: 0.93
  content: 'Determine three-dimensional atomic-level protein structure Principle: Protein crystals diffract X-rays; diffraction
    pattern solved to yield atomic coordinates Applications: Reference structure establishment; Active site confirmation;
    Posttranslational modification location; Comparability to innovator (for approved products). Acceptance criteria: Structure
    resolution <2.5 Å (typical for immunoglobulins); R-factor <0.20; no unexplained density. Requires well-diffracting crystals;
    not always achievable; gold standard when available; one-time characterization typically'
  id: MS-EXP-XRAY_CRYSTALLOGRAPHY
  source: 'ICH Q5C (Quality of Biotechnology Products), FDA Guidance: Analytical Procedures and Methods Validation'
