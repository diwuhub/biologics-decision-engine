  confidence: 0.93
  content: 'Detect and quantify residual organic solvents from manufacturing/processing Principle: GC-FID or GC-MS with headspace
    sampling; ICH solvent classification (Class 1, 2, 3) Applications: Purification solvent carryover (e.g., acetonitrile
    in precipitation steps); Manufacturing process solvent control; Regulatory compliance (ICH limits); Batch release specification.
    Acceptance criteria: Must meet ICH Q3C limits (e.g., acetonitrile <50 ppm, ethanol <5000 ppm). Many biologics manufacturing
    minimizes organic solvents; test if precipitation/extraction used'
  id: MS-EXP-RESIDUAL_SOLVENT
