  content: 'Quantify water content in lyophilized or powder products Principle: Coulometric or volumetric KF titration; iodine
    oxidation of water in solution Applications: Lyophilized product residual moisture specification; Cake quality acceptance;
    Moisture ingress during storage (via trending); Excipient water content verification. Acceptance criteria: Typical range
    1-3% for lyophilized biologics; excipient-dependent specifications. Critical for freeze-dried product; water content impacts
    stability and cake properties'
  id: MS-EXP-KARL_FISCHER
