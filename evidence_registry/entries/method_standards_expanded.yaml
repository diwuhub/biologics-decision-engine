  content: 'Detect and classify visible particles, cloudiness, color changes, or other defects Principle: Manual visual inspection
    under standardized lighting (candle light equivalence) or automated vision systems Applications: Batch release acceptance;
    Container-closure interaction assessment; Stability monitoring (appearance changes); Manufacturing control. Acceptance
    criteria: No particles >50 µm; no color change; clear or colorless per specification. Subjective if manual; automated
    systems more reproducible; complements objective particulate methods'
