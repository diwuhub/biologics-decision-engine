  confidence: 0.93
  content: 'Map solvent accessibility and detect structural changes at peptide resolution Principle: Exchange of backbone
    hydrogens with deuterium; protected (slow exchange) regions indicate structured domains Applications: Higher-order structure
    comparison (innovator vs biosimilar); Conformational change detection upon stress; Binding site mapping; Dynamics assessment.
    Acceptance criteria: Deuteration pattern overlay >95% between batches; no new protected/unprotected regions. Detects local
    structural perturbations invisible to other biophysical methods; requires expertise in mass spec interpretation'
  id: MS-EXP-HDX_MS
  source: 'FDA Guidance: Comparability for Therapeutic Protein Products (2019), ICH Q14 Comparability'
