  confidence: 0.93
  content: 'Establish purity, identify and quantify impurities, characterize stability, assign potency for analytical reference
    standards Principle: Multi-technique characterization: HPLC/CE purity, impurity structure elucidation, potency assignment
    by orthogonal assays Applications: Primary reference standard establishment; Secondary standard qualification; Working
    standard lot change; Bridging studies between reference lots. Acceptance criteria: ≥98% purity; impurities characterized
    and <1% individually; assigned potency with uncertainty budget <5%. Foundation for all quantitative assays; comprehensive
    characterization essential; stability/storage conditions defined'
