  confidence: 0.93
  content: 'Measure thermal stability with minimal sample volume using intrinsic fluorescence Principle: Tryptophan fluorescence
    shift during thermal denaturation; low sample consumption (2-5 µL) Applications: Buffer/excipient screening; Stability
    trending; Formulation development; Aggregate-free sample characterization. Acceptance criteria: Tm within ±2°C of reference;
    single cooperative transition indicating homogeneity. Advantages: high throughput, minimal sample; drawback: indirect
    measure (fluorescence change); complements DSC'
  id: MS-EXP-NANO_DSF
