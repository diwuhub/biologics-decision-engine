  confidence: 0.93
  content: 'Identify primary degradation pathways under stress; design analytical methods to detect them Principle: Expose
    drug substance/product to stress (heat, light, pH, oxidation); identify new peaks/variants; characterize chemically Applications:
    Stability-indicating method design; Impurity limits justification; Manufacturing process risk assessment; Storage condition
    selection. Acceptance criteria: All major degradation pathways identified at >5% level; characterized by mass spec/NMR/amino
    acid analysis. Foundational study; conducted early in development; informs analytical strategy and specifications'
  id: MS-EXP-FORCED_DEGRADATION
