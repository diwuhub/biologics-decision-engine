  content: 'Characterize and count subvisible particles (1-100 µm) with morphology and composition Principle: MFI: flow-based
    microscopy with image analysis; FlowCam: holographic imaging and categorization Applications: Aggregation monitoring over
    shelf-life; Container-closure interaction assessment; Single-use system leachable particle evaluation; Transport/storage
    condition impact. Acceptance criteria: Particle count/size distribution stable within specification; no increase >25%
    over timepoint. Regulatory expectation post-2019 FDA guidance; morphology identifies protein vs container origin'
  id: MS-EXP-SUBVISIBLE_PARTICLE_MFI
