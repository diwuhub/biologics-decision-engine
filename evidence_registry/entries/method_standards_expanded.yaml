  confidence: 0.93
  content: 'Visualize protein structure and complexes in near-native state at atomic/sub-atomic resolution Principle: Proteins
    in vitreous ice imaged by transmission EM; computational reconstruction yields 3D structure Applications: Large complex
    characterization (Fc-receptor complexes); Antibody Fab orientation assessment; Conformational heterogeneity mapping; Conformational
    equilibrium determination. Acceptance criteria: Map resolution <4 Å for functional insights; validation against X-ray/NMR
    data. Advantage: no crystallization needed; handles flexible regions; emerging as comparability tool for complex biologics'
  id: MS-EXP-CRYO_EM
  source: ICH Q5C (Quality of Biotechnology Products), FDA Guidance on Structural Biology and Antibody Characterization
