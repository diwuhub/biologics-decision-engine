  content: 'Measure effective osmotic pressure; critical for parenteral safety and stability Principle: Freezing-point depression
    or vapor pressure osmometry measures total dissolved particles Applications: Formulation development (isotonicity verification);
    Excipient concentration confirmation; Stability monitoring (solute precipitation, water loss); Manufacturing batch release.
    Acceptance criteria: Typically 240-310 mOsm/kg for IV products (isotonic range). Non-specific measure; detects osmotic
    changes but not identity of osmolytes'
  id: MS-EXP-OSMOLALITY
