  content: 'Detect and quantify microscopic cloudiness from micro-aggregates and microparticulates Principle: Light transmission/scattering
    measurement; turbidity units (NTU) or nephelometric units Applications: Product appearance acceptance criterion; Aggregate
    early detection; Visual inspection correlation; Excipient compatibility assessment. Acceptance criteria: NTU <1 typical
    for transparent solutions; specification set at development phase. Simple, rapid, cost-effective screening; complements
    microparticulate analysis'
