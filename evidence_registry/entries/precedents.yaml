- id: PREC-005
  type: precedent
  source: ICH Q5E + FDA Guidance (2003) combined interpretation
  title: No precedent does not mean DEFER
  content: 'Absence of directly matching precedent should not automatically trigger DEFER. Instead, it should lower confidence
    in the assessment and trigger SUPPLEMENT (collect additional data) or INVESTIGATE (deeper analysis). This interpretation
    aligns with SP v5 softened abstain logic.

    '
  applicable_categories:
