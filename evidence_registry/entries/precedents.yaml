entries:
- id: PREC-001
  type: precedent
  source: FDA BLA 761024 (Amjevita/adalimumab-atto)
  title: Biosimilar approval with SEC monomer purity difference
  content: 'Amjevita demonstrated comparability to Humira despite ~0.5% lower SEC monomer purity. FDA accepted this based
    on: (1) functional potency equivalence in TNF-alpha neutralization assay, (2) comparable HMW species characterization,
    (3) consistent lot-to-lot variability within both products.

    '
  applicable_categories:
  - purity
  confidence: 0.85
  year: 2016
  tags:
  - biosimilar
  - adalimumab
  - SEC
  - purity
  - HMW
  authority_quality_tier: strong_secondary
  verified: true
  verification_method: BLA number confirmed
  content_type: paraphrase
  confidence_basis: Based on FDA BLA 761024 public review documents
- id: PREC-002
  type: precedent
  source: EMA EPAR Benepali (etanercept biosimilar)
  title: Glycosylation difference accepted with functional bridging
  content: 'Benepali showed differences in N-glycan profile compared to Enbrel reference. EMA accepted comparability based
    on demonstration that glycosylation differences did not affect TNF-alpha binding or Fc-gamma receptor binding. Functional
    bridging data was key to the positive assessment.

    '
  applicable_categories:
