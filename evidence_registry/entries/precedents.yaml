- id: PREC-003
  type: precedent
  source: FDA CMC Post-Approval Change (various)
  title: Typical acceptance range for mAb process changes
  content: 'For standard mAb manufacturing process changes (e.g., cell culture media, purification resin, fill/finish), FDA
    has historically accepted differences within: SEC monomer ≤1%, charge variants ≤5%, potency ±20% of reference. These ranges
    are not formal specifications but reflect observed patterns in approved supplements.

    '
  applicable_categories:
  - purity
  - potency
  - physicochemical
  confidence: 0.7
