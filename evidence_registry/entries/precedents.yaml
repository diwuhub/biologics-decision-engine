- id: PREC-004
  type: precedent
  source: FDA Warning Letter 320-20-23
  title: Comparability failure due to insufficient trending data
  content: 'FDA issued a warning letter citing insufficient comparability data for a manufacturing site transfer. Specifically:
    only 2 lots of post-change material were tested (minimum 3 expected), and no accelerated stability comparison was provided.

    '
  applicable_categories:
  - stability
