- id: BLA-006
  type: precedent
  source: FDA BLA 761059 (Hadlima/adalimumab-bwwd)
  title: Adalimumab Biosimilar - TNF-alpha Inhibitor
  content: 'Approved December 2018. Adalimumab biosimilar with dual glycosylation sites in Fc region. CMC assessment: N-glycan
    profiling showed fucosylated complex biantennary (primary form). HILIC analysis showed >95% structural homology. Aggregation
    assessment by size exclusion and analytical ultracentrifugation showed <1% high molecular weight species. Charge heterogeneity
    (CEX-HPLC) characterized; main peak 85-90%, acceptable. Potency via TNF-alpha neutralization equivalent to Humira. Functional
    assays (TNF-R binding, Fc gamma receptor engagement) confirmed equivalent activity. Forced degradation studies established
    stability indicating method. Drug substance residual moisture <3%, consistent with reference. Container closure (silicone-coated
    glass syringe) integrity confirmed.

    '
