  source: FDA Complete Response Letter - Proposed Filgrastim Biosimilar (2011)
  title: CRL - Analytical Similarity Deficiency
  content: 'Received 2011. A filgrastim biosimilar application received a Complete Response Letter (CRL) citing insufficient
    analytical similarity data package. Deficiencies: N-glycosylation characterization incomplete (only 5 of 12 glycoforms
    identified), charge variant analysis used single-method approach without orthogonal confirmation, potency assay showed
    statistically significant difference (p<0.05) vs. reference filgrastim in dose-response curve (IC50 15% lower than reference).
