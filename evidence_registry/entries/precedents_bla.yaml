- id: BLA-005
  type: precedent
  source: FDA BLA 761074 (Ixifi/infliximab-qbtx)
  title: Infliximab Biosimilar - Mammalian Cell Production
  content: 'Approved December 2017. Infliximab-qbtx manufactured in mammalian (CHO) cell line vs. murine myeloma for originator.
    CMC comparison showed N-glycosylation profile (HILIC-HPLC) comparable (fucose 94.1% vs. 96.2%, galactose 60.1% vs. 61.5%),
    within pre-specified acceptance criteria (±15% per glycoform). Peptide mapping via LC-MS/MS confirmed identical primary
    structure and disulfide linkages. Charge isoform distribution (5 main peaks) within 10% variance. VEGF and TNF-alpha binding
    potency equivalent. Oxidation (methionine and tryptophan) monitored; levels <0.5%. Process-related impurities (HCP, DNA,
    endotoxin) well-controlled. Stability profile through 24 months acceptable.

    '
