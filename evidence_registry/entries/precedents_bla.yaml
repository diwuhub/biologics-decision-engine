  source: FDA Supplement - Remicade (infliximab) Formulation Excipient Supplier Change
  title: Excipient Supplier Change - Sodium Chloride Sourcing
  content: 'Approved 2012. Janssen changed sodium chloride supplier for Remicade formulation buffer to a different vendor.
    CMC assessment: pharmaceutical excipients from different suppliers can have different trace impurity profiles. Supplier
    change required: specification compliance for new supplier (sodium chloride grade), elemental impurities assessment (ICP-MS
    per USP <232>), bacterial endotoxin testing (LAL assay), and stability data using excipient from new vendor. Results showed
