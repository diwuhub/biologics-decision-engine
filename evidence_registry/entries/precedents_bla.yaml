    Stability study with new excipient formulation (12 months at 2-8°C, 25°C/60% RH) demonstrated no adverse effects on infliximab
    potency, aggregation, or charge variants. pH stability (maintained 6.8 ± 0.3) confirmed. No interaction between salt and
