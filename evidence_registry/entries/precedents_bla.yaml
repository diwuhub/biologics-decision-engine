- id: BLA-032
  type: precedent
  source: FDA CRL - Infliximab Biosimilar, Process Impurity Concern
  title: CRL - Leached Protein A Levels Exceed Acceptance Criteria
  content: 'Received 2013. An infliximab biosimilar application received a CRL due to process-related impurities. Purification
    method used protein A affinity chromatography (standard for mAbs); however, residual leached protein A levels in drug
    substance were 3.5 μg/dose (acceptance criterion typically <0.5 μg/dose based on precedents). Applicant''s bioburden and
    endotoxin control procedures were adequate, but protein A quantitation method (sandwich ELISA) had high background noise,
    raising question of assay validity. Additionally, bioburden testing showed contamination in one of three validation batches
    (coagulase-negative Staphylococcus), indicating process control gaps. FDA requested: optimize Protein A resin washing
    parameters to reduce leaching, validate protein A assay per ICH Q2(R2) for specificity and sensitivity, conduct bioburden
    control risk assessment, retest three manufacturing batches with enhanced environmental monitoring, establish tighter
    acceptance criteria (1 μg/dose). Key learning: process purification must be optimized for impurity removal; CMC data must
    be statistically robust.

    '
