- id: BLA-010
  type: precedent
  source: FDA BLA 761106 (Zirabev/bevacizumab-bvzr)
  title: Bevacizumab Biosimilar - Second VEGF Inhibitor
  content: 'Approved December 2019. Second bevacizumab biosimilar. CMC strategy identical to Mvasi with focus on N-glycosylation
    critical to VEGF potency. Analytical data showed N-glycan profile (HILIC) >97% overlap; main glycoforms (fucosylated complex
    biantennary, fucosylated complex triantennary) within ±8%. Potency via recombinant VEGF165 binding demonstrated equivalent
    Kd (~0.5 nM). ADCC assessment critical for bevacizumab (although moderate); equivalent to reference. Charge isoforms (4
    main peaks) within acceptance criteria. Peptide map confirmed primary sequence and all 4 disulfide bonds. Aggregation
    <0.5% at 6 months. HCP residuals <5 ppm. Microbial limit testing compliant.

    '
