- id: BLA-004
  type: precedent
  source: FDA BLA 761028 (Mvasi/bevacizumab-awwb)
  title: Oncology mAb Biosimilar - VEGF Inhibitor
  content: 'Approved September 2017. First biosimilar of a monoclonal antibody for oncology indication (bevacizumab, VEGF-binding
    mAb). CMC focus: bevacizumab has complex N-glycosylation (predominantly complex biantennary structures). Analytical comparison
    showed glycan profile overlap >98% by HILIC. Charge variant distribution (3 main isoforms) within 5% variance. Potency
    via VEGF binding ELISA showed equivalent EC50 (Kd ~0.5 nM). Antibody-dependent cellular cytotoxicity (ADCC) equivalent
    to reference via purified NK cell assay. Complement-dependent cytotoxicity (CDC) minimal for bevacizumab (expected), confirmed
    equivalent between products. HCP residuals <10 ppm, bioburden <1 CFU/100 mL (aseptic fill).

    '
