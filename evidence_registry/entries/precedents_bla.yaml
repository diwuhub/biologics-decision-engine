- id: BLA-035
  type: precedent
  source: FDA CRL - Adalimumab Biosimilar, Immunogenicity Flag
  title: CRL - Clinical Immunogenicity Data Required Due to CMC-Related Differences
  content: 'Received 2019. An adalimumab biosimilar received a CRL due to immunogenicity concern linked to CMC differences.
    Analytical characterization showed N-glycosylation profile comparable to Humira reference. However, charge variant distribution
    (IEF) showed 2 major acidic variants (pI 4.2-4.4) representing 22% of drug substance vs. 8% in Humira (statistically significant
    at p<0.05). Acidic variants are typically sialic acid-rich forms and can influence immunogenicity. Applicant provided
    clinical PK/PD study (n=70) with single-dose pharmacokinetics showing equivalent AUC; however, FDA noted short follow-up
    (8 weeks) was insufficient for immunogenicity assessment. FDA required expanded clinical immunogenicity study (n=300+,
    52-week follow-up) with antibody-to-drug (ADA) titer quantitation and neutralizing antibody assessment to confirm no increased
    immunogenicity risk due to higher sialylation charge variants. Applicant resubmitted with completed immunogenicity study
    showing equivalent ADA incidence (5% vs. 4% for reference). Key learning: charge variant differences may signal immunogenicity
    risk; clinical PK/PD alone insufficient without immunogenicity bridging.

    '
