- id: BLA-014
  type: precedent
  source: FDA BLA 761201 (Yusimry/adalimumab-aqvh)
  title: Adalimumab Biosimilar - Second TNF-alpha Approval
  content: 'Approved December 2021. Second adalimumab biosimilar approved. CMC assessment mirrored Hadlima but with independent
    analytical characterization. N-glycosylation (IgG1 Fc) profiled by UPLC; galactose-galactose, monosialylated, disialylated,
    and asialo variants quantified. Fucose >98% (expected for CHO-derived monoclonal). Potency via TNF-alpha neutralization
    (in vitro assay) equivalent. Functional binding to TNF receptors (TNFR1, TNFR2) confirmed via cell-based assay. Disulfide
    bond mapping (4 inter-chain) verified. Oxidative degradation potential assessed; methionine oxidation <0.5%. Aggregation
    kinetics during accelerated stress (25°C/60% RH, 12 months) acceptable. Container closure system (silicone-coated vial,
    rubber stopper) extractables profile reviewed.

    '
