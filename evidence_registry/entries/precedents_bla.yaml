- id: BLA-007
  type: precedent
  source: FDA BLA 125557 (Retacrit/epoetin alfa-epbx)
  title: Epoetin Alfa Biosimilar - Erythropoiesis Stimulating Agent
  content: 'Approved May 2018. Epoetin biosimilar produced in CHO cells vs. originator (Procrit). CMC focus: erythropoietin
    has N-glycosylation (typically 2-3 glycans per molecule) and O-glycosylation (up to 7 sites). Glycosylation assessment
    by RP-HPLC showed comparable isoform distribution (hydrophobic variants correlated to sialylation). Charge isoform profiling
    (IEF) demonstrated comparable pI pattern. Potency via erythroid progenitor cell proliferation assay (BaF3-EpoR) showed
    equivalent ED50. Pharmacokinetic similarity confirmed in clinical studies (half-life 8-12 hours equivalent). HCP levels
    <100 ppm, DNA <10 ng/dose. Sialic acid content quantified (major contributor to potency and PK).

    '
