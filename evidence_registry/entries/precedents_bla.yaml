- id: BLA-020
  type: precedent
  source: FDA BLA 761244 (Leqvio/inclisiran)
  title: Small Interfering RNA (siRNA) - Novel Modality
  content: 'Approved December 2021. Inclisiran (Leqvio) is a chemically synthesized double-stranded siRNA (not a protein biologic,
    but representative of non-mAb biologic manufacturing). CMC assessment includes sequence verification, purity (RP-HPLC),
    and formulation stability. The product is conjugated with three N-acetylgalactosamine (GalNAc) ligands via linkers for
    hepatocyte uptake (ASGPR-mediated internalization). Conjugation stoichiometry confirmed (3:1 GalNAc:siRNA). Residual reagents
    and impurities <ppm levels. Potency via LDLR knockdown in hepatocyte cell systems equivalent to reference standards. Stability
    in aqueous formulation (phosphate buffer, sodium chloride) through 36 months at 2-8°C. Container closure (vial, syringe)
    extractables/leachables assessed.

    '
