- id: BLA-030
  type: precedent
  source: FDA Warning Letter - Manufacturer Comparability Failure
  title: Warning Letter - Comparability Study Not Conducted
  content: 'Issued 2013. A biologics manufacturer received a warning letter for failure to perform adequate comparability
    studies following a cell culture media change for a marketed mAb product (non-biosimilar monoclonal antibody). Deficiency:
    facility changed to a new cell culture media formulation without analytical comparability data (N-glycosylation profile,
    charge variants, potency) or process validation batches. The change was implemented directly into commercial batches without
    CMC assessment. Inspection identified: no side-by-side analytical testing (old vs. new media), no stability studies comparing
    products from both media, no documented risk assessment justifying omission of comparability study. Product distributed
    to patients with potentially different quality attributes unknown. FDA requested: retrospective comparability study on
    representative batches from both periods, characterization of all distributed product for critical quality attributes,
    patient notification if significant differences detected, process validation for current manufacturing. Key learning:
    any process change requires prior analytical and stability comparability assessment before implementation.

    '
