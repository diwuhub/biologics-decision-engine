  type: precedent
  source: FDA BLA 761268 (Trogarzo/ibalizumab-uikg)
  title: HIV Entry Inhibitor mAb - Recombinant Humanized
  content: 'Approved March 2018. Ibalizumab is a humanized mAb targeting CD4 receptor on HIV-infected cells (different mechanism
    from biosimilars listed above, but represents mAb manufacturing comparability precedent). CMC assessment: N-glycosylation
    profiling at Fc region showed expected complex biantennary structures. Charge heterogeneity (IEF) characterized; main
    isoforms >90%. HIV neutralizing potency assessed via pseudovirus assays (multiple clades); EC50 values within historical
    range. Aggregation assessment critical; prefilled pen delivery format required <0.1% >10 μm particles. Methionine oxidation
    <1%. Stability through 24 months at 2-8°C confirmed. Container closure (glass vial, rubber stopper) extractables quantified
    for intramuscular injection route.

    '
