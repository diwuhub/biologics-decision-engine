- id: BLA-011
  type: precedent
  source: FDA BLA 761140 (Riabni/rituximab-arrx)
  title: Rituximab Biosimilar - CD20 B-cell Depletion
  content: 'Approved December 2020. Rituximab (Rituxan) biosimilar for B-cell malignancies and autoimmune diseases. CMC focus:
    rituximab is a chimeric mAb with human Fc and murine Fab regions; critical quality attributes include N-glycosylation
    (Fc), charge variants, and ADCC/CDC potency. Glycosylation assessment (HILIC) showed fucose 94.2% vs. 95.1%, galactose
    60.5% vs. 61.2%, within ±5% criteria. Afucosylated forms 4.8% vs. 3.9% (acceptable; enhanced ADCC not expected to be clinically
    significant). Potency via CD20 binding ELISA and B-cell depletion assay (primary mechanism) equivalent. Chimeric nature
    confirmed by peptide mapping. Aggregates and particulates well-controlled. Process-related impurities <ppm levels.

    '
