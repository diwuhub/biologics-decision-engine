- id: BLA-009
  type: precedent
  source: FDA BLA 761103 (Ontruzant/trastuzumab-dttb)
  title: Trastuzumab Biosimilar - HER2 mAb for Breast Cancer
  content: 'Approved December 2019. Trastuzumab (Herceptin) biosimilar for HER2+ breast cancer. CMC assessment: trastuzumab
    N-glycosylation (primary Fc-glycan) profiled; galactose and fucose levels within ±5% of reference (HILIC-HPLC). Afucosylated
    glycans important for ADCC; proportion comparable. Potency assessed via HER2 binding ELISA and ADCC (human peripheral
    blood mononuclear cell assay). Biological activity equivalent in dose-response. Charge variant distribution (CEX) showed
    3 major variants with <5% deviation. Light chain to heavy chain ratio confirmed stoichiometry. Stability study data supported
    18-month shelf-life at 2-8°C. Freeze-thaw cycles (3x) assessed for patient convenience (pre-filled syringe formulation).

    '
