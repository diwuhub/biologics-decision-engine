- id: BLA-015
  type: precedent
  source: FDA BLA 761202 (Fulphila/pegfilgrastim-jmdb)
  title: Pegfilgrastim Biosimilar - PEGylated G-CSF
  content: 'Approved December 2018. Pegfilgrastim (Neulasta) biosimilar; G-CSF conjugated with 20 kDa polyethylene glycol
    (PEG) chain. CMC assessment unique for pegylated product: PEG chain attachment site (N-terminal serine) and number of
    PEG molecules per filgrastim confirmed. Characterization: intact mass by LC-MS showed expected MW distribution (mixture
    of mono- and di-PEGylated forms). Monomer purity (SEC-HPLC) >95%. Potency via granulocyte progenitor cell proliferation
    assay equivalent. PEG characterization (molecular weight distribution, residual monomer, oligomers) within specifications.
    Aggregation stability (<1% at 6 months, 25°C/60% RH). Endotoxin control critical (product is immunostimulatory); <0.5
    EU/mg. Prefilled syringe format assessed for extractables/leachables from rubber plunger and syringe barrel (polycarbonate/silicone).

    '
