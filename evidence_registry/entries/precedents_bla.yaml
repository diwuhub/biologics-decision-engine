- id: BLA-034
  type: precedent
  source: FDA Warning Letter - Sterility Assay Failure, Biologics Manufacturer
  title: Warning Letter - Sterility Test Contamination and Repeat Testing
  content: 'Issued 2014. A biologics manufacturer (mAb producer) received a warning letter for contamination in sterility
    testing (USP <71>). Deficiency: product sterility assay showed growth of fungal organism (Candida parapsilosis) in 2 of
    10 test plates, indicating either contamination in drug product or inadequate aseptic processing control. Upon investigation,
    facility had no documented environmental monitoring program, and aseptic filling area particle counts exceeded ISO Class
    5 limits (>3,500 particles >0.5 μm/m³). No media fill validation performed in 2 years. Distributed product potentially
    non-sterile. FDA requested: immediate suspension of manufacturing, environmental remediation (HEPA filter replacement,
    cleanroom revalidation), media fill study with at least 3,000 units per fill line, process validation with 3 consecutive
    successful runs, enhanced environmental monitoring (daily particle counts, weekly microbial sampling), retrospective assessment
    of all distributed product for sterility (retesting select lots). Key learning: aseptic processing control and environmental
    monitoring are foundational; failure is critical GMP violation.

    '
