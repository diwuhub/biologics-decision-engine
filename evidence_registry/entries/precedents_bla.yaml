- id: BLA-002
  type: precedent
  source: FDA BLA 125544 (Inflectra/infliximab-dyyb)
  title: mAb Biosimilar - Infliximab TNF-alpha Inhibitor
  content: 'Approved April 2016. Second mAb biosimilar. CMC assessment focused on glycosylation heterogeneity as primary comparability
    marker. Analytical data showed infliximab-dyyb N-glycan profile (fucose, galactose, sialylation) within ±10% of Remicade
    reference, assessed by hydrophilic interaction chromatography (HILIC). Charge variant profile by ion-exchange demonstrated
    acceptable overlap (97.2% main isoform). Potency measured via TNF-alpha neutralization assay showed comparable IC50. HCP
    residual levels <100 ppm confirmed adequate purification. Functional binding assays (Fc receptor engagement) equivalent
    to reference product.

    '
