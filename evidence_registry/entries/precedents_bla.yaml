- id: BLA-031
  type: precedent
  source: FDA CRL - Bevacizumab Biosimilar, CMC Analytical Differences
  title: CRL - Unresolved Analytical Differences in Glycosylation
  content: 'Received 2016 (biosimilar application). A bevacizumab biosimilar received a CRL citing unresolved differences
    in N-glycosylation profile. Applicant data showed: proposed biosimilar had 35% afucosylated glycans vs. 15% in Avastin
    reference standard (significant difference). Applicant justified this as resulting from their CHO cell line (known to
    reduce fucosylation in certain hosts), arguing afucosylated forms enhance ADCC (beneficial). FDA disagreed: afucosylation
    was not characterized in clinical PK/PD study, and enhanced ADCC could alter efficacy/safety profile compared to reference.
    Additionally, charge variant distribution showed 4 major forms vs. 3 in reference (IEF analysis), with proportions outside
    ±10% criteria. Applicant required to: conduct cell engineering to match glycosylation profile closer to reference, repeat
    analytical characterization, or provide additional clinical immunogenicity and PK/PD data. Key learning: post-translational
    modification differences must be justified; cannot assume functional equivalence without data.

    '
