- id: BLA-008
  type: precedent
  source: FDA BLA 761086 (Avsola/infliximab-axxq)
  title: Infliximab Biosimilar - Third TNF-alpha Inhibitor Approval
  content: 'Approved July 2019. Third infliximab biosimilar approved in US, also CHO-derived. CMC assessment: comprehensive
    glycosylation characterization showed N-glycan species profile (16 glycoforms identified by LC-MS) comparable to originator
    (fucose, galactose, sialylation levels within ±10%). Antibody-dependent cell-mediated phagocytosis (ADCP) assay demonstrated
    equivalent Fc effector function. Particle characterization (HIAC) showed <0.1% >1 μm particles. Disulfide bond mapping
    via peptide mapping confirmed correct inter-heavy chain and light-heavy chain linkages. Oxidation and deamidation levels
    monitored; both acceptable. Endotoxin <0.5 EU/mg. Process-related impurities well-controlled. Shelf-life at 2-8°C: 36
    months.

    '
