- id: BLA-012
  type: precedent
  source: FDA BLA 761073 (Kanjinti/trastuzumab-anns)
  title: Trastuzumab Biosimilar - First HER2 Biosimilar Approval
  content: 'Approved June 2019. First trastuzumab biosimilar approved in US (prior to Ontruzant). CMC assessment: comprehensive
    characterization of N-glycosylation (single primary site in Fc region). HILIC profiling showed 13 glycoforms; major biantennary
    fucosylated form >90%. Sialic acid content quantified (major contributor to half-life). Potency via HER2 ectodomain binding
    assay and cell-based ADCC assay (HER2+ breast cancer line) equivalent to Herceptin reference standard. Charge variant
    profile (IEF) showed 3-4 main forms within ±10%. Disulfide bond integrity (2 inter-chain, 4 intra-chain per heavy chain)
    confirmed by LC-MS peptide mapping. Stability profile through 24 months acceptable at 2-8°C.

    '
