- id: BLA-016
  type: precedent
  source: FDA BLA 761150 (Velsiprity/dupilumab-ffyc)
  title: Dupilumab Biosimilar - IL-4 Receptor Antagonist
  content: 'Approved June 2023. Dupilumab (Dupixent) biosimilar for atopic dermatitis and asthma. CMC assessment: dupilumab
    is a fully human IgG4 mAb with modified hinge region (two amino acid substitutions for stability). N-glycosylation profiling
    showed comparable fucose, galactose, and sialylation to reference Dupixent. Charge heterogeneity (IEF) characterized;
    4 major isoforms within ±10%. IgG4 subclass-specific attributes: half- antibodies and potential for Fab-arm exchange assessed;
    reference standard (Dupixent) showed ~20% half-antibody exchange in certain conditions; biosimilar showed comparable profile.
    IL-4 receptor binding potency equivalent by ELISA. Fc gamma receptor (FcγR) binding minimal (IgG4 property); confirmed
    equivalent low engagement. Aggregation stability through 18 months at 2-8°C acceptable.

    '
