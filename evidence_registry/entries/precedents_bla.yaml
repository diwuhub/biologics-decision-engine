- id: BLA-003
  type: precedent
  source: FDA BLA 761042 (Erelzi/etanercept-szzs)
  title: Fc-Fusion Protein Biosimilar - TNF Receptor
  content: 'Approved August 2016. First Fc-fusion biosimilar. Etanercept is a dimeric construct (TNF receptor p75-Fc fusion).
    CMC assessment emphasized disulfide bond integrity (inter-chain and intra-chain) as critical quality attribute. Analytical
    characterization included size exclusion (monomer/dimer ratio 98.5%), isoelectric focusing (pI distribution), and mass
    spectrometry (intact and peptide mapping). Glycosylation at three sites (two Fc, one TNF-R domain) profiled by HILIC showing
    <8% variance. Potency via TNF-alpha neutralization equivalent to Enbrel. Stability indicating method validated for shelf-life
    (up to 36 months). HCP and bioburden levels acceptable.

    '
