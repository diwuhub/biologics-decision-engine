- id: BLA-033
  type: precedent
  source: FDA CRL - Trastuzumab Biosimilar, Clinical PK/PD Study Inadequate
  title: CRL - Analytical Similarity Requires Clinical Bridging Due to Analytical Gaps
  content: 'Received 2017. A trastuzumab biosimilar received a CRL based on CMC concerns requiring clinical study expansion.
    Analytical assessment showed N-glycosylation profile comparable to reference Herceptin (within ±5%). However, potency
    assay (HER2 binding ELISA and ADCC against HER2+ cells) showed marginal differences: EC50 values were statistically equivalent,
    but ADCC potency was 15% lower at equivalent mAb concentrations. FDA determined analytical difference was clinically significant
    and required pharmacokinetic/pharmacodynamic bridging study in human subjects (n=200) to confirm equivalent HER2 target
    engagement and B-cell depletion efficacy. Applicant resubmitted with additional clinical PK/PD data demonstrating equivalent
    AUC and Cmax of trastuzumab levels, and equivalent HER2+ tumor cell killing in clinical samples (ex vivo ADCC assay).
    Key learning: analytical similarity must align with functional potency; unexplained functional differences trigger clinical
    data requirement.

    '
