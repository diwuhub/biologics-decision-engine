entries:
- id: BLA-001
  type: precedent
  source: FDA BLA 125553 (Zarxio/filgrastim-sndz)
  title: First FDA-Approved Biosimilar - G-CSF Filgrastim
  content: 'Approved September 2015. First biosimilar approved in the United States. CMC Assessment: Analytical studies demonstrated
    comparable purity (>95% monomer by SEC-HPLC), potency (in vitro cell proliferation assays), and stability across accelerated
    conditions. Charge variant profile (CEX) showed minor post-translational modification differences attributed to the host
    cell line (Escherichia coli vs. native CHO); FDA concluded differences were clinically inconsequential. Identity confirmed
    by N-terminal sequencing and peptide mapping. Endotoxin levels <0.5 EU/mg. Clinical PK/PD demonstrated equivalent exposure
    and receptor occupancy kinetics.

    '
