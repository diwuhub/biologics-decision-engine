- id: BLA-017
  type: precedent
  source: FDA BLA 761191 (Sandoz Bevacizumab Biosimilar)
  title: Bevacizumab Biosimilar - CMC with Analytical Parity
  content: 'Approved January 2023. Another bevacizumab biosimilar application. CMC data package included head-to-head analytical
    comparison with US reference standard (Avastin). N-glycosylation profiling by HILIC-RI showed 14 glycoforms with cumulative
    >98% similarity. Primary forms: G0F (fucose, no galactose) 45%, G1F 30%, G2F 15%, minor forms <3% each. Potency via recombinant
    VEGF165 binding curve analysis showed overlapping EC50 values (0.45-0.55 nM range for all products). ADCC against HER2+
    cells showed equivalent cell killing at equivalent antibody concentrations. Charge variant heterogeneity (anion exchange,
    pH 8.0) showed main peak 87-90% (expected). Disulfide bond stoichiometry confirmed. Stability through 36 months at 2-8°C
    with no aggregation increase beyond 1%.

    '
