- id: BLA-013
  type: precedent
  source: FDA BLA 761202 (Byooviz/ranibizumab-nuna)
  title: Ranibizumab Biosimilar - Ophthalmic VEGF Inhibitor
  content: 'Approved October 2021. First ophthalmic biosimilar (ranibizumab, Lucentis). Ranibizumab is an anti-VEGF antibody
    fragment (Fab) produced in CHO cells. CMC assessment: size (Fab ~48 kDa) confirmed by SEC-HPLC and LC-MS. N-glycosylation
    absent (no Fc region), simplifying comparability. Charge heterogeneity (CEX) minimal; main form >95%. VEGF binding potency
    assessed via ELISA; IC50 equivalent to reference. Aggregation assessment critical for intraocular injection; <0.1% high
    molecular weight species. Extractables and leachables assessment for prefilled syringe (intravitreal delivery route).
    Sterility, apyrogenicity, and particulate testing more stringent due to route of administration (intravitreal injection).
    HCP levels <100 ppm acceptable for ophthalmic use.

    '
