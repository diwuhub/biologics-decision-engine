- id: BLA-EXP-008
  type: precedent
  source: FDA BLA 761352 (Jubbonti, denosumab-bbdz)
  title: RANKL Inhibitor Biosimilar — Bone-Related CMC Biomarkers
  content: 'Jubbonti (denosumab-bbdz) approval introduced bone-specific pharmacodynamic assessments into biosimilar CMC comparability.
    Comparative analytics included: amino acid analysis confirming 145 amino acids, peptide mapping with identity to reference
    Prolia, disulfide bond mapping (4 interchain, 10 intrachain), N-glycosylation by LC-MS/MS identifying 3 major glycoforms.
    RANKL binding affinity (Kd 16.7 pM vs. 14.9 pM reference) determined by SPR showed functional equivalence. OPG (osteoprotegerin)
    displacement assay confirmed competitive RANKL inhibition. Manufacturing at 10 L bioreactor scale with aseptic processing;
    endotoxin specifications <1 EU/dose. Critically, clinical PK/PD study in healthy postmenopausal women (n=72, single-dose
    cross-over) measured both serum CTX (C-terminal telopeptide of type I collagen, bone resorption marker) and P1NP (procollagen
    type I N-terminal propeptide, bone formation marker) suppression. CTX AUC and maximum suppression were comparable (90-111%
    CI), establishing precedent that CMC for bone-targeting agents should include pharmacodynamic endpoints reflecting tissue-specific
    action mechanisms.

    '
