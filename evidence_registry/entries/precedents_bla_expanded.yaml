- id: BLA-EXP-011
  type: precedent
  source: FDA BLA 125514 Supplement (Keytruda, pembrolizumab — Manufacturing Site Additions)
  title: PD-1 Inhibitor Multi-Site Manufacturing and Process Change Comparability
  content: 'Keytruda BLA supplements (2015-2024) demonstrated CMC requirements for adding manufacturing sites and scaling
    monoclonal antibody production from development to commercial scale. Original Merck Sharp & Dohme production at single
    European site; supplements required validation at additional North America and APAC facilities. CMC strategy included:
    Process Comparability Study per ICH Q7 Annex 15, demonstrating that drug substance manufactured at different facilities
    met identical specifications. Charge variant and N-glycosylation profiling confirmed consistency across sites; aggregate
    levels controlled to <1%. Fill-finish site changes required extractables/leachables assessment for new vial closure systems
    and particulate matter specifications. Cell culture process changes (media optimization, feed strategies) required analytical
    bridging demonstrating unchanged product quality profiles. Purification process (Protein A capture, ion exchange chromatography,
    size exclusion) validated at commercial scale with process parameters adjusted for larger equipment. Manufacturing platform
    consistency verified through intermediate product characterization (antibody titer, cell viability, filtrate quality).
    Demonstrated that multi-site manufacturing for established monoclonal antibodies requires comprehensive comparability
    analysis but can be accelerated relative to new drug approvals through reliance on historical specification data.

    '
