- id: BLA-EXP-025
  type: precedent
  source: FDA BLA 761619 (Spikevax, mRNA-1273 — mRNA-LNP Manufacturing and Platform CMC)
  title: mRNA-LNP Platform Vaccine Manufacturing and Analytical Method Development
  content: 'Spikevax (mRNA-1273, mRNA encoding SARS-CoV-2 spike protein) BLA approved 2021, demonstrated mRNA-LNP CMC framework
    emphasizing platform approach and manufacturing consistency. mRNA sequence (1273 nucleotides) with 5''-cap and poly-A
    tail, pseudouridine incorporation for reduced immunogenicity. Manufacturing: (1) mRNA transcription (modified T7 RNA polymerase
    from PCR-generated DNA template), (2) purification (chromatography and ethanol precipitation with DSP optimization for
    scale), (3) LNP formulation (microfluidic self-assembly with ionizable lipid SM-102, DSPC, cholesterol, PEG-lipid in ratio
    optimized for Moderna platform), (4) purification and concentration. Critical quality attributes included: mRNA integrity
    (>95% full-length confirmed by capillary gel electrophoresis, sequencing by RT-PCR), oxidized guanosine impurities (<2%
    target), mRNA purity (HPLC separating full-length from truncated and degradation products), LNP size (80-120 nm target,
    PDI <0.4), encapsulation efficiency (>90%), and lipid ratio consistency (each lipid ±10% of target ratio). Potency assay
    measured spike protein antigen expression in HEK293 cells transfected with mRNA-LNP (immunoassay quantification of spike
    antigen production, EC50 <4 ng/mL). Process characterization identified critical parameters: mRNA template plasmid linearization
    precision, T7 polymerase kinetics, ethanol precipitation recovery (>70%), and microfluidic pump flow rates (impact on
    mRNA encapsulation). Stability (6 months at 2-8°C, 3 months -20°C, 1 month 4°C post-thaw) with enhanced monitoring of
    oxidized guanosine and mRNA fragmentation. Demonstrated that mRNA-LNP manufacturing platforms enable faster development
    of successive vaccines (variant strains, other pathogens) through CMC streamlining leveraging established process and
    analytical methods. Platform approach established precedent for rapid CMC approval of next-generation mRNA vaccines.

    '
