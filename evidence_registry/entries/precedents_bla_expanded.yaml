- id: BLA-EXP-007
  type: precedent
  source: FDA BLA 761278 (Tofidence, tocilizumab-bavi)
  title: IL-6 Receptor Inhibitor Biosimilar — Functional Bioassay Emphasis
  content: 'Tofidence (tocilizumab-bavi) exemplified CMC requirements for biosimilars targeting soluble vs. membrane-bound
    receptors. Comparative characterization included: peptide mapping confirming N- and C-terminal amino acids, N-glycosylation
    mapping (15 identified glycoforms), charge heterogeneity (cIEF identifying 9 species), size exclusion demonstrating <0.5%
    aggregates. Critical differentiation was emphasis on functional bioassay demonstrating IL-6 pathway inhibition. Reporter
    cell assay measuring STAT3 phosphorylation in IL-6 stimulated cells showed EC50 comparability (4.2 nM vs. 4.1 nM Actemra
    reference). Soluble IL-6R binding by ELISA confirmed functional IL-6R neutralization. Membrane-bound IL-6R pathway blockade
    verified through T cell co-culture. Manufacturing process at 20 L bioreactor scale with 0.2 µm filtration sterilization
    validated; viral safety per ICH Q5A. PK study in healthy volunteers (n=65, single IV dose cross-over, 8 mg/kg) demonstrated
    comparable serum concentrations and IL-6 suppression (baseline IL-6 elevated post-dose identically). FDA accepted functional
    bioassay as primary potency method, establishing precedent that CMC for receptors with dual-pathway activation may require
    orthogonal functional methods beyond binding.

    '
