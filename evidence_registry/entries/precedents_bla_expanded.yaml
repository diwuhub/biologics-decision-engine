- id: BLA-EXP-014
  type: precedent
  source: FDA BLA 125475 Supplements (Dupixent, dupilumab — Device Changes and Scale-Up)
  title: Dupilumab Device-Drug Integration and Manufacturing Scale-Up
  content: 'Dupixent (dupilumab) commercialization involved transition from syringe-based delivery to dedicated pen injector
    device, requiring novel CMC approach. Device-drug interaction studies included: extractables profiling from pen injector
    cartridge components (elastomer, glass vial coating) in dupilumab formulation at accelerated conditions (40°C, 8 weeks),
    leachables assessment in animal toxicity study confirming no new safety concerns, and compatibility testing with dupilumab
    formulation pH, osmolarity, and protein concentration. Manufacturing scale-up from 2 L research bioreactors to 20 L production
    scale with 0.2 µm final sterilization required process characterization per ICH Q8. Critical process parameters identified:
    cell culture oxygen tension (dissolved oxygen >40%), feed strategy (exponential glucose feed), and harvest timing (cell
    viability >95%) all demonstrated impact on product quality profiles. Charge variants and N-glycosylation profiling showed
    consistency across scale-up lots. Fill-finish at commercial contract manufacturing facility (CMO) required validation
    of 100-unit pre-filled pen cartridge production with automated fill-weight and integrity testing. Stability data (3 years
    refrigerated, 1 year real-time 25°C/60% RH, accelerated 40°C/75% RH) established shelf-life of 18 months. Demonstrated
    that device-drug combinations for monoclonal antibodies require comprehensive extractables/leachables assessment integrated
    with manufacturing scale-up validation.

    '
