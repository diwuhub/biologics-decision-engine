- id: BLA-EXP-024
  type: precedent
  source: FDA BLA 125742 (Comirnaty, BNT162b2 — mRNA-LNP Manufacturing at Scale)
  title: mRNA-Lipid Nanoparticle COVID-19 Vaccine Manufacturing and Specification Strategy
  content: 'Comirnaty (BNT162b2, mRNA encoding SARS-CoV-2 spike protein with 1-methylpseudouridine modification) BLA accelerated
    approval (December 2020) under Emergency Use Authorization established CMC framework for mRNA-LNP vaccines at unprecedented
    manufacturing scale. Manufacturing process: (1) mRNA transcription (T7 RNA polymerase from linearized DNA template, 1280-nucleotide
    mRNA with 5''-cap and poly-A tail), (2) mRNA purification (precipitation, HPLC polishing), (3) LNP formulation (microfluidic
    mixing of ethanol-mRNA with aqueous LNP buffer containing ionizable lipid SM-102, structural lipid DSPC, cholesterol,
    PEG2000-lipid), (4) tangential flow diafiltration and sterile filtration. Critical quality attributes included: mRNA identity
    (sequencing and mass spectrometry), mRNA purity (>95% full-length by capillary gel electrophoresis), LNP particle size
    (85-100 nm by dynamic light scattering), mRNA encapsulation (>92%), and lipid composition (SM-102 core/DSPC/cholesterol/PEG
    ratios). Potency assay measured mRNA-encoded spike protein expression in mammalian cells (particle concentration required
    to achieve defined mRNA translation output). Manufacturing scale-up from 1 L research batches to 250-1000 L production
    scale required process characterization. Microfluidic mixer optimization for LNP self-assembly across scale-up validated
    through particle size and mRNA encapsulation consistency studies. Stability (12 months at 5°C with temperature excursion
    to -25°C, -80°C acceptable) demonstrated mRNA integrity and LNP colloidal stability. Established that mRNA-LNP vaccines
    require manufacturing process characterization emphasizing consistent mRNA encapsulation and particle size as critical
    CQAs. Demonstrated that emergency authorization pathway for novel modalities can employ expedited CMC strategies emphasizing
    process control over extensive historical stability data.

    '
