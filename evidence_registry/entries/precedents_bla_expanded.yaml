- id: BLA-EXP-017
  type: precedent
  source: FDA BLA 125476 Supplements (Entyvio, vedolizumab — SC Formulation Post-Approval)
  title: Integrin Inhibitor Subcutaneous Reformulation and Clinical Transition
  content: 'Entyvio (vedolizumab) SC formulation supplement (approved 2019) exemplified CMC for post-approval reformulation
    of established IV monoclonal antibody. SC formulation required increased protein concentration (80 mg/mL vs. 20 mg/mL
    IV) with excipient adjustment (sucrose replaced trehalose to improve stability at elevated temperatures). Formulation
    development included stability testing at 25°C/60% RH for 18 months, accelerated conditions (40°C/75% RH for 6 months),
    and long-term 2-8°C storage. Protein aggregation by size exclusion chromatography controlled to <0.5% with specification
    range narrowed relative to IV formulation to support sustained stability at room temperature. Osmolarity adjustment (290-310
    mOsm/kg for SC tolerance) required buffer capacity optimization. Device extractables assessment for SC auto-injector system
    evaluated leachable potential from rubber stopper and needle components. Manufacturing process scale-up maintained consistent
    charge heterogeneity and N-glycosylation profiles despite increased protein concentration and excipient changes. Clinical
    PK study in patients with inflammatory bowel disease (n=48, cross-over design) demonstrated comparable vedolizumab exposure
    between IV and SC formulations. Demonstrated that SC reformulations of established IV monoclonal antibodies can employ
    abbreviated clinical comparability pathways when CMC comparability is comprehensive.

    '
