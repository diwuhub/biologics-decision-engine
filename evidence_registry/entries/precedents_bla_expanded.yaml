- id: BLA-EXP-022
  type: precedent
  source: FDA BLA 125519 (Luxturna, voretigene neparvovec — AAV Gene Therapy CMC)
  title: AAV5 Subretinal Delivery and Manufacturing for Ophthalmology
  content: 'Luxturna (voretigene neparvovec, AAV5-RPE65) BLA for inherited retinal dystrophy demonstrated specialized CMC
    approach for tissue-specific AAV delivery. AAV5 serotype selection optimized for subretinal transduction and RPE (retinal
    pigment epithelium) targeting over retinal photoreceptors. Manufacturing process similar to AAV9 but with serotype-specific
    optimization: HEK293T transfection (rep-cap plasmid with AAV5 serotype, transgene cassette expressing RPE65 photoisomerase),
    column purification, and concentration. Critical quality attributes included: serotype identity (AAV5 VP1/VP2/VP3 by LC-MS/MS
    peptide mapping), genome integrity (full-length RPE65 transgene confirmed by ddPCR absolute quantification and PCR mapping
    spanning 3'' and 5'' ends), and full/empty capsid ratio (analytical ultracentrifugation determining particle density distribution,
    target >50% full). Potency assay used RPE cell culture transduction (human RPE cells or ARPE-19 cell line) measuring RPE65
    mRNA expression and photoisomerase enzymatic activity (trans-11-retinyl esters formation). Manufacturing process control
    emphasized cold-chain integrity (2-8°C storage) and osmolarity stability (formulation buffer preventing osmotic lysis
    of AAV5 particles). Subretinal injection volume (50 µL per eye) required manufacturing consistency for volume-based dosing.
    Demonstrated that tissue-specific AAV serotypes require specialized potency assays reflecting target tissue biology, and
    manufacturing temperature control becomes critical CMC requirement for thermolabile serotypes.

    '
