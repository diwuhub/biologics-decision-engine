- id: BLA-EXP-004
  type: precedent
  source: FDA BLA 761080 (Stimufend, pegfilgrastim-fpgk)
  title: PEGylated Protein Biosimilar — Polymer Characterization and Potency
  content: 'Stimufend approval required novel CMC approaches for PEGylated biosimilars. Pegfilgrastim-fpgk contains 20 kDa
    PEG moiety attached to filgrastim backbone. Comparative analysis included: (1) amino acid analysis post-PEG removal via
    enzymatic hydrolysis, (2) mass spectrometry of intact pegfilgrastim confirming expected MW distribution, (3) PEG molar
    ratio determination, (4) site-specific pegylation mapping via peptide mapping. Potency assays included cell proliferation
    assays on human myeloid leukemia cells (TF-1) demonstrating EC50 comparability to reference Neulasta. Bioassay variability
    assessment and qualification of orthogonal potency method (STAT5 phosphorylation) provided confidence in functional equivalence.
    PK study in patients with chemotherapy-induced neutropenia (n=106, single-dose cross-over) showed comparable neutrophil
    AUC. Manufacturing process validation confirmed consistent PEGylation efficiency >95% and defined release testing for
    pegylation ratio and distribution. Stability data at 2-8°C and 25°C/60% RH demonstrated comparable degradation profiles
    including oxidation state. Established that PEGylated biosimilars require orthogonal potency methods and heightened attention
    to polymer characterization as critical CMC components.

    '
