- id: BLA-EXP-016
  type: precedent
  source: FDA BLA 125873 Supplements (Hemlibra, emicizumab — Bispecific Manufacturing Scale-Up)
  title: Bispecific Antibody Manufacturing and Analytical Complexity
  content: 'Hemlibra (emicizumab) BLA supplements demonstrated unique CMC requirements for bispecific monoclonal antibodies
    (human IgG4-PE/IgG1 hybrid combining two IgG1 molecules bridged by two IgG4 Fc fragments). Manufacturing required cell
    lines co-expressing both polypeptide chains with defined heavy chain stoichiometry (1:1 emicizumab hybrid vs. background
    homodimeric contaminants). Process characterization included ion exchange chromatography method development for separating
    bispecific product from homodimeric species (target purity >95% bispecific). Analytical strategy included: dual peptide
    mapping (digestion specific to IgG4 and IgG1 domains), N-glycosylation mapping of each domain, and charge variant separation
    (cIEF) identifying species-specific patterns. Size exclusion chromatography with multi-angle light scattering confirmed
    intended MW (~150 kDa), aggregate specifications <0.5%. Factor IXa and Factor X binding functional assays confirmed the
    critical dual-chain functionality required for Factor VIIIa bridging activity. Manufacturing scale-up (10 L bioreactor)
    required media/feed optimization for balanced expression of both chains. Viral safety validation per ICH Q5A addressed
    potential novel safety concerns from bispecific architecture. Demonstrated that bispecific antibody CMC requires species-specific
    analytical methods and manufacturing process development significantly more complex than conventional monospecific antibodies.

    '
