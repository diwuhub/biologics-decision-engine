- id: BLA-EXP-018
  type: precedent
  source: FDA BLA 761026 Supplements (Ocrevus, ocrelizumab — SC Formulation Post-Approval)
  title: CD20 Inhibitor Subcutaneous Development and Manufacturing Validation
  content: 'Ocrevus (ocrelizumab) SC formulation supplement (approved 2022) for multiple sclerosis demonstrated CMC approach
    for developing SC delivery of humanized monoclonal antibody targeting CD20. SC formulation utilized novel liquid formulation
    technology (patent-protected ethanol-based buffer system) enabling 60 mg/0.4 mL injection volume with improved tolerability
    vs. standard aqueous formulations at equivalent dose. Excipient system optimization required assessment of ethanol leachability
    and tolerability (SC tissue exposure to ethanol <50 mM to prevent injection site reactions). Formulation pH (3.2-3.5)
    maintained monoclonal antibody charge homogeneity; buffer capacity validation ensured stability under subcutaneous physiological
    conditions. Stability protocol (18 months at 2-8°C, 6 months 25°C/60% RH, 6 months accelerated 40°C/75% RH) demonstrated
    equivalent or improved degradation profiles vs. IV formulation. Manufacturing process implemented at contract manufacturer
    (Lonza, Visp) with aseptic processing and 0.2 µm sterile filtration sterilization. Process characterization included residence
    time distribution studies and environmental monitoring validating aseptic conditions. Charge variant and N-glycosylation
    consistency confirmed across scale-up lots. PK study in MS patients (n=124, cross-over, single 300 mg dose) demonstrated
    comparable ocrelizumab exposure to IV formulation. Demonstrated that novel excipient systems can enable SC delivery of
    monoclonal antibodies with CMC requirements including novel stability protocols and enhanced biocompatibility assessment.

    '
