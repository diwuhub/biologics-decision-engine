- id: BLA-EXP-009
  type: precedent
  source: FDA BLA 761XXX (Adalimumab Biosimilar Interchangeability — 2024 Expansion)
  title: Adalimumab Interchangeable Biosimilar Second/Third Wave — Streamlined CMC Approach
  content: 'Following Cyltezo approval, multiple adalimumab biosimilars (Hadlima, Halimatox, others approved 2019-2024) established
    streamlined CMC comparability pathway. Comparative analytics required: peptide mapping, charge variants by cIEF, hydrophobic
    variants, N-glycosylation, and aggregate/particle assessment. Manufacturing process validation required at commercial
    scale; cleaning validation and endotoxin reduction established specifications. Distinctly, subsequent biosimilars leveraged
    published data from reference product and Cyltezo, reducing animal toxicity studies to single-species repeat-dose pharmacology
    model. Clinical comparability studies reduced in scope from 132-person healthy volunteer PK studies to 60-person patient
    population PK/PD studies (rheumatoid arthritis, psoriasis), with emphasis on demonstrating similar disease response in
    target population rather than healthy volunteer equivalence. Demonstrated that CMC pathways mature and streamline as class
    precedents accumulate. FDA 2024 guidance acknowledged adalimumab as mature biosimilar class, enabling faster approvals
    for subsequent entries with lower CMC burden relative to first-in-class.

    '
  applicable_categories:
