- id: BLA-EXP-006
  type: precedent
  source: FDA BLA 761245 (Tyruko, natalizumab-sztn)
  title: Anti-Integrin Biosimilar with Neuropathic Risk Profile Considerations
  content: 'Tyruko (natalizumab-sztn) approval for multiple sclerosis required specialized CMC comparability due to risk of
    progressive multifocal leukoencephalopathy (PML). Comparative CMC included standard monoclonal antibody characterization:
    N-glycosylation profiling, charge heterogeneity, peptide mapping confirming C-terminal lysine processing (89% lysine-positive
    vs. 100% reference addressed in specifications), size variants, and aggregate assessment. VLA-4 integrin binding affinity
    (Kd 6.8 nM vs. 7.1 nM reference) and functional cell adhesion inhibition assays demonstrated bioequivalence. Importantly,
    CMC comparability strategy included detailed analysis of potential pro-inflammatory vs. anti-inflammatory balance, examining
    Fc-FcγR binding and FcγRIIa polymorphism engagement to ensure comparable CD4+ T cell proliferation inhibition. Animal
    toxicity (12-week repeat-dose rat study with functional readout of lymphocyte migration) supported comparable mechanism.
    Clinical PK/PD study (MS patients, n=108, multiple dosing) demonstrated comparable serum trough levels and CD4+ cell adhesion
    blockade. FDA emphasized that CMC for high-risk biologics should consider not just analytical similarity but potential
    mechanistic safety implications, establishing precedent for risk-informed comparability strategies.

    '
  applicable_categories:
