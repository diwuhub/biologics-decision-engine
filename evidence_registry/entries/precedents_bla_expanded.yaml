- id: BLA-EXP-013
  type: precedent
  source: FDA BLA 125378 Supplements (Darzalex, daratumumab — SC Formulation Development)
  title: Subcutaneous Monoclonal Antibody Formulation — Hyaluronidase Integration
  content: 'Darzalex (daratumumab) SC formulation supplement represented novel CMC approach for converting IV monoclonal antibody
    to subcutaneous delivery. SD-HL (human recombinant hyaluronidase) enzyme integration required: (1) Analytical characterization
    of daratumumab-hyaluronidase combination demonstrating no chemical interaction or aggregation, (2) Osmolarity control
    (300 mOsm/kg target) for SC injection tolerability, (3) pH optimization (6.5-7.5 range) for enzyme stability and tissue
    compatibility. Formulation pH buffering capability required assessment under worst-case conditions (elevated temperature,
    oxidative stress). Manufacturing required aseptic mixing of daratumumab and hyaluronidase at point of fill, validated
    through environmental monitoring and growth media fill studies. Extractables assessment from SC injection devices (pre-filled
    syringes, pen injectors) required compatibility testing with formulation. Stability (6 months 2-8°C, 6 months 25°C/60%
    RH) demonstrated comparable degradation to IV formulation despite higher buffer capacity. PK study (n=47, patients with
    multiple myeloma, single-dose cross-over) demonstrated comparable daratumumab exposure between IV and SC formulations
    (90% CI 0.85-1.20). Demonstrated that CMC for SC reformulations includes unique considerations for hyaluronidase enzyme
    stability, device extractables, and osmolarity specifications not applicable to IV formulations.

    '
