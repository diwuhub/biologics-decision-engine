- id: BLA-EXP-020
  type: precedent
  source: FDA BLA 125717 (Yescarta, axicabtagene ciloleucel — CAR-T Manufacturing CMC)
  title: Allogeneic CAR-T Manufacturing Platform and Process Scalability
  content: 'Yescarta (axicabtagene ciloleucel) BLA demonstrated CMC for allogeneic CAR-T platform enabling manufacturing scale-up
    and multiple patient dosing from single manufacturing run. Allogeneic approach utilized HLA-matched donor T cells or engineered
    cells with TCR-disruption (TRAC knockout) reducing graft-vs.-host-disease risk. Manufacturing process: (1) Donor T-cell
    selection and enrichment, (2) Transduction with lentiviral CAR construct targeting CD19, (3) Expansion culture (10-14
    days, higher fold-expansion than autologous due to starting material quantity), (4) Cryopreservation in serum-free medium.
    Critical quality attributes included: CAR+ cell percentage (>70%), viability (>70% post-thaw), viable cell concentration
    (5-8×10^6 CAR+ T cells per dose enabling 10-20 patient doses from single manufacturing run), and T-cell memory phenotype
    assessment (CD45RA/CCR7 profile confirming central memory cells). Release testing refined compared to Kymriah: sterility
    (automated rapid testing), mycoplasma (real-time PCR), endotoxin (LAL), and cell viability (flow cytometry with 7-AAD).
    Manufacturing process scalability from development to commercial scale (stirred-tank bioreactor, up to 50 L working volume)
    required process characterization demonstrating consistent CAR expression, fold-expansion, and cell phenotype. Integration
    site sequencing required to confirm no clonal dominance post-manufacturing. Established that allogeneic cell therapy platforms
    enable manufacturing efficiency and cost reduction while maintaining CMC rigor around cell identity, transduction efficiency,
    and potency.

    '
