- id: BLA-EXP-005
  type: precedent
  source: FDA BLA 761198 (Vegzelma, bevacizumab-adcd)
  title: Anti-VEGF Biosimilar — Complex Glycosylation and Comparability
  content: 'Vegzelma (bevacizumab-adcd) BLA established CMC precedent for complex monoclonal antibody biosimilars with heterogeneous
    N-glycosylation. Comparative characterization included: mass spectrometry-based N-glycosylation profiling (12 major glycoforms
    identified), charge variant analysis by cIEF identifying 13 charge variants, hydrophobic interaction chromatography separating
    hydrophobic variants. Peptide mapping after reduction and alkylation confirmed primary structure identity. Size-exclusion
    chromatography with multi-angle light scattering determined aggregate levels (<0.1%) and monomer mass (149 kDa). VEGF
    binding kinetics determined by surface plasmon resonance (Kd 1.77 pM for both reference and bevacizumab-adcd) demonstrated
    functional equivalence. Fc-FcγR binding and complement-dependent cytotoxicity (CDC) assays were equivalent. Animal toxicity
    study (8-week IV infusion in cynomolgus monkeys at 1, 10, 30 mg/kg/week) showed comparable safety profile. Clinical PK
    study (patients with non-small cell lung cancer, n=71, single-dose cross-over) showed comparable exposure. Demonstrated
    that comprehensive glycosylation profiling and charge variant mapping are essential CMC requirements for antibody biosimilars,
    with acceptance criteria often defined as ±20% range relative to reference product.

    '
