- id: BLA-EXP-021
  type: precedent
  source: FDA BLA 125657 (Zolgensma, onasemnogene abeparvovec — AAV Gene Therapy CMC)
  title: Adeno-Associated Virus (AAV) Vector Manufacturing and Genome Integrity
  content: 'Zolgensma (onasemnogene abeparvovec, AAV9-SMN) BLA established CMC framework for recombinant AAV gene therapy
    manufacturing. AAV9 vector carries SMN1 (survival motor neuron 1) gene transgene targeting spinal muscular atrophy. Manufacturing
    process: (1) Mammalian cell culture (HEK293T cells transfected with rep-cap plasmids and transgene cassette), (2) Cell
    lysis and clarification, (3) Column chromatography (AVB Sepharose affinity purification of AAV capsids), (4) Virus concentration
    and formulation. Critical quality attributes included: capsid identity (AAV9 serotype confirmed by peptide mapping and
    electron microscopy), genome integrity (full-length SMN transgene by qPCR and intact genomic DNA assessment), full/empty
    capsid ratio (transmission electron microscopy, target >70% full capsids), and infectious titer (transducing units per
    mL, TU/mL, by functional assay in motor neuron cultures). Release testing strategy included: identity confirmation (peptide
    mapping of VP1/VP2/VP3 capsid proteins), potency (transduction assay confirming SMN1 expression in HEK293 cells), sterility
    (14-day bacterial culture), mycoplasma (PCR), and endotoxin (LAL, limit <100 EU/dose). Manufacturing process controls
    emphasized temperature stability (AAV9 thermolabile at >30°C) and buffer pH control (AAV stable pH 6.5-8.0). Batch consistency
    validation required demonstration that full-length genome incorporation consistent across manufacturing runs. Established
    that viral vector CMC requires orthogonal methods for genome integrity assessment (qPCR for transgene, electron microscopy
    for particle morphology) and functional potency assays replacing traditional chemical purity specifications.

    '
