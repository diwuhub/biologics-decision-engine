- id: BLA-EXP-023
  type: precedent
  source: FDA BLA 209832 (Onpattro, patisiran — siRNA Lipid Nanoparticle CMC)
  title: Small Interfering RNA-LNP Manufacturing and Analytical Complexity
  content: 'Onpattro (patisiran, siRNA-LNP targeting transthyretin mRNA) BLA established foundational CMC requirements for
    RNA-lipid nanoparticle (LNP) therapeutics. Manufacturing process: (1) siRNA synthesis (27-nucleotide double-stranded RNA
    chemically synthesized, phosphoramidite method), (2) LNP formulation by microfluidic self-assembly (ethanol-siRNA stream
    mixed with aqueous buffer containing ionizable lipid, PEG-lipid, structural lipid, cholesterol), (3) purification (tangential
    flow filtration), (4) sterile filtration (0.2 µm). Critical quality attributes included: siRNA purity (HPLC confirming
    >95% full-length, <5% truncated species), LNP size distribution (dynamic light scattering, target 50-100 nm, PDI <0.3),
    LNP lipid composition (liquid chromatography quantification of ionizable lipid, structural lipid, PEG-lipid, cholesterol
    ratios), and siRNA encapsulation efficiency (>90% internalized by osmotic lysis method). Analytical methods included:
    reverse-phase HPLC for siRNA identity and purity, potency assay measuring siRNA-mediated transthyretin mRNA knockdown
    in hepatocyte culture (target EC50 <10 nM), and endotoxin testing (LAL, <5 EU/dose target). Manufacturing process controls
    identified critical parameters: ethanol flow rate (controlling LNP self-assembly kinetics), aqueous buffer composition
    (pH, osmolarity affecting LNP stability), and purification recovery (target >60% siRNA recovery). Stability testing (6-12
    months at 2-8°C) demonstrated siRNA integrity and LNP colloidal stability (no precipitate, size distribution unchanged).
    Established that RNA-LNP CMC requires orthogonal methods for siRNA sequence verification (sequencing by mass spectrometry)
    and functional potency assays reflecting target mRNA suppression. Demonstrated critical importance of manufacturing process
    parameter control for LNP self-assembly.

    '
