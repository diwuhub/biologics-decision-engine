- id: BLA-EXP-012
  type: precedent
  source: FDA BLA 125646 Supplement (Opdivo, nivolumab — Formulation Changes)
  title: Formulation Optimization and Excipient Substitution in PD-1 Inhibitor
  content: 'Opdivo (nivolumab) BLA supplements introduced changes from original sodium chloride-based formulation to sucrose-containing
    formulation intended for improved stability and freeze-drying capability. CMC comparability required: (1) Osmolarity and
    pH comparability studies demonstrating equivalent tonicity and buffer capacity, (2) Excipient function testing showing
    sucrose provided equivalent cryoprotection and glass vial integrity during freeze-drying, (3) Analytical characterization
    of product in new formulation including charge variants, N-glycosylation, aggregate levels to confirm no formulation-induced
    changes. Stability studies (3 months 2-8°C, 6 months 25°C/60% RH, plus accelerated 40°C/75% RH) demonstrated comparable
    degradation rates and oxidation profiles. PK study in patients with melanoma (n=45, cross-over design, single 3 mg/kg
    dose) confirmed bioequivalence between formulations (90% CI 0.80-1.25 for AUC and Cmax). Demonstrated that formulation
    changes for established biologics require analytical bridging and clinical PK confirmation, with stability data requirements
    varying based on storage condition changes. Established precedent that minor excipient substitutions supporting manufacturing
    efficiency can be approved through abbreviated clinical pathways.

    '
