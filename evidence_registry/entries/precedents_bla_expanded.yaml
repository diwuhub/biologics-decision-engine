- id: BLA-EXP-015
  type: precedent
  source: FDA BLA Supplements (Soliris/Ultomiris, eculizumab/ravulizumab — Process and Formulation)
  title: Complement Inhibitor Manufacturing Consistency and Formulation Optimization
  content: 'Soliris (eculizumab) BLA supplements spanning 2015-2024 established CMC precedent for complement C5 inhibitor
    manufacturing maturation. Supplement 1 involved process optimization increasing titer from 0.8 g/L to 2.1 g/L through
    cell line engineering (medium selection, feed optimization, temperature control during stationary phase). Analytical comparability
    required: peptide mapping confirming N-glycosylation unchanged despite titer increase, charge heterogeneity (cIEF) within
    historical ranges, and aggregate levels <0.5%. Supplement 2 involved formulation pH adjustment from 7.0 to 7.2 to improve
    stability at elevated temperatures (supporting clinical programs in warmer geographic regions). pH change required osmolarity
    adjustment (sodium chloride reduction) and buffer capacity validation. Complement activation assays in patient sera (paroxysmal
    nocturnal hemoglobinuria, PNH) confirmed functional equivalence with increased titer and pH-adjusted formulations. Subsequent
    Ultomiris (ravulizumab) BLA leveraged Soliris manufacturing platform, reducing CMC comparability burden through process
    platform approach. Demonstrated that manufacturing optimization of established complement inhibitors can proceed through
    abbreviated comparability pathways once historical consistency established, enabling manufacturing cost reductions without
    additional animal studies.

    '
