- id: BLA-EXP-019
  type: precedent
  source: FDA BLA 125646 (Kymriah, tisagenlecleucel — CAR-T Cell Therapy CMC)
  title: CAR-T Cell Therapy Manufacturing and Release Testing Strategy
  content: 'Kymriah (tisagenlecleucel) BLA established foundational CMC framework for autologous CAR-T cell therapies. Manufacturing
    process: (1) Patient leukapheresis collection (starting material control including viability >90%, CD3+ T-cell enrichment
    >80%), (2) T-cell activation with OKT3 and IL-2, (3) Lentiviral transduction with FMC63 scFv-CD3ζ CAR construct, (4) Cell
    expansion culture (10-14 days), (5) Cryopreservation in DMSO/serum-containing medium. Critical quality attributes included:
    CAR expression (>90% CD3+ cells expressing CAR by flow cytometry), transduction efficiency (>50%), viable cell count (1×10^6
    to 5×10^6 CAR+ cells per dose), and viability post-thaw (>80% for cryopreserved product). Release testing strategy included:
    sterility (14-day culture and gram stain), mycoplasma (PCR), endotoxin (LAL <175 EU/dose), and viability (7-AAD negative).
    Manufacturing process controls identified critical process parameters: lentiviral vector MOI (multiplicity of infection
    5-10), culture temperature (36-38°C), fold-expansion (100-500 fold), and harvest timing (peak CAR expression and viability).
    Established that cell therapy CMC requires real-time release testing (flow cytometry, viability) given lack of final lot
    testing feasibility for living cell products. Transduction safety validated through integration site analysis (no insertional
    mutagenesis in known oncogenic sites) and clonal dominance assessment. Demonstrated that patient-derived cell therapies
    require process controls emphasizing cell quality metrics rather than chemical purity specifications.

    '
