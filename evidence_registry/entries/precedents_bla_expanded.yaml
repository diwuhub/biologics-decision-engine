- id: BLA-EXP-002
  type: precedent
  source: FDA BLA 761201 (Semglee, insulin glargine-yfgn)
  title: Insulin Biosimilar with Interchangeability — Glucose Clamp and CMC Complexity
  content: 'Semglee was the first approved insulin biosimilar with interchangeability designation, establishing CMC requirements
    for small-molecule-like glycoprotein drugs. Primary structure analysis (amino acid sequencing, peptide mapping) confirmed
    identity to reference Lantus. Secondary and tertiary structure determined via circular dichroism and hydrogen-deuterium
    exchange mass spectrometry. Critical quality attributes included isoform distribution (A-21 deamidation), disulfide bonds,
    and zinc content in formulation. In vitro receptor binding assays and glucose uptake studies in isolated rat adipocytes
    demonstrated functional bioequivalence. Pharmacodynamic study in healthy volunteers (euglycemic glucose clamp, n=141 cross-over
    design) showed comparable glucose infusion rates and time-action profiles. Manufacturing process scaled from 500L to 2000L
    fermentation; viral safety and mycoplasma testing per ICH Q5A completed. Extractables/leachables from pen device and cartridge
    system evaluated. FDA determined that CMC data combined with PK/PD similarity study and proposed REMS program supported
    interchangeability, reducing requirement for additional clinical immunogenicity monitoring post-approval.

    '
