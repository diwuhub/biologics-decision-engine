- id: BLA-EXP-003
  type: precedent
  source: FDA BLA 761202 (Rezvoglar, insulin glargine-aglr)
  title: Second Insulin Glargine Biosimilar — Accelerated Comparability Pathway
  content: 'Rezvoglar approval demonstrated accelerated pathway for follow-on insulin biosimilars. Comparative CMC analysis
    identical to BLA 761201 comparator. Head-to-head analytical characterization (peptide mapping, post-translational modifications,
    disulfide mapping) established equivalence to Lantus reference standard. Manufacturing at separate facility (Vetter fill-finish)
    required process validation including filter integrity testing and extractables from new cartridge system. Pharmacokinetic
    study (healthy volunteers, n=102, 4-way cross-over with Lantus and Semglee) provided bridging evidence of comparable exposure.
    Glucose clamp study showed time-action profiles within 90% CI bounds. FDA guidance experience indicated that second and
    subsequent insulin biosimilars could rely on comparability to reference product plus modified PK/PD bridging study, reducing
    animal toxicity studies. Demonstrated that manufacturing CMC can be streamlined once class-level comparability precedent
    established, enabling faster approvals within same modality without repeating foundational comparability work.

    '
