entries:
- id: BLA-EXP-001
  type: precedent
  source: FDA BLA 761058 (Cyltezo, adalimumab-adbm)
  title: First Interchangeable Adalimumab Biosimilar — Comparative CMC and Analytical Comparability
  content: 'Cyltezo (adalimumab-adbm) was the first biosimilar approved with interchangeability status, setting critical precedent
    for CMC comparability requirements. Comparative structural and functional characterization included peptide mapping, N-glycosylation
    profiling, charge heterogeneity (cIEF), hydrophobic interaction chromatography, and intact mass by LC-MS. Disulfide bond
    mapping and oxidation state analysis demonstrated equivalence to reference Humira. Animal toxicity studies (repeat-dose
    monkey study) and clinical PK/PD study (healthy volunteers, n=132) provided robust evidence of comparable biodistribution
    and clearance. Manufacturing process characterized under ICH Q7 with validated cleaning validation and endotoxin testing.
    Risk assessment identified protein charge variants and aggregation as critical quality attributes requiring tight specifications.
    FDA accepted abbreviated comparability pathway, reducing non-clinical studies compared to original BLA. Binding kinetics
    (SPR) and neutralizing capacity assays confirmed functional similarity. Demonstrated that interchangeability determination
    relies on manufacturing consistency data combined with analytical and clinical pharmacology evidence, not on structural
    identity alone.

    '
