- id: EMA-004
  type: precedent
  source: 'EMA EPAR: Truxima (rituximab, CT-P10)'
  title: Anti-CD20 mAb biosimilar—CMC approach for glycoengineered protein with immune function
  content: 'Truxima (rituximab CT-P10), approved November 2017, established CMC precedent for anti-CD20 biosimilar where Fc-mediated
    effector functions (ADCC, CDC) are critical to mechanism. CMC assessment required: amino acid identity, primary structure
    confirmation via peptide mapping, post-translational modification profile (N-glycosylation, afucosylation status, terminal
    galactose, sialylation), aggregate quantitation (size exclusion chromatography, native PAGE). Functional assays: CD20
    binding (ELISA, flow cytometry), Fc-receptor binding (FcγRIII, FcγRII), complement-dependent cytotoxicity (CDC) in human
    serum, ADCC in primary cell assays. EMA assessment included comparison to Mabthera across glycosylation variants, noting
    that afucosylation status can drive ADCC potency differences. CMC conclusion: acceptable quality with documented functional
    equivalence despite minor glycoform distribution differences.

    '
