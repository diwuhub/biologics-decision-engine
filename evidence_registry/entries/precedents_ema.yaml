- id: EMA-007
  type: precedent
  source: 'EMA EPAR: Imraldi (adalimumab, SB5)'
  title: Adalimumab biosimilar—CMC dossier with emphasis on SC formulation comparability
  content: 'Imraldi (adalimumab SB5), approved August 2017, established second EMA adalimumab biosimilar with focused CMC
    on SC formulation. CMC assessment: primary structure confirmation, post-translational modification profiling (N-glycosylation,
    sialylation, galactosylation, N-terminal pyroglutamate), impurity characterization via LC-MS (oxidized variants, deamidated
    forms). Formulation-specific: identical excipient composition to Humira, identical osmolarity, pH, buffer system; stability
    data (long-term at 2-8°C, intermediate conditions, photo-stability) to support SC autoinjector device design. Functional
    assays: TNF-alpha binding (ELISA, surface plasmon resonance), Fc-receptor binding (human FcγRI, FcγRIIb, FcγRIII), antibody-dependent
    cellular cytotoxicity (ADCC) in primary lymphocytes. EMA''s CMC conclusion: quality and functional equivalence demonstrated;
    SC formulation stability sufficient for 2-year shelf-life in autoinjector.

    '
