- id: EMA-018
  type: precedent
  source: EMA/CHMP Position on Comparability Exercises for Biologics (Guideline updates 2015-2018)
  title: 'EMA regulatory guidance: analytical comparability standards vs. FDA approach'
  content: 'EMA/CHMP published refined guidance on comparability exercises for biologics (2015-2018 updates) establishing
    higher bar than FDA for analytical equivalence. Key positions: (1) All clinically relevant quality attributes must be
    analytically characterized and shown comparable, (2) post-translational modifications must be fully profiled (EMA required
    more comprehensive PTM mapping than FDA for mAbs), (3) process-related impurities must be quantified and shown equivalent,
    (4) functional assays must be cell-based/biologically relevant (not limited to binding assays). Specifically for glycosylation:
    EMA required detailed glycan microheterogeneity mapping via HILIC, exoglycosidase mapping, and N-glycan mass spec; subtle
    shifts in glycoform distribution (e.g., sialylation, fucosylation) required functional impact assessment via Fc-receptor
    engagement. For process changes, EMA required head-to-head analytical comparability (not bridging to reference standard).
    CMC dossiers submitted to EMA needed more extensive characterization than FDA equivalents.

    '
