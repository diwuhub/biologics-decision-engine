entries:
- id: EMA-001
  type: precedent
  source: 'EMA EPAR: Remsima (infliximab biosimilar, CT-P13)'
  title: First EMA-approved mAb biosimilar—CMC comparability of recombinant TNF-alpha inhibitor
  content: 'Remsima (infliximab CT-P13) was the first monoclonal antibody biosimilar approved in the EU (September 2013).
    EMA''s CHMP assessment focused on comprehensive CMC comparability: analytical characterization of primary structure (mass
    spectrometry), post-translational modifications (glycosylation profile, charge variants via isoelectric focusing), and
    functional assays (TNF-alpha binding, Fc-receptor binding). Despite identical amino acid sequence and similar glycosylation
    patterns, EMA required extensive comparability data including animal toxicity studies. CMC conclusion: quality differences
    were minor and clinically insignificant. Process development used mammalian (Chinese hamster ovary) expression. Key regulatory
    position: comprehensive quality dossier demonstrating functional equivalence was sufficient to support biosimilar claim
    without requiring full non-clinical/clinical waiver (clinical trial required despite CMC).

    '
