- id: EMA-003
  type: precedent
  source: 'EMA EPAR: Flixabi (infliximab, SB2)'
  title: Second infliximab biosimilar—narrower CMC dossier vs. originator, head-to-head analytical data
  content: 'Flixabi (infliximab SB2), approved September 2016, exemplified EMA''s refined biosimilar CMC expectations. CMC
    dossier included: high-resolution characterization of primary structure, comprehensive post-translational modifications
    (N-glycosylation profiling via HILIC-fluorescence, fucosylation analysis), impurity profiling (host cell proteins, DNA,
    process-related impurities by LC-MS), stability data (photo-stability, oxidation-prone residues). Comparative analytical
    study vs. Remicade reference included head-to-head TNF-alpha binding kinetics, Fc-gamma receptor engagement, C1q binding
    for complement activation. EMA noted acceptable differences in aggregate levels and charge variants. Key regulatory insight:
    EMA accepted CMC dossier with ''reduced scope'' on some stability studies compared to original, relying on comparative
    clinical/PK data to support quality assertions.

    '
