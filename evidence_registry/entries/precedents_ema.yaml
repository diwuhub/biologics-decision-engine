- id: EMA-013
  type: precedent
  source: 'EMA EPAR: Nplate (romiplostim, TPO-receptor agonist)'
  title: Thrombopoietin-receptor agonist—CMC for novel fusion protein therapeutic
  content: 'Nplate (romiplostim), EMA approved July 2008, exemplified CMC assessment for engineered fusion protein. Romiplostim
    is a chimeric protein consisting of recombinant human IgG1 Fc domain fused to a synthetic peptide mimicking TPO. CMC dossier:
    primary structure confirmation (amino acid sequencing of Fc domain and TPO-mimetic peptide region), post-translational
    modifications (N-glycosylation profile in Fc, limited modifications in peptide region), disulfide bond analysis (correct
    Fc dimerization essential). Manufacturing: mammalian (CHO) expression of single-chain construct. Functional assays: TPO-receptor
    (MPL) binding and activation (ELISA, cell-based proliferation assays with megakaryocytes), Fc-receptor engagement. EMA
    assessment required comprehensive comparability data including animal toxicology to support novel fusion architecture
    despite precedent for Fc-domain proteins. CMC conclusion: analytical characterization sufficient to support regulatory
    pathway.

    '
