- id: EMA-025
  type: precedent
  source: 'EMA Precedent: Comparability of Reference Products across jurisdictions (2017-2019)'
  title: Regulatory intelligence—EMA acceptance of US-approved originator as comparator for biosimilar CMC
  content: 'EMA CHMP Assessment Reports (2017-2019) established precedent for accepting US-marketed originator product as
    analytical comparator in CMC biosimilar dossiers. Key acceptance criteria: (1) Head-to-head analytical comparison between
    investigational biosimilar and US-approved reference product (e.g., Remicade from US market), (2) Multiple lots of reference
    product analyzed to establish acceptable analytical range, (3) Demonstrated that reference product lot-to-lot variation
    falls within normal manufacturing variance, (4) Investigational biosimilar falls within reference product variability
    range OR analytical differences explained and supported by functional equivalence. EMA allowed this approach because European
    reference products (e.g., EU-licensed Remicade) and US-approved products typically originated from same or very similar
    manufacturing processes, and analytical profiles were comparable. However, EMA required demonstration that reference product
    sourcing and manufacturing remained consistent throughout biosimilar development; if originator changed manufacturing
    significantly, re-comparison required. This precedent was critical for global development programs where biosimilar was
    developed using US reference standard before European approval.

    '
