- id: EMA-023
  type: precedent
  source: 'EMA Guideline: Comparability of Recombinant Proteins (ICH S6 Implementation, 2015-2017)'
  title: EMA/ICH regulatory framework—comprehensive CMC comparability expectations for biologics
  content: 'EMA/ICH S6 guideline implementation (2015-2017 updates) formalized CMC comparability expectations for recombinant
    proteins and biosimilars. Key CMC elements required: (1) Amino acid sequence confirmation (peptide mapping, intact mass
    spectrometry), (2) Primary structure integrity (reduced and non-reduced peptide mapping, disulfide mapping for mAbs/Fc-fusion
    proteins), (3) Post-translational modifications (comprehensive characterization of all PTMs identified in originator;
    for mAbs: N-glycosylation microheterogeneity mapping, terminal galactose/sialylation, pyroglutamate formation if applicable),
    (4) Higher-order structure (circular dichroism for secondary structure, thermal stability, size exclusion chromatography
    for aggregation, native PAGE for quaternary structure), (5) Purity and impurities (host cell proteins by ELISA and orthogonal
    methods, process-related impurities, product-related impurities like aggregates, fragments, oxidized variants quantified
    via HPLC, LC-MS, or capillary electrophoresis), (6) Functional activity (cell-based assays demonstrating biological mechanism,
    binding kinetics, receptor engagement), (7) Stability (long-term, intermediate, accelerated conditions with photo-stability;
    data supporting proposed shelf-life). EMA implementation was more prescriptive than FDA on PTM characterization, particularly
    glycosylation. This guideline became standard for all mAb biosimilar CMC submissions to EMA.

    '
