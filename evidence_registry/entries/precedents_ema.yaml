    (2) Quantitative impurity profiling via orthogonal methods (e.g., mass spec for host cell protein identification; FDA
    accepted single ELISA results more readily), (3) Longer stability data supporting shelf-life claims (EMA required ~80%
    of proposed shelf-life data before approval; FDA accepted ~50%), (4) Cell-based functional assays for Fc-receptor-mediated
    mechanisms (EMA emphasized ADCC/CDC in primary cells; FDA accepted recombinant Fc-receptor binding assays). Key regulatory
    insight: EMA approved fewer biosimilars in first-to-file situations compared to FDA, often due to CMC gaps identified
    during EMA review that were waived or not identified by FDA. On approved products, EMA dossiers contained more comprehensive
    CMC data. This difference reflected EMA''s philosophy of comprehensive pre-approval characterization vs. FDA''s risk-based
