- id: EMA-010
  type: precedent
  source: 'EMA EPAR: Zirabev (bevacizumab biosimilar)'
  title: VEGF-targeting mAb biosimilar—CMC for oncology anti-angiogenic protein
  content: 'Zirabev (bevacizumab biosimilar), approved February 2019 in EU, represented CMC approach for anti-VEGF mAb biosimilar.
    Bevacizumab is a humanized mAb (93% human, 7% murine variable regions) targeting VEGF-A with anti-angiogenic mechanism
    in oncology. CMC assessment: amino acid sequencing and identity (confirming murine CDRs and human framework), primary
    structure (reduced/non-reduced peptide mapping, disulfide mapping), post-translational modifications (N-glycosylation
    profile, extent of fucosylation, sialylation). Host cell protein clearance (mammalian CHO-derived) critical for parenteral
    oncology dosing. Stability: long-term at 2-8°C, intermediate conditions, freeze-thaw to support IV administration schedule.
    Functional assays: VEGF-A binding (ELISA, kinetics), Fc-receptor engagement (FcγR variants), CDC and ADCC potential in
    endothelial cell models. EMA''s assessment accepted analytical differences in minor glycoforms given equivalent VEGF-binding
    and functional activity.

    '
