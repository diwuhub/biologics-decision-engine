- id: EMA-012
  type: precedent
  source: 'EMA EPAR: Kanjinti (trastuzumab biosimilar)'
  title: Second HER2 mAb biosimilar—CMC established with comparative oncology focus
  content: 'Kanjinti (trastuzumab, Amgen ABP 980), approved November 2018 in EU as second trastuzumab biosimilar. CMC dossier:
    primary structure identity (peptide mapping, disulfide mapping), post-translational modifications (N-glycosylation profiling
    via HILIC, terminal galactose, sialylation extent). Impurity profile (host cell proteins, DNA, endotoxin) assessed via
    mammalian CHO-derived manufacturing. Stability studies (long-term 2-8°C, intermediate, freeze-thaw) to support oncology
    clinical use. Functional assays: HER2 binding (ELISA, surface plasmon resonance, flow cytometry on HER2+ cells), Fc-receptor
    engagement (FcγRI, FcγRII, FcγRIII), ADCC in breast cancer cell lines, CDC potential. EMA assessment approved despite
    documented minor differences in glycosylation profiles between Kanjinti and Herzuma, relying on functional equivalence
    and comparative clinical PK/efficacy data. This approval reinforced EMA''s position that CMC variation within functional
    bounds is acceptable for mAb biosimilars.

    '
