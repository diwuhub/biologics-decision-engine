- id: EMA-016
  type: precedent
  source: 'EMA EPAR: Nucala (mepolizumab, anti-IL-5)'
  title: Humanized mAb targeting IL-5—CMC for recombinant TNF-superfamily target
  content: 'Nucala (mepolizumab), EMA approved March 2015, exemplified CMC assessment for anti-IL-5 humanized mAb for eosinophilic
    asthma. Mepolizumab is humanized antibody (10-15% murine CDRs) targeting IL-5 cytokine. CMC dossier: amino acid identity,
    primary structure (peptide mapping confirming murine CDRs in human framework), disulfide analysis. Post-translational
    modifications: N-glycosylation profiling (single N-glycan in Fc region), minimal complex PTMs due to mammalian CHO expression.
    Impurity characterization: host cell proteins, DNA, endotoxin, leached Protein A. Functional assays: IL-5 binding (ELISA,
    kinetics), IL-5 neutralization in human eosinophil activation (primary cell assay), Fc-receptor binding. EMA assessment
    concluded that comprehensive analytical characterization and functional equivalence supported safety/efficacy. SC formulation:
    vials and auto-injector pen formulations with stability data.

    '
