- id: EMA-017
  type: precedent
  source: 'EMA Type II Variation: Major manufacturing process change assessment (2017-2019)'
  title: EMA CMC policy on significant process modifications—validation and comparability expectations
  content: 'EMA Type II Variations for major manufacturing process changes (approved 2017-2019 period) established precedent
    for CMC re-assessment. Representative cases: bioreactor capacity increase (viral clearance revalidation required), purification
    method changes (e.g., switch from Protein A to alternative, full revalidation of clearance; impurity profile mapping),
    fill-finish facility transition (container closure interaction studies, extractables/leachables). EMA''s CMC policy required:
    (1) comprehensive comparability study with side-by-side analytical comparison (protein characterization, impurity profiles,
    stability), (2) functional assays if process changes could impact PTM profiles or purity, (3) animal toxicology re-dosing
    in some cases (if process changes suspected to introduce new impurities). Key regulatory finding: EMA did not grant full
    equivalence to existing IQ/OQ/PQ data; new process required full analytical validation plus comparative functional studies.
    This contrasted with FDA approach allowing some bridging studies; EMA took more conservative stance on process changes
    for marketed biologics.

    '
