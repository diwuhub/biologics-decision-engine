- id: EMA-019
  type: precedent
  source: 'EMA Case Study: Additional Quality Data Required (Biologics, 2016-2018)'
  title: EMA precedent—when CMC dossier judged incomplete and additional quality data requested
  content: 'EMA CHMP assessment reports (2016-2018) identified cases where initial CMC dossiers were deemed insufficient and
    additional quality data was formally requested during Review phases. Representative issues: (1) Incomplete post-translational
    modification characterization (e.g., mAbs with only single N-glycan site, but N-glycans not fully mapped to microheterogeneity;
