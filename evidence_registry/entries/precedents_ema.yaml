- id: EMA-006
  type: precedent
  source: 'EMA EPAR: Amgevita (adalimumab, ABP 501)'
  title: Fully human TNF-inhibitor mAb biosimilar—CMC for subcutaneous formulation
  content: 'Amgevita (adalimumab ABP 501), approved October 2017, exemplified EMA''s CMC approach for fully human mAb in SC
    formulation. Adalimumab is entirely human sequence (no mouse constant regions), reducing potential immunogenicity but
    requiring rigorous CMC characterization. CMC dossier: amino acid sequencing and identity, primary structure integrity
    (reduced/non-reduced peptide mapping), post-translational modifications (N-glycosylation profile via HILIC, N-terminal
    pyroglutamate conversion). Host cell protein clearance critical for SC dosing. Formulation/stability: extensive photo-stability,
    freeze-thaw, and long-term stability in SC injection pen to support 2-year shelf-life. Functional assays: TNF-alpha binding
    kinetics, human Fc-receptor engagement, ADCC in primary immune cells. EMA assessment accepted minor analytical differences
    in glycosylation and post-translational modifications supported by functional equivalence and comparative clinical PK.

    '
