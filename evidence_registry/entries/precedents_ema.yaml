- id: EMA-024
  type: precedent
  source: 'EMA Type II Variation: Viral Safety Assessment in CMC (2018-2019)'
  title: Regulatory precedent—viral clearance re-assessment for process changes and new sourcing
  content: 'EMA Type II Variations for biologics manufacturing (2018-2019) established CMC precedent for viral safety re-assessment.
    Representative cases: (1) Change in upstream bioreactor vendor/scale (required new viral clearance study validation; EMA
    required use of FDA-recommended viral models: VSV, MVM, HAV), (2) Changes to downstream purification (e.g., switching
    from Protein A to alternative affinity resin, or adding new polishing step; required revalidation of viral log-reduction
    factors for existing and new steps), (3) Transition to new cell line master bank source (required serology testing and
    adventitious agent testing on new master bank; new viral clearance if fermentation process parameters changed), (4) Use
    of new excipient or raw material sourcing (required TSE/BSE risk assessment and, if animal-derived, adventitious agent
    testing). EMA''s CMC assessment philosophy: viral safety is non-negotiable; any process change potentially affecting viral
    clearance required full revalidation with fresh viral studies. This was more stringent than FDA''s approach, which sometimes
    allowed bridging or modeling.

    '
