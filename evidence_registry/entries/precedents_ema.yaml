- id: EMA-011
  type: precedent
  source: 'EMA EPAR: Mvasi (bevacizumab biosimilar, Amgen)'
  title: Parallel bevacizumab biosimilar—CMC comparability in oncology context
  content: 'Mvasi (bevacizumab, Amgen ABP 215), approved November 2018 in EU as second anti-VEGF mAb biosimilar. CMC dossier
    paralleled Zirabev assessment: primary structure confirmation, post-translational modification profiling (glycosylation
    analysis, sialylation), impurity characterization (host cell proteins, DNA), stability across storage conditions. Functional
    assays: VEGF-A binding affinity and kinetics (SPR, ELISA), human Fc-receptor binding profile, complement-dependent cytotoxicity
    (CDC) in serum, antibody-dependent cellular cytotoxicity (ADCC) in primary immune effector cells. EMA''s CMC assessment
    established that acceptable analytical variation in glycoforms was supported by functional equivalence. Key regulatory
    finding: two independent bevacizumab biosimilars with different CMC profiles (Zirabev vs. Mvasi) both approved, demonstrating
    EMA flexibility in accepting quality variation within functional comparability.

    '
