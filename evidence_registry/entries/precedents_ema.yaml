- id: EMA-015
  type: precedent
  source: 'EMA EPAR: Ocrevus (ocrelizumab, anti-CD20)'
  title: Humanized anti-CD20 mAb—CMC with immunoglobulin subclass engineering (IgG1)
  content: 'Ocrevus (ocrelizumab), EMA approved December 2015, established CMC precedent for engineered anti-CD20 mAb with
    modified IgG1 constant region. Ocrelizumab contains chimerized variable domains from chimeric anti-CD20 mAb but with engineered
    IgG1 Fc to reduce fucosylation and enhance ADCC. CMC dossier: amino acid sequencing confirming engineered Fc (L234F/L235E
    mutations), peptide mapping, primary structure integrity. Post-translational modifications: N-glycosylation profile with
    specific focus on fucosylation status (engineered for reduced fucose content to maximize ADCC potency). Manufacturing:
    mammalian expression (engineered CHO line). Functional assays: CD20 binding on B lymphocytes (flow cytometry), Fc-receptor
    engagement with engineered variant effects on FcγRIII, ADCC in primary cell assays (enhanced due to reduced fucosylation),
    CDC in serum. EMA assessment required validation of engineered glycosylation pattern (afucosylation) and corresponding
    functional enhancement. Stability data supported IV infusion formulation.

    '
