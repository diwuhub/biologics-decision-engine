- id: EMA-008
  type: precedent
  source: 'EMA EPAR: Zarzio (filgrastim biosimilar)'
  title: Early EMA biosimilar approval—CMC for recombinant hematopoietic growth factor (2009)
  content: 'Zarzio (filgrastim biosimilar), approved September 2006 (updated 2009), was one of the earliest EMA biosimilar
    approvals and established foundational CMC precedents. Filgrastim is a 175-amino acid recombinant G-CSF produced in E.
    coli. CMC assessment included: amino acid sequencing and identity (peptide mapping), post-translational modifications
    (N-glycosylation limited in bacterial expression; focus on correct disulfide bonding), impurity profiling (host cell proteins,
    E. coli-derived, endotoxin levels). Functional assays: G-CSF receptor binding, myeloid progenitor proliferation in primary
    cell cultures, in vivo hematopoietic activity in animal models. EMA''s CMC approach reflected early biosimilar standards:
    comprehensive analytical characterization but limited post-translational modification complexity compared to mammalian-expressed
    proteins. Process: bacterial fermentation with purification validation.

    '
