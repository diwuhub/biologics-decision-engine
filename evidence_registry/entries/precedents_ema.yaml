- id: EMA-009
  type: precedent
  source: 'EMA EPAR: Retacrit (epoetin zeta, biosimilar)'
  title: Erythropoietin biosimilar—CMC for mammalian glycoprotein with hematopoietic activity (2007)
  content: 'Retacrit (epoetin zeta), approved July 2007, was an early EMA biosimilar for erythropoietin (EPO). CMC dossier
    focused on comparability of mammalian expression-derived recombinant EPO (CHO-derived, similar to Eprex). Assessment included:
    primary structure identity (peptide mapping, intact mass spec confirming 165 amino acids), post-translational modifications
    (N- and O-linked glycosylation profiling, critical for EPO biological activity and pharmacokinetics), carbohydrate analysis
    (neutral sugars, sialic acids). Impurity profiling: host cell proteins, DNA, endotoxin, bioburden. Functional assays:
    EPO receptor binding (ELISA, cell-based), erythroid progenitor proliferation and differentiation in primary human bone
    marrow cultures, in vivo reticulocyte response in animal models. EMA''s CMC conclusion: glycosylation profile acceptable
    despite minor differences, supported by equivalent functional activity. This approval set precedent for glycoprotein biosimilar
    CMC standards.

    '
