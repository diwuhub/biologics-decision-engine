- id: EMA-002
  type: precedent
  source: 'EMA EPAR: Benepali (etanercept, SB4)'
  title: Fc-fusion protein biosimilar—analytical comparability of multi-domain therapeutic
  content: 'Benepali (etanercept SB4), approved October 2016, established EMA precedent for Fc-fusion biosimilar comparability.
    Etanercept is a dimeric TNF receptor p75/Fc fusion requiring correct disulfide bonding and Fc-mediated effector functions.
    CMC assessment included: amino acid sequencing (identity confirmation), multi-dimensional protein characterization (2D
    gel, mass spec for N/C-terminal variants), higher-order structure (circular dichroism, thermal stability), post-translational
    modifications (N-glycosylation profile by mass spec, sialylation analysis). Functional assays: TNF-alpha binding (ELISA,
    SPR), Fc-receptor binding (FcγRI, FcγIII), complement activation, ADCC potential. EMA assessment concluded analytical
    differences in minor variants (e.g., slight N-glycosylation profile variation) were acceptable given functional equivalence.
    Key CMC finding: EMA accepted structural heterogeneity if biological function was equivalent.

    '
