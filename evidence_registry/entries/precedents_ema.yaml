- id: EMA-022
  type: precedent
  source: 'EMA CHMP Assessment Report: Post-translational modification variability acceptance limits (2017)'
  title: Regulatory precedent—EMA's acceptable ranges for mAb glycosylation and charge variants
  content: 'EMA CHMP Assessment Reports for approved mAb biosimilars (2017-2019) established de facto acceptance criteria
    for analytical variability in post-translational modifications. Documented acceptance ranges: (1) N-glycosylation: ±10-15%
    deviation in major glycoforms (G0/G1/G2 profiles) relative to reference was acceptable if functional data supported equivalence,
    (2) Fucosylation: ±5% absolute difference in afucosylated species acceptable, provided ADCC potency equivalent, (3) Sialylation:
    ±5-10% variation in sialylated glycoforms acceptable, (4) Charge variants (pI-focused isoelectric focusing): ±5-10% shift
    in acidic/basic variant ratios acceptable if process-controlled and function preserved. (5) Oxidized methionine variants:
    up to 5% oxidation acceptable; beyond 5% required investigation. These ranges were not formally published but inferred
    from approved dossiers and summary reports. Key precedent: EMA''s position was that analytical variation within these
    ranges, supported by functional and/or clinical data, did not require application refusal.

