- id: EMA-014
  type: precedent
  source: 'EMA EPAR: Dupilumab (dupilumab IL-4Rα antagonist)'
  title: Fully human mAb targeting IL-4 receptor—CMC for inflammatory indication
  content: 'Dupilumab, EMA approved September 2017, was fully human mAb targeting IL-4 receptor alpha with applications in
    atopic dermatitis and asthma. CMC dossier: primary structure identity (all-human sequence, E1 framework from human VH
    library), post-translational modifications (N-glycosylation profiling, minimal modifications in fully human context),
    disulfide bonding (four inter-chain disulfides for IgG1 scaffold). Manufacturing: mammalian CHO expression. Impurity profiling:
    host cell proteins, DNA, endotoxin, leached protein A. Functional assays: IL-4Rα binding (ELISA, kinetics), IL-13 signaling
    inhibition in primary human keratinocytes and immune cells, Fc-receptor binding (human FcγRI, FcγIIb, FcγIII). EMA''s
    CMC assessment established that fully human sequence and appropriate glycosylation supported a comprehensive quality dossier.
    Formulation/stability: aqueous SC injection formulation with extended shelf-life studies.

    '
