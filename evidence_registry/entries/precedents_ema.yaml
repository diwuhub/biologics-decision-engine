    stability packages (18-24 month data before approval vs. FDA''s acceptance of 12-month data), (4) Comprehensive functional
    assay batteries (multiple Fc-receptor assays, ADCC in diverse primary cell types). EMA approval timelines were longer
    (typically 12-15 months vs. FDA 6-9 months), reflecting more intensive CMC scrutiny upfront rather than post-approval
