- id: EMA-005
  type: precedent
  source: 'EMA EPAR: Herzuma (trastuzumab, CT-P6)'
  title: HER2-targeting mAb biosimilar—CMC for oncology indication with emphasis on stability
  content: 'Herzuma (trastuzumab CT-P6), approved September 2018, demonstrated EMA''s CMC expectations for oncology biosimilar.
    HER2-targeting mechanism requires both binding affinity and Fc-mediated immune function. CMC dossier: primary structure
    identity (peptide mapping, intact mass spec), post-translational modifications (N-glycosylation profile, oxidation assessment),
    host cell protein clearance (ELISA, mass spec), process-related impurities. Extended stability studies (12-36 months)
    at 2-8°C in original commercial formulation to ensure oncology patient safety margins. Functional assays: HER2 binding
    (ELISA, kinetics), HER2+ cell line proliferation inhibition, Fc-receptor engagement, ADCC in breast cancer cell lines.
    EMA required head-to-head comparative stability data due to oncology criticality. CMC assessment supported interchangeability
    claim based on comprehensive quality equivalence.

    '
