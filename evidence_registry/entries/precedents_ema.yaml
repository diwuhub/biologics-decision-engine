    biological activity confirmation in relevant cell system). Resolution typically involved applicant submitting additional
    analytical studies (extended characterization) and/or reducing proposed shelf-life claims. CMC was rarely a reason for
    complete Negative CHMP Opinion, but Quality Deficiencies triggered regulatory delays and re-assessments.

