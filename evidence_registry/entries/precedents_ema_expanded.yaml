- id: EMA-EXP-016
  type: precedent
  source: EMA Type II Variation - Manufacturing Site Transfer (Rituximab Example)
  title: Manufacturing Site Transfer - Comparability Study Requirements and Duration
  content: 'EMA precedent documenting rituximab manufacturing site transfer from original facility to new contract manufacturing
    organization (CMO) location. Comparability package included: (1) process analytical characterization at both sites with
    side-by-side comparison of 3 batches each; (2) quality attributes tested: charge variants (IEX-HPLC), isoforms (RP-HPLC),
    N-glycosylation profile (MALDI-TOF), aggregates (SEC-HPLC), potency (cell proliferation assay on B lymphoma cells), binding
    affinity (ELISA, SPR); (3) statistical equivalence testing per ICH Q6A guidelines with acceptance criteria ±5-10% depending
    on attribute criticality; (4) process validation at new site with 3 consecutive commercial batches; (5) stability protocol
    initiated with new site material alongside historical reference data (minimum 12-month real-time data required before
    approval); (6) technical visits by QA to new facility documenting environmental monitoring, equipment qualification, staff
    training. Approval granted after 18-24 month timeline for complete comparability and stability demonstration. Post-approval,
    enhanced QA oversight of new site for first year.

    '
