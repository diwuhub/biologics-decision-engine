- id: EMA-EXP-002
  type: precedent
  source: 'EMA EPAR: Hyrimoz (adalimumab biosimilar)'
  title: Adalimumab Biosimilar - Analytical Method Validation and Similarity Margin Setting
  content: 'Hyrimoz EPAR documents adalimumab biosimilar analytical program with emphasis on similarity margin justification.
    Gel permeation chromatography (size exclusion), reversed-phase HPLC for aggregate assessment, and capillary isoelectric
    focusing for charge variant distribution. Margin setting for charge variants established at ±5% relative to reference
    standard. Structural heterogeneity assessment identified N-terminal pyroglutamate variant at 85-95% (consistent with reference).
    Disulfide bond mapping via mass spectrometry confirmed intact structure. Process robustness testing evaluated impact of
    critical parameters (temperature ±2°C, pH ±0.2) on product quality.

    '
