- id: EMA-EXP-005
  type: precedent
  source: 'EMA EPAR: Pelgraz (pegfilgrastim biosimilar)'
  title: Pegylated Biosimilar - Conjugation Integrity and Pegylation Distribution
  content: 'Pelgraz EPAR demonstrates pegfilgrastim biosimilar with detailed pegylation characterization. Pegylated filgrastim
    structure confirmed via SEC-MALLS (size-exclusion chromatography with multi-angle light scattering). Pegylation efficiency
    quantified at 90-100% monopegylation. Charge heterogeneity from different pegylation sites (lysine residues) assessed
    via ion-exchange chromatography. Molecular weight distribution narrow range ±5% vs reference. Biological activity (G-CSF
    receptor binding) preserved post-pegylation; cell proliferation assay showed EC50 within reference range. Process scale-up
    from 2L to 50L bioreactor demonstrated comparable pegylation profiles. Extractables from vial stoppers qualified as low-risk
    with migration studies per USP <383>. Lyophilization cycle optimization documented via Raman spectroscopy freeze-dry microscopy.

    '
