- id: EMA-EXP-012
  type: precedent
  source: 'EMA EPAR: Zolgensma (onasemnogene abeparvovec, EU approval)'
  title: Gene Therapy - Vector Potency and Biodistribution Assessment
  content: 'Zolgensma EPAR covers AAV9-based gene therapy for spinal muscular atrophy with focus on vector characterization.
    Physical titer (DNase-resistant particles) measured via droplet digital PCR or quantitative reverse transcription PCR.
    Full/empty capsid ratio assessed via analytical ultracentrifugation or size-exclusion chromatography. Genetic identity
    confirmed via PCR spanning complete transgene (SMN1 cDNA plus regulatory elements). Transgene expression potency demonstrated
    via transfection into HEK293 cells with quantification of SMN protein via western blot or ELISA. Endotoxin levels per
    USP <85> with limit ≤175 EU/dose. Residual host cell DNA quantification via qPCR (<10 pg total DNA per dose). Biodistribution
    studies in animal models (non-human primates) documented organ-to-liver ratio and durability of transgene expression.
    Comparability data for manufacturing changes (cell line, culture conditions) emphasized impact on full/empty ratio and
    potency. Manufacturing process includes recombinant AAV9 production in mammalian cells with buffer exchange for formulation
    at -20°C.

    '
