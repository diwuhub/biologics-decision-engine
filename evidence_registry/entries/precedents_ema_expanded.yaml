entries:
- id: EMA-EXP-001
  type: precedent
  source: 'EMA EPAR: Hulio (adalimumab biosimilar)'
  title: Adalimumab Biosimilar - Analytical Similarity in Protein Characterization
  content: 'Hulio EPAR demonstrates comprehensive analytical characterization of adalimumab biosimilar including: Primary
    structure analysis (amino acid sequencing), higher-order structure determination via 2D-NMR, thermal stability assessment,
    and isoform profiling. Quality-by-Design approach applied to drug substance manufacturing with 12 parameter control strategy.
    Charge variants, hydrophobic interaction chromatography, and reduced/non-reduced peptide mapping all showed acceptable
    similarity to Humira reference. Container closure system qualification included extractables/leachables testing. Process
    validation across three batches demonstrated consistent potency (≥95% relative to reference).

    '
  applicable_categories:
