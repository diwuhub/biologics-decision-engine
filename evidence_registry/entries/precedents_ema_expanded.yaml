  title: Potency Assay Replacement - Method Validation and Cross-Validation Requirements
  content: 'EMA precedent for potency assay replacement in TNF-inhibitor production (transition from older TNF cell killing
    assay with L929 fibroblasts to newer recombinant human TNF receptor (TNFR) ELISA-based competitive binding assay). Comparability
    package included: (1) Old method: L929 cell cytotoxicity with TNF/cycloheximide, readout trypan blue exclusion, reference
    standard calibrated to WHO standard (units: IU/mL); (2) New method: sandwich ELISA with capture anti-TNF mAb, detection
    TNFR-HRP, reference standard harmonized to WHO IU/mL; (3) Validation per ICH Q2(R2): accuracy (80-120% recovery), precision
    (RSD <10% intra-assay, <15% inter-assay), linearity (R² >0.99 across 0.5-2× working range), range, robustness (pH, temperature
    ±2°C); (4) Cross-validation: minimum 10 product batches (clinical + commercial) tested in parallel with both methods;
    statistical comparison using Bland-Altman plot and regression analysis; acceptance criteria: new method results within
    ±20% of old method mean; (5) Reference standard change: USP standard for new method calibrated against WHO reference preparation
    (BTG-11/136); (6) Impact assessment: re-testing of full product stability data (all time points) with new method, ensuring
    release specifications remain scientifically justified; (7) Updated analytical procedure documentation in Module 3 of
    CTD with suitability study results. Type II Variation approved with commitment to parallel testing of 5 additional commercial
    batches (post-approval) to provide further confidence.

