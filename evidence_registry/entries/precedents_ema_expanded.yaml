- id: EMA-EXP-010
  type: precedent
  source: 'EMA EPAR: Yuflyma (adalimumab biosimilar, high concentration)'
  title: High-Concentration Adalimumab Formulation - Viscosity Management and Excipient Role
  content: 'Yuflyma EPAR demonstrates adalimumab biosimilar developed at high concentration (100 mg/0.7 mL vs 40 mg/0.8 mL
    for Humira Pen). Physicochemical characterization included viscosity measurement at 25°C showing 8-12 cP range (comparable
    to reference despite concentration difference achieved via excipient optimization). Osmolality measured 290-310 mOsm/kg
    (isotonic range maintained). Protein aggregation studies via size-exclusion HPLC showed <1% high molecular weight species
    at concentration. Forced degradation studies (pH 2-10, oxidation, light) characterized degradation products and confirmed
    identity of major peak >99%. Formulation stability at 25°C/60% RH and 5°C for 36 months. Device (PenPak) injection force
    testing across temperature range (-20°C to 40°C) with clogging risk assessment. Manufacturing of bulk drug substance at
    same scale/process as lower concentration version; final formulation fill-finish process qualified with particulate matter
    testing per USP <788>. User experience testing on injection acceptability documented in section 2.3 of EPAR.

    '
