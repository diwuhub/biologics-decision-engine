- id: EMA-EXP-003
  type: precedent
  source: 'EMA EPAR: Ruxience (rituximab biosimilar)'
  title: CD20 Biosimilar - Glycosylation Profile and Fc Function Characterization
  content: 'Ruxience EPAR (2020 approval) demonstrates comprehensive rituximab biosimilar quality data including glycosylation
    analysis via MALDI-TOF mass spectrometry. Complex-type biantennary N-glycans with heterogeneity in fucosylation (88-95%)
    and galactosylation profiles characterized. Core-fucosylated and afucosylated species quantified with acceptance criteria
    ±5% vs reference. Fc effector function assessed via ADCC (antibody-dependent cellular cytotoxicity) assay showing comparable
    potency. Binding to FcγRIIIa receptor confirmed via surface plasmon resonance. Process validation included control of
    cell culture conditions (pH, dissolved oxygen, temperature) with statistical design of experiments. Manufacturing facility
    assessment per ICH Q3A impurity classification strategy.

    '
