- id: EMA-EXP-018
  type: precedent
  source: EMA Type II Variation - Formulation Change (IV to SC, Bevacizumab Example)
  title: Route of Administration Change - Formulation Development and Stability Impact
  content: 'EMA precedent for bevacizumab formulation change from intravenous (IV) infusion concentrate (5 mg/mL in vial)
    to subcutaneous (SC) injection (120 mg/0.8 mL prefilled syringe). Comparability package included: (1) drug substance identical
    (no API changes); (2) excipient changes: addition of polysorbate 80 (0.04% w/v) to increase protein stability in smaller
    volume, reduction in sodium phosphate buffer concentration to maintain osmolality appropriate for SC injection (280-300
    mOsm/kg); (3) physicochemical testing: viscosity at 25°C (4-6 cP for SC formulation vs 1-2 cP for IV); osmolality; pH
    (6.2-6.6); optical density (light scattering <0.3 at 350 nm); (4) stability studies in new formulation: real-time at 2-8°C
    for 24 months and 25°C/60% RH for 12 months with testing every 3 months (potency, purity, aggregates, subvisible/visible
    particulates per USP <788>); (5) immunogenicity risk assessment: injection site reaction potential via repeat-dose local
    tolerance study in rabbits (histopathology, clinical signs); (6) extractables from prefilled syringe elastomer and glass
    per ISO 11193; (7) bioavailability bridging via PK study in patients receiving SC formulation vs historical IV infusion
    data. Type II Variation approved with 6-month real-time stability data and ongoing commitment to complete 24-month stability
    studies.

    '
