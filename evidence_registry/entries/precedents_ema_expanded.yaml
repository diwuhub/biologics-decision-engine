- id: EMA-EXP-009
  type: precedent
  source: 'EMA EPAR: Nepexto (etanercept biosimilar)'
  title: Fc-Fusion Biosimilar - TNF Binding and Receptor Complex Formation
  content: 'Nepexto EPAR covers etanercept (TNFR-Fc fusion) biosimilar with detailed fusion protein characterization. TNF-α
    binding affinity via surface plasmon resonance demonstrated KD within ±25% of Enbrel reference. Soluble TNF receptor (sTNFR)
    domain integrity confirmed via peptide mapping (reduced/non-reduced). Disulfide bond mapping via mass spectrometry identified
    18 disulfide bridges (expected for Fc-fusion protein). N-glycosylation at two sites (sTNFR and Fc) characterized via MALDI-TOF
    with comparability margins ±5% for fucosylation content (87-93%). Fc-mediated effector functions (ADCC via NK cell assay,
    ADCP via monocyte assay) demonstrated with activity ratios 0.80-1.25 vs reference. TNF neutralization bioassay using luciferase-reporter
    cells confirmed equivalent potency (IC50 ratios 0.85-1.20). Oxidation stress testing at 30°C/75% RH showed comparable
    degradation profile including methionine oxidation quantification.

    '
