- id: EMA-EXP-015
  type: precedent
  source: 'EMA EPAR: Hemlibra (emicizumab, bispecific antibody)'
  title: Bispecific Antibody Manufacturing - Novel Format Control Strategy
  content: 'Hemlibra EPAR covers emicizumab, a bispecific antibody bridging Factor IX and Factor X with dual variable domain
    (DVD-Ig) format. Quaternary structure confirmed via reduced/non-reduced peptide mapping and size-exclusion chromatography.
    Two disulfide-linked heavy chains (CH1 domains) and associated light chains verified via mass spectrometry and capillary
    electrophoresis. N-glycosylation at two sites (Fc region, each heavy chain) characterized via MALDI-TOF with core fucosylation
    85-95% (critical for Fc effector function but not desired here for safety; low ADCC target). Bispecific binding confirmed
    via sandwich ELISA: plate-coated FIXa, detection with FX fluorescent tracer, with inhibition by bispecific antibody showing
    EC50 within reference range. Functional assay based on Factor X activation (chromogenic substrate assay) in presence of
    Factor IXa and emicizumab vs reference standard. Manufacturing process control strategy emphasized: (1) cell culture parameters
    (pH, DO, glucose), (2) purification robustness (affinity capture, ion-exchange, hydrophobic interaction), (3) viral clearance
    validation (low pH hold 2 hr, terminal sterilization filter). Stability at 2-8°C for 36 months. Device (prefilled syringe)
    compatibility with formulation.

    '
