- id: EMA-EXP-013
  type: precedent
  source: 'EMA EPAR: Comirnaty (BNT162b2 mRNA vaccine, EU approval)'
  title: mRNA Vaccine - Potency Assay and Large-Scale Manufacturing Comparability
  content: 'Comirnaty EPAR documents mRNA-lipid nanoparticle vaccine manufacturing at unprecedented scale (billions of doses).
    mRNA identity and purity (cap1 structure, 5''-UTR, coding region, 3''-UTR, poly-A tail) confirmed via HPLC-MS/MS. Full-length
    mRNA quantified via capillary electrophoresis with acceptance ≥88% of theoretical. Bioburden testing per USP <62> with
    limit <100 CFU per 10 mL vial. Potency assay based on in vitro transcription of mRNA template with quantification of Spike
    protein expression via ELISA in transfected HEK293 cells or CHO-K1 cells. Relative potency units assigned based on reference
    standard. Endotoxin levels per USP <85> with limit ≤0.175 EU/dose. Lipid nanoparticle (LNP) composition characterized
    via HPLC for ionizable lipid, phospholipid, cholesterol, PEG-lipid; size distribution via dynamic light scattering with
    Z-average diameter 80-120 nm. Manufacturing scale-up from pilot to commercial (100-fold increase in batch size) required
    extensive comparability data including identical control strategy at each scale. Process analytical technology (PAT) implemented
    for real-time release testing. Stability data at -80°C, -20°C, 2-8°C with defined shelf-life under specific storage.

    '
