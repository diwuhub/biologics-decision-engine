- id: EMA-EXP-004
  type: precedent
  source: 'EMA EPAR: Ontruzant (trastuzumab biosimilar)'
  title: HER2 Biosimilar - Functional Assay Correlation and Potency Demonstration
  content: 'Ontruzant EPAR provides HER2-targeted trastuzumab biosimilar with focus on functional equivalence. Ligand binding
    ELISA demonstrated dose-response concordance with originator (EC50 within 10%). Cell-based proliferation inhibition assay
    on HER2-positive BT-474 cell line showed equivalent anti-tumor activity. Trypan blue exclusion assay confirmed cytostatic
    effect. Fc-mediated functions (ADCC, ADCP) quantified via high-performance reference standards. Stressed stability studies
    (accelerated temperature, light, freeze-thaw) showed comparable degradation patterns. Extractables from vials assessed
    per ISO 11193 standards. Drug substance stability at 5°C for 36 months established shelf-life of 36 months when formulated
    in current container system.

    '
