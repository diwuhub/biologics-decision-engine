- id: EMA-EXP-011
  type: precedent
  source: 'EMA EPAR: Kymriah (tisagenlecleucel, EU approval)'
  title: CAR-T Cell Therapy - Release Specification and Potency Assay Challenges
  content: 'Kymriah EU EPAR documents CAR-T cell therapy manufacturing quality requirements. Product specification includes:
    cell viability (flow cytometry, ≥80%), viable cell count (trypan blue exclusion), CAR-positive T cell percentage (flow
    cytometry, ≥70%), transduction efficiency (lentiviral vector copy number integration). Functional potency assay based
    on CAR-T cells co-cultured with CD19+ target cells with readout of IFN-γ secretion (ELISA) or target cell lysis. Due to
    inherent product variability (cell therapy from individual patient starting material), acceptance criteria established
    as in-process controls (cell viability, transduction rate) rather than tight product-release specifications. Comparability
    approach for manufacturing process changes emphasized process parameter control (culture conditions, lentiviral vector
    titer, transduction efficiency targets) rather than finished product testing. Sterility testing (USP <71>) and mycoplasma
    detection required pre-release. Microbial limits per EP <2.6.12>. Characterization of lentiviral vector shedding and integration
    site distribution documented for safety.

    '
