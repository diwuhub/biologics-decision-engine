- id: EMA-EXP-008
  type: precedent
  source: 'EMA EPAR: Aybintio (bevacizumab biosimilar)'
  title: VEGF Biosimilar - Binding Affinity and Angiogenesis Inhibition Activity
  content: 'Aybintio EPAR (2023 approval) demonstrates bevacizumab biosimilar with comprehensive VEGF-binding and anti-angiogenic
    characterization. Binding affinity to human VEGF-A (full-length and isoforms VEGF165, VEGF121) assessed via ELISA and
    surface plasmon resonance. KD values within ±20% of originator (Avastin). Neutralization of VEGF bioactivity confirmed
    via VEGF-induced proliferation inhibition assay on human endothelial cells (HMVEC). Angiogenesis assay (tube formation
    in matrigel) showed comparable inhibition. Fc-mediated effector functions (ADCC, complement-dependent cytotoxicity) quantified.
    N-glycosylation profile (biantennary, complex-type) analyzed via MALDI-TOF with core fucosylation 88-94% vs reference.
    Stability under stressed conditions (light, oxidation) demonstrated comparable degradation pathways. Manufacturing scale-up
    from 10L to 100L bioreactor with proven equivalence across batches. Risk assessment per ICH Q3B for elemental impurities
    (lead, cadmium, arsenic).

    '
