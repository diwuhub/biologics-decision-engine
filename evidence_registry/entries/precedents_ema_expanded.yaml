- id: EMA-EXP-007
  type: precedent
  source: 'EMA EPAR: Semglee (insulin glargine biosimilar)'
  title: Insulin Biosimilar - Isoform Consistency and Metabolic Equivalence
  content: 'Semglee EPAR demonstrates insulin glargine biosimilar with focus on isoform purity and metabolic activity. Intact
    mass spectrometry confirmed M+21 molecular weight (21-insulin with A21Gly substitution). Isoform analysis via RP-HPLC
    (reverse-phase) quantified deamidated and isomerized variants. Acceptance criteria for main component ≥95% with aspartyl
    isomerization ≤3% and asparagine deamidation ≤2% vs reference standard. Insulin monomer/dimer/hexamer distribution assessed
    via size-exclusion chromatography; hexamer content 85-98% (physiologically relevant for long-acting activity). Receptor
    binding affinity (human insulin receptor IR-A and IR-B) demonstrated via surface plasmon resonance with KD values comparable
    to originator. In vitro potency (3T3-L1 adipocyte glucose uptake assay) confirmed equivalent biological activity. Container
    closure (FlexPen device) compatibility testing included injection force measurement across temperature range.

    '
