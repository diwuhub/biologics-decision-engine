- id: EMA-EXP-006
  type: precedent
  source: 'EMA EPAR: Terrosa (teriparatide biosimilar)'
  title: Peptide Biosimilar - Amino Acid Sequencing and Structure Integrity
  content: 'Terrosa EPAR covers teriparatide (PTH 1-34) peptide biosimilar with comprehensive characterization. Amino acid
    sequencing via Edman degradation confirmed 34-residue sequence identity with originator. Molecular weight determination
    via low-resolution mass spectrometry ±0.1 kDa of theoretical value. Secondary structure assessment via circular dichroism
    spectroscopy showed comparable helical content. Peptide identity confirmed via HPLC-MS/MS fragmentation mapping. Impurity
    control: acetylated N-terminus quantified at 92-98% (consistent with reference standard). Amino acid composition analysis
    via HPLC post-hydrolysis verified stoichiometry. Biological potency demonstrated via human PTH1R (PTH receptor) cell-based
    assay with IP1 accumulation readout. Formulation stability at 25°C/60% RH and 5°C showed comparable degradation kinetics
    vs reference over 24 months.

    '
