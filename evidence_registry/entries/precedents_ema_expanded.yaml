- id: EMA-EXP-014
  type: precedent
  source: 'EMA EPAR: Spikevax (mRNA-1273 mRNA vaccine, EU approval)'
  title: mRNA Platform Quality - Manufacturing Process Consistency Across Multiple Variants
  content: 'Spikevax EPAR demonstrates mRNA vaccine platform approach for multiple COVID-19 variants using manufacturing process
    consistency as primary comparability strategy. mRNA identity (cap1 structure, 5''- and 3''-UTR sequences, poly-A tail
    length 70-100 nucleotides) confirmed via capillary gel electrophoresis and HPLC-MS/MS. Full-length mRNA percentage ≥80%
    (higher than Comirnaty). Potency normalized to reference standard via in vitro transcription assay and immunogenicity
    (Spike protein ELISA on transfected HEK293). Single-stranded RNA (ssRNA) impurities quantified via capillary electrophoresis
    at <2% (potential immunogenic contaminant). Lipid nanoparticle characterization (composition, size distribution) identical
    methodology to Comirnaty. Endotoxin limits per USP <85>. For manufacturing changes or variant transitions, comparability
    demonstrated via: (1) identical process parameters across variants, (2) potency assay equivalence, (3) in vivo immunogenicity
    bridging study in mouse model showing equivalent antibody titer and T-cell responses. Stability at -20°C/2-8°C for 30
    months. Extractables from glass vial/stopper system assessed.

    '
