- id: EMA-EXP-017
  type: precedent
  source: EMA Type II Variation - Bioreactor Scale-Up (Adalimumab Example)
  title: Process Scale-Up - Clinical to Commercial Scale Comparability Data
  content: 'EMA precedent for adalimumab manufacturing scale-up from Phase III clinical batches (2-5 L bioreactor) to commercial
    scale (100-200 L bioreactor). Comparability strategy focused on: (1) identical process steps at each scale (inoculum preparation,
    fed-batch culture parameters, harvest, downstream purification); (2) critical process parameters controlled identically:
    cell density at inoculation (1-2 × 10^6 cells/mL), culture pH (6.8-7.2), dissolved oxygen (30-40% saturation), temperature
    (37°C ±0.5°C); (3) quality attribute comparison via pooled in-process samples from 3 batches at each scale: potency assay
    (TNF neutralization), purity (charge variants, aggregates), identity (peptide mapping), stability profiles under stress
    conditions; (4) process parameters correlated to quality attributes via design of experiments (DOE) at pilot scale to
    inform control strategy at commercial scale; (5) head-to-head batch comparison showing statistical equivalence (p-value
    >0.05) for critical attributes between scales; (6) stability data from commercial-scale batches demonstrating shelf-life
    of 36 months with identical storage conditions (2-8°C) as clinical batches. Manufacturing change approved as Type II Variation
    with no clinical trial data required, supported solely by analytical comparability.

    '
