  content: 'EMA precedent for etanercept container closure system change from West vial/rubber stopper (20 mm, Type I borosilicate)
    to Gerresheimer Daikyo vial/hybrid dual-layer stopper (20 mm, Type I borosilicate glass with elastomer layer). Comparability
    package included: (1) glass and elastomer material qualification per USP <383> and ISO 11193 standards; (2) extractables
    study: accelerated extraction at 50°C/water for 24 hours followed by LC-MS/MS analysis identifying extractable species
    (none exceeded ICH Q3C thresholds for concern); (3) leachables study: long-term real-time storage of product in new container
    at 2-8°C and 25°C with quarterly analysis for 6 months searching for container-derived impurities (none detected at reportable
    levels); (4) particulate matter testing per USP <788> showing <6 particles ≥10 µm and <250 particles ≥2 µm (passed USP
    limits); (5) stopper coring assessment via needle penetration testing (minimum 25 punctures, visual inspection for rubber
    fragments); (6) injection force testing for prefilled pen delivery device across temperature range (-20°C to 40°C) with
    mechanical reproducibility per ISO 6891; (7) biocompatibility per ISO 10993 (cytotoxicity, sensitization, irritation)
    for short-term product contact. Type II Variation approved with full 6-month leachables data and commitment to extended
    stability monitoring through shelf-life.

