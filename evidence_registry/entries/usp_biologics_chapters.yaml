- id: USP-1132-002
  type: guideline_clause
  source: USP <1132>
  title: HCP Assay Qualification and Batch Testing
  content: USP <1132> requires assay qualification addressing accuracy (recovery), precision, specificity, and limit of detection.
    Batch testing protocols define sampling frequency and acceptance decisions. Trending supports process control assessment.
  applicable_categories:
  - analytical
