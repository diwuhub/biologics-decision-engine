entries:
- id: USP-1030-001
  type: guideline_clause
  source: USP <1030>
  title: Biological Assay Overview and Objectives
  content: USP <1030> provides guidance on design, validation, and interpretation of biological assays for potency determination.
    Covers assays addressing bioactivity, binding affinity, and functional properties. Appropriate for antibodies, cytokines,
    growth factors, and receptors.
  applicable_categories:
  - analytical
  - potency
  - validation
  confidence: 0.96
  url: https://www.usp.org
  year: 2022
  tags:
  - usp
  - bioassay
  - potency
  - validation
  content_type: paraphrase
  document_status: final
- id: USP-1032-001
  type: guideline_clause
  source: USP <1032>
  title: Bioassay Design Principles and Experimental Design
  content: USP <1032> addresses statistical design of bioassays including reference standard selection, dose-response characterization,
    and assay robustness. Covers parametric (parallel-line, slope-ratio) and non-parametric analysis methods.
  applicable_categories:
  - analytical
  - validation
  - statistics
  confidence: 0.97
  url: https://www.usp.org
  year: 2022
