- id: USP-1058-001
  type: guideline_clause
  source: USP <1058>
  title: Analytical Instrument Qualification - IQ/OQ/PQ Framework
  content: USP <1058> establishes instrument qualification standards. Installation Qualification (IQ) confirms system meets
    design specifications; Operational Qualification (OQ) verifies system operation under normal conditions; Performance Qualification
    (PQ) demonstrates suitability for intended use.
  applicable_categories:
  - analytical
  - validation
  - quality
  confidence: 0.98
  url: https://www.usp.org
  year: 2018
  tags:
  - usp
