  - validation
  content_type: paraphrase
  document_status: final
- id: USP-1058-002
  type: guideline_clause
  source: USP <1058>
  title: Instrument Qualification - Acceptance Criteria and Maintenance
  content: USP <1058> defines acceptance criteria for routine instrument performance testing. Suggests periodic calibration
    intervals and maintenance requirements. Records should demonstrate ongoing suitability and enable trend analysis.
  applicable_categories:
  - analytical
  - validation
  - quality
  confidence: 0.97
