  - troubleshooting
  content_type: paraphrase
  document_status: final
- id: USP-1041-001
  type: guideline_clause
  source: USP <1041>
  title: Biologics General Chapter - Characterization of Monoclonal Antibodies
  content: 'USP <1041> covers analytical characterization of mAbs: identity (ELISA, western blot), isoelectric focusing, SEC-HPLC,
    SDS-PAGE, mass spectrometry, and size exclusion. Addresses higher-order structure and charge variants.'
  applicable_categories:
  - analytical
  - identity
  - physicochemical
  confidence: 0.97
  url: https://www.usp.org
  year: 2020
  tags:
  - usp
