  content_type: paraphrase
  document_status: final
- id: USP-1041-002
  type: guideline_clause
  source: USP <1041>
  title: Biologics - Purity Assessment and Impurity Profiling
  content: USP <1041> covers purity assessment including HPLC, capillary electrophoresis, and mass spectrometry. Addresses
    host cell proteins, DNA, endotoxins, aggregates, and product-related impurities. Methods demonstrate product consistency.
  applicable_categories:
  - analytical
  - purity
  - quality
  confidence: 0.97
  url: https://www.usp.org
  year: 2020
  tags:
