- id: USP-1106-001
  type: guideline_clause
  source: USP <1106>
  title: Immunogenicity Assays - Overview and Applications
  content: 'USP <1106> covers immunogenicity assessment including anti-drug antibody (ADA) detection. Discusses assay design,
    interpretation, and clinical relevance. Addresses assay formats: ELISA, radioimmunoassay, electrochemiluminescence.'
  applicable_categories:
  - analytical
  - safety
  - immunogenicity
  confidence: 0.96
  url: https://www.usp.org
  year: 2022
