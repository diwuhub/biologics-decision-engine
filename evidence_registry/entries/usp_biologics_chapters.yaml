- id: USP-1132-001
  type: guideline_clause
  source: USP <1132>
  title: Host Cell Protein (HCP) Assays and Acceptance Limits
  content: USP <1132> covers HCP detection and quantitation methods (ELISA, western blot, mass spectrometry). Discusses acceptance
    limits typically 100 ng/dose for therapeutic proteins. Specifications address process capability and purification effectiveness.
  applicable_categories:
  - analytical
  - purity
  - quality
  - safety
  confidence: 0.97
