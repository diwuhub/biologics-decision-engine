- id: USP-1106-002
  type: guideline_clause
  source: USP <1106>
  title: Anti-Drug Antibody (ADA) Assay Validation and Clinical Interpretation
  content: 'USP <1106> establishes validation criteria for ADA assays: sensitivity (lower limit of detection), specificity
    (no cross-reactivity), precision, and dynamic range. Clinical interpretation addresses neutralizing vs. non-neutralizing
    antibodies and impact on efficacy.'
  applicable_categories:
  - analytical
  - safety
  - immunogenicity
  confidence: 0.97
  url: https://www.usp.org
