  document_status: final
- id: USP-1033-001
  type: guideline_clause
  source: USP <1033>
  title: Bioassay Validation - Specificity, Accuracy, Precision
  content: 'USP <1033> establishes validation acceptance criteria: specificity (selectivity for target), accuracy (recovery
    80-120%), precision (RSD <15%), linearity (correlation >0.99). Validation design based on intended use and risk assessment.'
  applicable_categories:
  - analytical
  - validation
  - potency
  confidence: 0.98
  url: https://www.usp.org
  year: 2022
  tags:
  - usp
  - bioassay
  - validation
  - acceptance_criteria
  content_type: paraphrase
  document_status: final
- id: USP-1033-002
  type: guideline_clause
  source: USP <1033>
  title: Bioassay Stability Indicating Method Validation
  content: USP <1033> requires demonstrating method ability to detect product degradation. Degraded/stressed samples tested
    to confirm method discriminates between potent and degraded forms. Stress conditions include temperature, light, pH, oxidation.
  applicable_categories:
  - analytical
  - validation
  - stability
  confidence: 0.97
  url: https://www.usp.org
  year: 2022
  tags:
  - usp
  - bioassay
  - validation
  - stability_indicating
  content_type: paraphrase
  document_status: final
- id: USP-1034-001
  type: guideline_clause
  source: USP <1034>
  title: Bioassay Data Analysis - Dose-Response and Potency Calculation
  content: USP <1034> covers potency calculation using parallel-line assay model, slope-ratio model, and quantal response
    analysis. Includes confidence interval estimation, equivalence testing, and statistical assumptions validation.
  applicable_categories:
  - analytical
  - statistics
  - potency
  confidence: 0.97
  url: https://www.usp.org
  year: 2022
  tags:
  - usp
  - bioassay
  - data_analysis
  - potency_calculation
  content_type: paraphrase
  document_status: final
- id: USP-1034-002
  type: guideline_clause
  source: USP <1034>
  title: Bioassay Analysis Failure Criteria and Troubleshooting
  content: 'USP <1034> defines assay failure criteria: dose-response slope not significant, parallelism test failure, linearity
    failure, or reference standard recovery outside 80-120%. Recommends troubleshooting and repeat assay protocol.'
  applicable_categories:
  - analytical
  - potency
  - validation
  confidence: 0.96
  url: https://www.usp.org
  year: 2022
  tags:
  - usp
  - bioassay
